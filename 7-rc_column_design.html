      const [col, setCol]     = useState(DEFAULT_COL);
      const [bendingMode, setBendingMode] = useState("My");
      const updateCol = (f, v) => setCol(p => ({ ...p, [f]: isNaN(+v) ? v : +v }));

      const [layers, setLayers] = useState(DEFAULT_LAYERS);
      const nextLayerId = useRef(DEFAULT_LAYERS.length + 1);

      const addLayer = () => {
        nextLayerId.current++;
        const defaultZ = [Math.round(col.b * 0.15), Math.round(col.b * 0.85)];
        setLayers(p => [...p, { id: nextLayerId.current, barSize:"20M", dist: Math.round(col.h/2), zCoords: defaultZ }]);
      };
      const delLayer = id => setLayers(p => p.filter(l => l.id !== id));
      const updateLayer = (id, f, v) => setLayers(p => p.map(l => l.id===id ? {...l,[f]:v} : l));
      // Edit z-coords as a comma-separated string, parse to array of numbers
      const updateZCoords = (id, raw) => {
        const parsed = raw.split(",").map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
        updateLayer(id, "zCoords", parsed);
      };

      const generatePerimeterLayout = (nBars, barSize="30M") => {
        const rb = REBAR[barSize] || REBAR["30M"];
        const tieDia = REBAR[col.tieBar]?.dia || 11.3;
        const inset = Math.round(col.cover + tieDia + rb.dia/2);
        const left = inset, right = Math.round(col.b - inset), top = inset, bottom = Math.round(col.h - inset);
        const bars = [];
        if (nBars <= 4) {
          bars.push([left,top],[right,top],[left,bottom],[right,bottom]);
        } else {
          const perSide = Math.max(2, Math.ceil(nBars/4)+1);
          for (let i=0;i<perSide;i++) {
            const t = i/(perSide-1);
            bars.push([Math.round(left + t*(right-left)), top]);
            bars.push([Math.round(left + t*(right-left)), bottom]);
          }
          for (let i=1;i<perSide-1;i++) {
            const t = i/(perSide-1);
            bars.push([left, Math.round(top + t*(bottom-top))]);
            bars.push([right, Math.round(top + t*(bottom-top))]);
          }
        }
        const unique = [];
        bars.forEach(([z,d]) => { if (!unique.some(p => p[0]===z && p[1]===d)) unique.push([z,d]); });
        const selected = unique.slice(0, nBars).sort((a,bv) => a[1]-bv[1] || a[0]-bv[0]);
        const groups = {};
        selected.forEach(([z,d]) => { groups[d] = groups[d] || []; groups[d].push(z); });
        let id = 1;
        setLayers(Object.entries(groups).map(([d,zCoords]) => ({ id:id++, barSize, dist:+d, zCoords:zCoords.sort((a,bv)=>a-bv) })));
        nextLayerId.current = id;
      };

      // Demands — multi-row
      const [demands, setDemands] = useState(DEFAULT_DEMANDS);
      const nextDemandId = useRef(DEFAULT_DEMANDS.length + 1);
      const addDemand = () => {
        nextDemandId.current++;
        setDemands(p => [...p, { id: nextDemandId.current, label:`LC${nextDemandId.current}`, Pf:1000000, Mfz:150000000, Mfy:150000000, Vfy:120000, Vfz:80000, Tf:25000000 }]);
      };
      const delDemand = id => setDemands(p => p.filter(d => d.id !== id));
      const updateDemand = (id, f, v) => setDemands(p => p.map(d => d.id===id ? {...d,[f]: f==="label"?v:+v} : d));

      const [shearReinf, setShearReinf] = useState(DEFAULT_SHEAR_REINF);
      const updateShearReinf = (f, v) => setShearReinf(p => ({ ...p, [f]: (f === "closedTies" || f === "enabled" || f === "considerTorsion") ? !!v : (isNaN(+v) ? v : +v) }));

      const [res, setRes] = useState(null);

      const analyze = () => {
        const my = solveInteraction(col, layers, "My");
        const mz = solveInteraction(col, layers, "Mz");
        const surface3D = solveBiaxialSurface(col, layers);
        const shearTorsion = shearReinf.enabled ? calcShearTorsion(col, layers, demands, shearReinf) : null;
        const primary = bendingMode === "Mz" ? mz : my;
        if (bendingMode === "Both") primary.secondary = mz;
        primary.bendingMode = bendingMode;
        primary.allAxes = { My: my, Mz: mz };
        primary.surface3D = surface3D;
        primary.shearTorsion = shearTorsion;
        setRes(primary);
        setTab("results");
      };

      const hasResult = res && !res.error;

      // Per-demand checks for the selected bending axis/axes.
      const displayedResults = hasResult ? [res].concat(res.secondary ? [res.secondary] : []) : [];
      const demandChecks = hasResult ? demands.map(d => {
        const axisChecks = displayedResults.map(r => {
          const Mf = d[r.momentDemandKey] || 0;
          const Mry = interpMr(r.curvePoints, d.Pf);
          const urM = Mry > 0 ? Mf / Mry : Infinity;
          return { axis:r.axis, axisTitle:r.axisTitle, Mf, Mry, urM };
        });
        const urP = d.Pf / res.Pr_maxLimit;
        const pass = urP <= 1.0 && axisChecks.every(c => c.urM <= 1.0);
        return { ...d, urP, axisChecks, pass };
      }) : [];
      const validationWarnings = getValidationWarnings(col, layers, demands, hasResult ? res : null);
      if (col.fc < 20 || col.fc > 80) validationWarnings.push({ level:"warn", msg:"CSA A23.3-24 material range warning: f′c should normally be between 20 MPa and 80 MPa for frame design. Values outside this range require special verification." });
      if (col.fy > 500) validationWarnings.push({ level:"warn", msg:"CSA A23.3-24 material range warning: longitudinal fy should normally not exceed 500 MPa for this frame-design workflow." });
      if (shearReinf.fyv > 500) validationWarnings.push({ level:"warn", msg:"CSA A23.3-24 material range warning: transverse reinforcement fyv above 500 MPa requires careful code/detailing verification." });
      if (shearReinf.enabled) {
        if (!shearReinf.closedTies && demands.some(d => Math.abs(d.Tf || 0) > 0)) validationWarnings.push({ level:"error", msg:"Torsion demand is present but closed ties are disabled." });
        if ((+shearReinf.spacing || 0) <= 0) validationWarnings.push({ level:"error", msg:"Shear reinforcement spacing must be greater than zero." });
        if ((+shearReinf.thetaDeg || 0) < 22 || (+shearReinf.thetaDeg || 0) > 45) validationWarnings.push({ level:"warn", msg:"θ must stay in the CSA shear/torsion design range used by this app: 22° to 45°." });
      }
      const biaxialChecks = hasResult ? getAllAxisChecks(demands, res.allAxes, res.surface3D) : [];
      const shearChecks = hasResult ? (res.shearTorsion?.results || []) : [];

      const exportCsv = () => {
        if (!hasResult) return;
        const csv = buildCsvExport(col, layers, demands, res, demandChecks, biaxialChecks, shearReinf, shearChecks);
        const stamp = new Date().toISOString().slice(0,10);
        downloadCsv(`column_interaction_v0_7_9_results_${stamp}.csv`, csv);
      };

      return (
        <div style={S.app}>
          {/* ── HEADER ── */}
          <header style={S.header}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:CLR.accent, letterSpacing:"0.05em" }}>Column Interaction v0.7.10</div>
              <div style={{ fontSize:10, color:CLR.muted, letterSpacing:"0.1em" }}>P–My / P–Mz + SHEAR / TORSION CAPACITY CHECK · CSA A23.3-24</div>
            </div>
            <nav style={S.nav}>
              {tabs.map(t => (
                <button key={t.id} style={S.navBtn(tab===t.id)} onClick={() => setTab(t.id)}>
                  {t.label}
                  {t.id==="results" && hasResult && (
                    <span style={{ marginLeft:6, ...S.badge(CLR.green), fontSize:9, padding:"1px 5px" }}>✓</span>
                  )}
                </button>
              ))}
            </nav>
          </header>

          <main style={S.main}>

            {/* ═══ THEORY TAB ═══ */}
            {tab === "theory" && <TheoryView />}

            {/* ═══ INPUTS TAB ═══ */}
            {tab === "inputs" && (
              <div>
                <div style={{ display:"flex", alignItems:"center", marginBottom:"1.5rem" }}>
                  <div style={{ fontSize:20, fontWeight:800 }}>Column Properties &amp; Reinforcement</div>
                  <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:"0.75rem" }}>
                    <label style={{ fontSize:12, color:CLR.muted, fontWeight:700 }}>Bending axis</label>
                    <select style={{ width:230, minWidth:230 }} value={bendingMode} onChange={e => setBendingMode(e.target.value)}>
                      <option value="My">P–My (Strong Axis)</option>
                      <option value="Mz">P–Mz (Weak Axis)</option>
                      <option value="Both">Both</option>
                    </select>
                    <button style={{ ...S.btn("primary"), padding:"8px 24px", fontSize:13 }} onClick={analyze}>
                      ▶ Run P-M-V-T Capacity Check
                    </button>
                  </div>
                </div>

                <ValidationPanel warnings={validationWarnings} />

                {/* Row 1: Properties + Section Preview side by side */}
                <div style={{ display:"grid", gridTemplateColumns:"430px 1fr", gap:"1.5rem", marginBottom:"1.5rem", alignItems:"start" }}>

                  {/* Column geometry & materials */}
                  <div style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:0 }}>
                    <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                      <div style={S.h2}>Table 1: Column Geometry &amp; Materials</div>
                    </div>
                    <table style={S.table}>
                      <tbody>
                        {[
                          ["b — Width (mm)",          "b",     col.b   ],
                          ["h — Height (mm)",         "h",     col.h   ],
                          ["f′c (MPa) · CSA 8.6.1",               "fc",    col.fc  ],
                          ["fy (MPa) · CSA 8.5.1",                "fy",    col.fy  ],
                          ["Es (MPa) · CSA 8.5.4",                "Es",    col.Es  ],
                          ["Cover to ties (mm) · CSA 7.9",      "cover", col.cover],
                        ].map(([label, field, val]) => (
                          <tr key={field}>
                            <td style={{ ...S.td, textAlign:"left", paddingLeft:14, fontSize:11, whiteSpace:"nowrap" }}>{label}</td>
                            <td style={S.td}><input type="number" style={S.input} value={val} onChange={e => updateCol(field, e.target.value)} /></td>
                          </tr>
                        ))}
                        <tr>
                          <td style={{ ...S.td, textAlign:"left", paddingLeft:14, fontSize:11, whiteSpace:"nowrap" }}>Tie Bar Size · CSA 7.6.5</td>
                          <td style={S.td}>
                            <select value={col.tieBar} onChange={e => updateCol("tieBar", e.target.value)}>
                              {Object.keys(REBAR).map(k => <option key={k} value={k}>{k}</option>)}
                            </select>
                          </td>
                        </tr>
                        {[
                          ["α₁", Math.max(0.67, 0.85 - 0.0015*col.fc).toFixed(4)],
                          ["β₁", Math.max(0.67, 0.97 - 0.0025*col.fc).toFixed(4)],
                          ["Ag (mm²)", (col.b*col.h).toFixed(0)],
                        ].map(([lbl, val]) => (
                          <tr key={lbl} style={{ background:"#21262d" }}>
                            <td style={{ ...S.td, textAlign:"left", paddingLeft:14, color:CLR.muted, fontSize:11 }}>{lbl}</td>
                            <td style={{ ...S.td, color:CLR.teal }}>{val}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Section preview — right column */}
                  <div style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:0 }}>
                    <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                      <div style={S.h2}>Section Preview — Bar Coordinates (d, z)</div>
                    </div>
                    <ColumnDiagram col={col} layers={layers} shearReinf={shearReinf} />
                  </div>
                </div>

                <div style={{ ...S.card, padding:"1rem 1.25rem", marginBottom:"1.5rem" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"0.75rem", flexWrap:"wrap" }}>
                    <div style={{ ...S.h2, marginBottom:0 }}>Reinforcement Layout Generator</div>
                    <span style={{ color:CLR.muted, fontSize:11 }}>Auto-generate common perimeter bar layouts using 30M bars and current cover/tie inputs.</span>
                    {[4,8,12,16].map(n => (
                      <button key={n} style={{ ...S.btn("ghost"), padding:"5px 12px", fontSize:11 }} onClick={() => generatePerimeterLayout(n, "30M")}>{n} bars</button>
                    ))}
                  </div>
                </div>

                {/* Row 2: Reinforcement layer table */}
                <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                    <div style={S.h2}>Table 2: Reinforcement Layers (My strong axis / Mz weak axis)</div>
                    <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 14px", fontSize:11 }} onClick={addLayer}>+ Add Layer</button>
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={S.table}>
                      <thead>
                        <tr>
                          <th style={S.th}>#</th>
                          <th style={S.th}>Bar Size</th>
                          <th style={S.th}>Ø (mm)</th>
                          <th style={S.th}>Area/bar (mm²)</th>
                          <th style={S.th}>d — dist from comp. face (mm)</th>
                          <th style={S.th}>z-coords (mm, comma-sep)</th>
                          <th style={S.th}>No. Bars</th>
                          <th style={S.th}>Layer Ast (mm²)</th>
                          <th style={S.th}>—</th>
                        </tr>
                      </thead>
                      <tbody>
                        {layers.map((l, i) => {
                          const rb    = REBAR[l.barSize] || { dia:0, area:0 };
                          const nBars = l.zCoords ? l.zCoords.length : 0;
                          return (
                            <tr key={l.id} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                              <td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{i+1}</td>
                              <td style={S.td}>
                                <select value={l.barSize} onChange={e => updateLayer(l.id,"barSize",e.target.value)}>
                                  {Object.keys(REBAR).map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{rb.dia}</td>
                              <td style={{ ...S.td, color:CLR.muted }}>{rb.area}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" min={0} value={l.dist}
                                       onChange={e => updateLayer(l.id,"dist",+e.target.value)} />
                              </td>
                              <td style={S.td}>
                                <input style={{ ...S.input, width:180 }}
                                       value={(l.zCoords||[]).join(", ")}
                                       placeholder="e.g. 70, 250, 430"
                                       onChange={e => updateZCoords(l.id, e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{nBars}</td>
                              <td style={{ ...S.td, color:CLR.orange, fontWeight:700 }}>
                                {(nBars * rb.area).toFixed(0)}
                              </td>
                              <td style={S.td}>
                                <button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }}
                                        onClick={() => delLayer(l.id)}>✕</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                      <tfoot>
                        <tr style={{ background:"#21262d" }}>
                          <td colSpan={7} style={{ ...S.td, textAlign:"right", fontWeight:700, color:CLR.muted }}>
                            TOTAL Ast (mm²)
                          </td>
                          <td style={{ ...S.td, color:CLR.teal, fontWeight:700 }}>
                            {layers.reduce((s,l) => {
                              const rb = REBAR[l.barSize] || { area:0 };
                              return s + (l.zCoords||[]).length * rb.area;
                            }, 0).toFixed(0)}
                          </td>
                          <td style={S.td}></td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>
                </div>


                {/* Row 3: Shear / torsion reinforcement input table */}
                <div style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                  <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                    <div style={S.h2}>Table 3: Inputted Shear Reinforcement / Torsion Reinforcement</div>
                    <div style={{ color:CLR.muted, fontSize:11 }}>Input the actual transverse reinforcement in the column. The app does not auto-design or resize stirrups; it calculates the shear/torsion capacity from the inputted reinforcement and checks every inputted Vfy, Vfz, and Tf load case against that capacity.</div>
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={S.table}>
                      <tbody>
                        <tr>
                          <td style={{ ...S.td, textAlign:"left", fontWeight:700 }}>Enable shear/torsion check</td>
                          <td style={S.td}><input type="checkbox" checked={shearReinf.enabled} onChange={e=>updateShearReinf("enabled", e.target.checked)} /></td>
                          <td style={{ ...S.td, textAlign:"left", fontWeight:700 }}>Closed ties for torsion</td>
                          <td style={S.td}><input type="checkbox" checked={shearReinf.closedTies} onChange={e=>updateShearReinf("closedTies", e.target.checked)} /></td>
                          <td style={{ ...S.td, textAlign:"left", fontWeight:700 }}>Consider torsion per CSA 11.2.9</td>
                          <td style={S.td}><input type="checkbox" checked={shearReinf.considerTorsion} onChange={e=>updateShearReinf("considerTorsion", e.target.checked)} /></td>
                        </tr>
                        <tr>
                          <td style={{ ...S.td, textAlign:"left" }}>Stirrup / tie bar</td>
                          <td style={S.td}><select value={shearReinf.stirrupBar} onChange={e=>updateShearReinf("stirrupBar", e.target.value)}>{Object.keys(REBAR).map(k=><option key={k} value={k}>{k}</option>)}</select></td>
                          <td style={{ ...S.td, textAlign:"left" }}>fyv (MPa)</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.fyv} onChange={e=>updateShearReinf("fyv", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>spacing s (mm)</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.spacing} onChange={e=>updateShearReinf("spacing", e.target.value)} /></td>
                        </tr>
                        <tr>
                          <td style={{ ...S.td, textAlign:"left" }}>Vy legs</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.legsY} onChange={e=>updateShearReinf("legsY", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>Vz legs</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.legsZ} onChange={e=>updateShearReinf("legsZ", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>θ (deg)</td>
                          <td style={S.td}><input style={S.input} type="number" min="22" max="45" value={shearReinf.thetaDeg} onChange={e=>updateShearReinf("thetaDeg", e.target.value)} /></td>
                        </tr>
                        <tr>
                          <td style={{ ...S.td, textAlign:"left" }}>β override (0 = auto)</td>
                          <td style={S.td}><input style={S.input} type="number" step="0.01" value={shearReinf.betaOverride} onChange={e=>updateShearReinf("betaOverride", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>User max spacing (mm)</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.maxSpacing} onChange={e=>updateShearReinf("maxSpacing", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>λ density factor</td>
                          <td style={S.td}><input style={S.input} type="number" step="0.05" min="0.75" max="1" value={shearReinf.lambda} onChange={e=>updateShearReinf("lambda", e.target.value)} /></td>
                        </tr>
                        <tr>
                          <td style={{ ...S.td, textAlign:"left" }}>Aggregate size ag (mm)</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.aggregateSize} onChange={e=>updateShearReinf("aggregateSize", e.target.value)} /></td>
                          <td style={{ ...S.td, textAlign:"left" }}>Torsion tie c/l cover (mm)</td>
                          <td style={S.td}><input style={S.input} type="number" value={shearReinf.torsionCenterlineCover} onChange={e=>updateShearReinf("torsionCenterlineCover", e.target.value)} /></td>
                          <td style={{ ...S.td, color:CLR.muted }} colSpan="2">{shearReinf.stirrupBar} area = {REBAR[shearReinf.stirrupBar]?.area || 0} mm²/bar</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Row 4: Demands table */}
                <div style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                    <div style={S.h2}>Table 4: Factored Load Demands (Pf, Mfy, Mfz, Vfy, Vfz, Tf)</div>
                    <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 14px", fontSize:11 }} onClick={addDemand}>+ Add Load Case</button>
                  </div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={S.table}>
                      <thead>
                        <tr>
                          <th style={S.th}>ID</th>
                          <th style={S.th}>Label</th>
                          <th style={S.th}>Pf (N)</th>
                          <th style={S.th}>Pf (kN)</th>
                          <th style={S.th}>Mfz (N·mm)</th>
                          <th style={S.th}>Mfz (kN·m)</th>
                          <th style={S.th}>Mfy (N·mm)</th>
                          <th style={S.th}>Mfy (kN·m)</th>
                          <th style={S.th}>Vfy (N)</th>
                          <th style={S.th}>Vfy (kN)</th>
                          <th style={S.th}>Vfz (N)</th>
                          <th style={S.th}>Vfz (kN)</th>
                          <th style={S.th}>Tf (N·mm)</th>
                          <th style={S.th}>Tf (kN·m)</th>
                          <th style={S.th}>Color</th>
                          <th style={S.th}>—</th>
                        </tr>
                      </thead>
                      <tbody>
                        {demands.map((d, i) => {
                          const color = DEMAND_COLORS[i % DEMAND_COLORS.length];
                          return (
                            <tr key={d.id} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                              <td style={{ ...S.td, color:CLR.muted }}>{i+1}</td>
                              <td style={S.td}>
                                <input style={{ ...S.input, width:70 }} value={d.label}
                                       onChange={e => updateDemand(d.id,"label",e.target.value)} />
                              </td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Pf}
                                       onChange={e => updateDemand(d.id,"Pf",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{(d.Pf/1e3).toFixed(1)}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Mfz || 0}
                                       onChange={e => updateDemand(d.id,"Mfz",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{((d.Mfz || 0)/1e6).toFixed(1)}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Mfy}
                                       onChange={e => updateDemand(d.id,"Mfy",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{(d.Mfy/1e6).toFixed(1)}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Vfy || 0}
                                       onChange={e => updateDemand(d.id,"Vfy",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{((d.Vfy || 0)/1e3).toFixed(1)}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Vfz || 0}
                                       onChange={e => updateDemand(d.id,"Vfz",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{((d.Vfz || 0)/1e3).toFixed(1)}</td>
                              <td style={S.td}>
                                <input style={S.input} type="number" value={d.Tf || 0}
                                       onChange={e => updateDemand(d.id,"Tf",e.target.value)} />
                              </td>
                              <td style={{ ...S.td, color:CLR.muted }}>{((d.Tf || 0)/1e6).toFixed(1)}</td>
                              <td style={S.td}>
                                <div style={{ width:22, height:14, borderRadius:3, background:color, margin:"0 auto",
                                             border:`1px solid ${color}` }} />
                              </td>
                              <td style={S.td}>
                                <button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }}
                                        onClick={() => delDemand(d.id)}>✕</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            )}

            {/* ═══ RESULTS TAB ═══ */}
            {tab === "results" && (
              <div>
                {res?.error && (
                  <div style={{ ...S.card, border:`1px solid ${CLR.red}`, marginBottom:"1.5rem" }}>
                    <div style={{ color:CLR.red, fontWeight:700 }}>Error: {res.error}</div>
                  </div>
                )}

                {hasResult && (
                  <div className="report-results-block">
                    <div className="print-report-header">
                      <h1>Column Interaction v0.7.12 Calculation Report</h1>
                      <div className="meta">
                        CSA A23.3-24 reinforced concrete column P–My / P–Mz and V–T capacity check<br/>
                        Section: b = {col.b} mm, h = {col.h} mm · f′c = {col.fc} MPa · fy = {col.fy} MPa · Generated: {new Date().toLocaleString()}
                      </div>
                    </div>
                    <div className="screen-only" style={{ display:"flex", justifyContent:"flex-end", gap:"0.75rem", marginBottom:"1rem", flexWrap:"wrap" }}>
                      <button style={S.btn("ghost")} onClick={() => window.print()}>Open Full PDF Report</button>
                      <button style={S.btn("ghost")} onClick={exportCsv}>Export Results CSV</button>
                      <button style={S.btn("primary")} onClick={() => window.print()}>Print / Save PDF Report</button>
                    </div>
                    <DesignDashboard res={res} demandChecks={demandChecks} biaxialChecks={biaxialChecks} shearChecks={shearChecks} />
                    <ValidationPanel warnings={validationWarnings} />

                    <div className="screen-only" style={{ ...S.card, padding:"0.75rem", display:"flex", gap:"0.75rem", alignItems:"center", flexWrap:"wrap", marginBottom:"1.5rem" }}>
                      <button
                        style={{ ...S.btn(resultSubTab === "pm" ? "primary" : "ghost"), minWidth:170 }}
                        onClick={() => setResultSubTab("pm")}
                      >
                        P vs M Results
                      </button>
                      <button
                        style={{ ...S.btn(resultSubTab === "vt" ? "primary" : "ghost"), minWidth:170 }}
                        onClick={() => setResultSubTab("vt")}
                      >
                        V vs T Results
                      </button>
                      <span style={{ color:CLR.muted, fontSize:11 }}>V–T tab checks inputted loads against the capacity of the inputted shear/torsion reinforcement.</span>
                    </div>

                    <div className="report-results-subtab report-results-subtab-pm" style={{ display: resultSubTab === "pm" ? "block" : "none" }}>
                      <div className="print-only print-section-title">P vs M Results</div>
                    {/* ── Figure 1: Interaction Diagram — full width ── */}
                    <div className="design-report-exclude print-avoid print-diagram-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                      <div className="screen-only" style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                        <div style={S.h2}>Figure 1: {res.axisTitle} Interaction Diagram — CSA A23.3-24 Cl. 10.1 / 10.10</div>
                      </div>
                      <div style={{ padding:"1.5rem", overflowX:"auto" }}>
                        <InteractionDiagram res={res} demands={demands} />
                      </div>
                    </div>

                    {res.secondary && (
                      <div className="design-report-exclude print-avoid print-diagram-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                        <div className="screen-only" style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                          <div style={S.h2}>Figure 2: {res.secondary.axisTitle} Interaction Diagram — CSA A23.3-24 Cl. 10.1 / 10.10</div>
                        </div>
                        <div style={{ padding:"1.5rem", overflowX:"auto" }}>
                          <InteractionDiagram res={res.secondary} demands={demands} />
                        </div>
                      </div>
                    )}

                    <BiaxialSurfaceFigure allAxes={res.allAxes} demands={demands} surface3D={res.surface3D} />

                    {/* ── Table 1: Demand summary ── */}
                    <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                      <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                        <div style={S.h2}>Table 1: Demand Capacity Checks — ULS per CSA A23.3-24 Cl. 8.1.3</div>
                      </div>
                      <div style={{ overflowX:"auto" }}>
                        <table style={S.table}>
                          <thead>
                            <tr>
                              <th style={S.th}>LC</th>
                              <th style={S.th}>Pf (kN)</th>
                              <th style={S.th}>Pro_comp (kN)</th>
                              <th style={S.th}>UR_P</th>
                              <th style={S.th}>Axis</th>
                              <th style={S.th}>Mf (kN·m)</th>
                              <th style={S.th}>Mr @ Pf (kN·m)</th>
                              <th style={S.th}>UR_M</th>
                              <th style={S.th}>Status</th>
                            </tr>
                          </thead>
                          <tbody>
                            {demandChecks.map((d, i) => {
                              const color = DEMAND_COLORS[i % DEMAND_COLORS.length];
                              return (
                                <tr key={d.id} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                                  <td style={{ ...S.td, color, fontWeight:700 }}>{d.label}</td>
                                  <td style={S.td}>{(d.Pf/1e3).toFixed(1)}</td>
                                  <td style={{ ...S.td, color:CLR.teal }}>{(res.Pr_maxLimit/1e3).toFixed(1)}</td>
                                  <td style={{ ...S.td, color: d.urP<=1?CLR.green:CLR.red, fontWeight:700 }}>{fmt2(d.urP)}</td>
                                  <td style={S.td}>{d.axisChecks.map(c => c.axisTitle).join(" / ")}</td>
                                  <td style={S.td}>{d.axisChecks.map(c => (c.Mf/1e6).toFixed(1)).join(" / ")}</td>
                                  <td style={{ ...S.td, color:CLR.teal }}>{d.axisChecks.map(c => (c.Mry/1e6).toFixed(1)).join(" / ")}</td>
                                  <td style={{ ...S.td, color: d.axisChecks.every(c => c.urM<=1)?CLR.green:CLR.red, fontWeight:700 }}>{d.axisChecks.map(c => isFinite(c.urM)?fmt2(c.urM):"—").join(" / ")}</td>
                                  <td style={S.td}>
                                    <span style={S.badge(d.pass ? CLR.green : CLR.red)}>
                                      {d.pass ? "✓ OK" : "✗ FAIL"}
                                    </span>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    <BiaxialCheckTable checks={biaxialChecks} />

                    {/* ── Table 2: Section properties ── */}
                    <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                      <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                        <div style={S.h2}>Table 2: Section Properties &amp; Stress Block Parameters</div>
                      </div>
                      <div style={{ overflowX:"auto" }}>
                        <table style={S.table}>
                          <thead>
                            <tr>
                              {["Parameter","Symbol","Value","Unit","Clause"].map(h => (
                                <th key={h} style={S.th}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {[
                              ["Gross Area",        "Ag",         fmt0(res.Ag),           "mm²",  "CSA notation Cl. 3.2"],
                              ["Total Steel Area",  "Ast",        fmt0(res.Ast),           "mm²",  "CSA notation Cl. 3.2"],
                              ["Steel Ratio",       "ρ=Ast/Ag",   (res.Ast/res.Ag*100).toFixed(2)+"%", "—", "Cl. 10.9.1"],
                              ["Stress Block α₁",  "α₁",         fmt3(res.alpha1),         "—",    "Cl. 10.1.7(a)"],
                              ["Stress Block β₁",  "β₁",         fmt3(res.beta1),          "—",    "Cl. 10.1.7(b)"],
                              ["Crushing Strain",  "ε_cu",       "0.0035",                 "—",    "Cl. 10.1.3"],
                              ["Yield Strain",     "ε_y=fy/Es",  res.ey.toFixed(5),        "—",    "Cl. 8.5.3, 8.5.4"],
                              ["Balance Point c",  "c_bal",      fmt0(res.c_bal),          "mm",   "Cl. 10.1.4"],
                              ["Pure Compression",   "Pro_comp",    fmt0(res.Pro_comp),       "N",    "Cl. 10.10"],
                              ["Pure Tension",     "−Tr",        fmt0(res.Ast * 0.85 * col.fy), "N", "Cl. 8.4.3, 8.5.1"],
                            ].map(([name,sym,val,unit,cl],i) => (
                              <tr key={i} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                                <td style={{ ...S.td, textAlign:"left" }}>{name}</td>
                                <td style={{ ...S.td, color:CLR.accent }}>{sym}</td>
                                <td style={{ ...S.td, color:CLR.teal, fontWeight:700 }}>{val}</td>
                                <td style={{ ...S.td, color:CLR.muted }}>{unit}</td>
                                <td style={{ ...S.td, color:CLR.muted, fontSize:10 }}>{cl}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* ── Table 3: P–My reference points ── */}
                    <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                      <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                        <div style={S.h2}>Table 3: Control Points — {res.axisTitle} Interaction Diagram</div>
                      </div>
                      <div style={{ overflowX:"auto" }}>
                        <table style={S.table}>
                          <thead>
                            <tr>
                              <th style={S.th}>Control Point</th>
                              <th style={S.th}>Pt</th>
                              <th style={S.th}>c (mm)</th>
                              <th style={S.th}>a=β₁c (mm)</th>
                              <th style={S.th}>Cr (N)</th>
                              <th style={S.th}>ΣFrs (N)</th>
                              <th style={S.th}>Pr (N)</th>
                              <th style={S.th}>Pr (kN)</th>
                              <th style={S.th}>Mr (N·mm)</th>
                              <th style={S.th}>Mr (kN·m)</th>
                            </tr>
                          </thead>
                          <tbody>
                            {res.refPoints.map((pt, i) => (
                              <tr key={i} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                                <td style={{ ...S.td, textAlign:"left", color:CLR.text }}>{pt.label}</td>
                                <td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{pt.index}</td>
                                <td style={S.td}>{pt.c===Infinity?"∞":fmt0(pt.c)}</td>
                                <td style={S.td}>{pt.a!==undefined?fmt0(Math.min(pt.a,col.h)):"—"}</td>
                                <td style={S.td}>{pt.Cr!==undefined?fmt0(pt.Cr):"—"}</td>
                                <td style={S.td}>{pt.Frs_sum!==undefined?fmt0(pt.Frs_sum):"—"}</td>
                                <td style={{ ...S.td, fontWeight:700, color:pt.Pr>=0?CLR.teal:CLR.orange }}>{fmt0(pt.Pr)}</td>
                                <td style={{ ...S.td, color:CLR.muted }}>{(pt.Pr/1e3).toFixed(1)}</td>
                                <td style={S.td}>{fmt0(pt.Mr)}</td>
                                <td style={{ ...S.td, color:CLR.violet }}>{(pt.Mr/1e6).toFixed(3)}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* ── Table 4: Bar strains at balance point ── */}
                    <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden", marginBottom:"1.5rem" }}>
                      <div style={{ padding:"1rem 1.25rem", borderBottom:`1px solid ${CLR.border}` }}>
                        <div style={S.h2}>Table 4: Steel Bar Strains &amp; Stresses @ Balance Point — CSA Cl. 10.1.2 / 10.1.4 (c = {fmt0(res.c_bal)} mm)</div>
                      </div>
                      <div style={{ overflowX:"auto" }}>
                        <table style={S.table}>
                          <thead>
                            <tr>
                              <th style={S.th}>Bar</th>
                              <th style={S.th}>As (mm²)</th>
                              <th style={S.th}>d (mm)</th>
                              <th style={S.th}>ε_s</th>
                              <th style={S.th}>fs (MPa)</th>
                              <th style={S.th}>φs·fs (MPa)</th>
                              <th style={S.th}>φs·fs·As = Fr_s (N)</th>
                            </tr>
                          </thead>
                          <tbody>
                            {res.bars.map((bar, i) => {
                              const c = res.c_bal;
                              const es = 0.0035 * (1 - bar.d / c);
                              const eps_y = col.fy / col.Es;
                              const fs = Math.abs(es) >= eps_y ? Math.sign(es) * col.fy : es * col.Es;
                              const Fs = 0.85 * fs * bar.As;
                              return (
                                <tr key={i} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                                  <td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{i+1}</td>
                                  <td style={S.td}>{fmt0(bar.As)}</td>
                                  <td style={S.td}>{fmt0(bar.d)}</td>
                                  <td style={{ ...S.td, color:es>=0?CLR.red:CLR.teal }}>{es.toFixed(5)}</td>
                                  <td style={{ ...S.td, color:fs>=0?CLR.red:CLR.teal }}>{fmt2(fs)}</td>
                                  <td style={S.td}>{fmt2(0.85*fs)}</td>
                                  <td style={{ ...S.td, color:Fs>=0?CLR.orange:CLR.teal, fontWeight:700 }}>{fmt0(Fs)}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    <BalancedHandCalculation res={res} col={col} />
                    </div>

                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
