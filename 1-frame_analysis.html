        const dofs = [ni*3,ni*3+1,ni*3+2,nj*3,nj*3+1,nj*3+2];
        const fe = [0,0,0,0,0,0];
        // Member loads are entered in LOCAL member axes only.
        // qxA/qxB and qyA/qyB are start/end line loads in k/ft. Positive qx acts along local +x; positive qy acts along local +y.
        const qxA = (+m.qxA || 0) * U.loadToFperLen, qxB = (+m.qxB || 0) * U.loadToFperLen;
        const qyA = (+m.qyA || 0) * U.loadToFperLen, qyB = (+m.qyB || 0) * U.loadToFperLen;
        if (Math.abs(qxA)>1e-12 || Math.abs(qxB)>1e-12) {
          fe[0] += L * (2*qxA + qxB) / 6;
          fe[3] += L * (qxA + 2*qxB) / 6;
        }
        if (Math.abs(qyA)>1e-12 || Math.abs(qyB)>1e-12) {
          fe[1] += L * (7*qyA + 3*qyB) / 20;
          fe[2] += L*L * (3*qyA + 2*qyB) / 60;
          fe[4] += L * (3*qyA + 7*qyB) / 20;
          fe[5] += -L*L * (2*qyA + 3*qyB) / 60;
        }
        const Px = +m.pointPx || 0, Py = +m.pointPy || 0, aDist = (+m.pointA || 0)*U.coordToLen;
        if ((Math.abs(Px)>1e-12 || Math.abs(Py)>1e-12) && aDist>0 && aDist<L) {
          const bDist = L - aDist;
          fe[0] += Px * bDist / L;
          fe[3] += Px * aDist / L;
          fe[1] += Py*bDist*bDist*(3*aDist+bDist)/(L**3);
          fe[4] += Py*aDist*aDist*(aDist+3*bDist)/(L**3);
          fe[2] += Py*aDist*bDist*bDist/(L**2);
          fe[5] += -Py*aDist*aDist*bDist/(L**2);
        }
        const releaseData = applyMemberRelease(k, fe, m.release || "Fix-Fix");
        const kUse = releaseData.k;
        const feUse = releaseData.fe;
        const kgUse = mul(mul(TT, kUse), T);
        // Replace the initially assembled unreleased stiffness with the released stiffness.
        // Assembly occurs here only after releases have been applied.
        addMat(K, dofs, kgUse);
        const feG = matVec(TT, feUse);
        for (let i=0;i<6;i++) F[dofs[i]] += feG[i];
        built.push({ m, ni, nj, a, b, L, c, s, E, A, I, k:kUse, T, fe:feUse, dofs, releaseData });
      }
      // Nodal spring supports are added directly to the global stiffness matrix.
      // kx and ky are entered as force per displacement unit (for example kip/in or kN/mm).
      // kTheta is entered as moment per radian in the displayed moment unit (for example kip·ft/rad or kN·m/rad).
      validNodes.forEach((n,i)=>{
        const kx = Math.max(0, +n.kx || 0);
        const ky = Math.max(0, +n.ky || 0);
        const kTheta = Math.max(0, +n.kTheta || 0) * U.momentToSolver;
        K[i*3][i*3] += kx;
        K[i*3+1][i*3+1] += ky;
        K[i*3+2][i*3+2] += kTheta;
      });
      const fixed = new Set();
      validNodes.forEach((n,i)=>restraints(n.support).forEach(r=>fixed.add(i*3+r)));
      const free = []; for (let i=0;i<nDOF;i++) if (!fixed.has(i)) free.push(i);
      const Kff = free.map(i=>free.map(j=>K[i][j]));
      const Ff = free.map(i=>F[i]);
      const eigenRaw = jacobiEigenSymmetric(Kff);
      const dofLabels = free.map(dof => makeDofLabel(validNodes, dof));
      const eigenModes = eigenRaw.values.map((lambda, modeIndex) => {
        const reduced = eigenRaw.vectors[modeIndex] || [];
        const full = Array(nDOF).fill(0);
        free.forEach((dof, i) => full[dof] = reduced[i] || 0);
        return {
          mode: modeIndex + 1,
          lambda,
          reduced,
          full,
          dofLabels,
          components: dofLabels.map((label, i) => ({ label, value: reduced[i] || 0 }))

      if (!Df) return { error:"Singular stiffness matrix. Check supports and connectivity." };
      const D = Array(nDOF).fill(0); free.forEach((dof,i)=>D[dof]=Df[i]);
      const reactionsFull = matVec(K,D).map((v,i)=>v-F[i]);
      const memberResults = built.map(o => {
        const dg = o.dofs.map(i=>D[i]);
        const dl = matVec(o.T, dg); // local [u1, v1, theta1, u2, v2, theta2]
        const kd = matVec(o.k, dl);
        const q = kd.map((v,i)=>v-o.fe[i]);
        const qDisplay = [q[0], q[1], q[2]*U.momentFromSolver, q[3], q[4], q[5]*U.momentFromSolver];

        const sfd=[], bmd=[], axd=[], defl=[];
        const raw = [];
        for (let i=0;i<=80;i++) {
          const x = o.L*i/80;
          let N = q[0], V = q[1], M = -q[2];
          const qxA = (+o.m.qxA || 0) * U.loadToFperLen, qxB = (+o.m.qxB || 0) * U.loadToFperLen;
          const qyA = (+o.m.qyA || 0) * U.loadToFperLen, qyB = (+o.m.qyB || 0) * U.loadToFperLen;
          const dqx = qxB - qxA;
          const dqy = qyB - qyA;
          N += qxA*x + dqx*x*x/(2*o.L);
          V += qyA*x + dqy*x*x/(2*o.L);
          M += q[1]*x + qyA*x*x/2 + dqy*x*x*x/(6*o.L);
          const Px = +o.m.pointPx || 0, Py = +o.m.pointPy || 0, aDist=(+o.m.pointA||0)*U.coordToLen;
          if (Math.abs(Px)>1e-12 && x>=aDist) { N += Px; }
          if (Math.abs(Py)>1e-12 && x>=aDist) { V += Py; M += Py*(x-aDist); }
          axd.push({x:x/U.coordToLen,N});
          sfd.push({x:x/U.coordToLen,V});
          bmd.push({x:x/U.coordToLen,M:M*U.momentFromSolver});
          raw.push({x, M});
        }

        // Numerical double-integration deflected shape in the local member y direction:
        // curvature kappa = M/(EI), theta = ∫kappa dx + C1, v = ∫theta dx + C2.
        // Constants are selected so the curve passes through the solved end transverse displacements.
        const thetaRaw = [0], vRaw = [0];
        for (let i=1;i<raw.length;i++) {
          const dx = raw[i].x - raw[i-1].x;
          const k0 = raw[i-1].M/(o.E*o.I || 1);
          const k1 = raw[i].M/(o.E*o.I || 1);
          const th = thetaRaw[i-1] + 0.5*(k0+k1)*dx;
          thetaRaw.push(th);
          vRaw.push(vRaw[i-1] + 0.5*(thetaRaw[i-1]+th)*dx);
        }
        const v1 = dl[1], v2 = dl[4];
        const C2 = v1;
        const C1 = (v2 - v1 - vRaw[vRaw.length-1]) / o.L;
        for (let i=0;i<raw.length;i++) {
          const x = raw[i].x;
          const t = o.L > 0 ? x/o.L : 0;
          const uLocal = dl[0] + (dl[3]-dl[0])*t;
          const vLocal = vRaw[i] + C1*x + C2;
          const gx = (uLocal*o.c - vLocal*o.s) / U.coordToLen;
          const gy = (uLocal*o.s + vLocal*o.c) / U.coordToLen;

        }
        return { name:o.m.name||`${o.m.near}-${o.m.far}`, release:o.m.release||"Fix-Fix", near:o.m.near, far:o.m.far, xi:+o.a.x||0, yi:+o.a.y||0, xj:+o.b.x||0, yj:+o.b.y||0, L:o.L/U.coordToLen, q, qDisplay, fe:o.fe, feDisplay:[o.fe[0], o.fe[1], o.fe[2]*U.momentFromSolver, o.fe[3], o.fe[4], o.fe[5]*U.momentFromSolver], axd, sfd, bmd, defl };
      });
      const displacements = validNodes.map((n,i)=>({label:n.label, ux:D[i*3], uy:D[i*3+1], rz:D[i*3+2]}));
      const reactions = validNodes.map((n,i)=>{
        const springRx = Math.max(0, +n.kx || 0) * (D[i*3] || 0);
        const springRy = Math.max(0, +n.ky || 0) * (D[i*3+1] || 0);
        const springMz = Math.max(0, +n.kTheta || 0) * (D[i*3+2] || 0);

          Ry:(reactionsFull[i*3+1] || 0) + springRy,

    function FrameDiagram({ nodes, members, result, units, overlayMode="none", overlayScale=1, modeShape=null, showInternalTitle=true, diagramWidth=980, diagramHeight=540, padding=78, reservedRightOverride=null }) {
      const [hover, setHover] = useState(null);
      const W = diagramWidth, H = diagramHeight, P = padding;
      const U = UNIT_SETS[units] || UNIT_SETS["kip/ft"];

      const cleanNodes = (nodes || []).filter(n => String(n.label || "").trim());
      const nodeMap = {};
      cleanNodes.forEach(n => { nodeMap[String(n.label).trim()] = n; });

      // Frame-only geometry is ALWAYS built directly from the input nodes + input members.
      // It does not depend on solved member results. This prevents the old disconnected-frame glitch.
      const frameMembers = (members || []).map(m => {
        const a = nodeMap[String(m.near || "").trim()];
        const b = nodeMap[String(m.far || "").trim()];
        if (!a || !b) return null;
        return {
          ...m,
          xi:+a.x || 0, yi:+a.y || 0,
          xj:+b.x || 0, yj:+b.y || 0,
          nearNode:a, farNode:b,
        };
      }).filter(Boolean);

      const solvedMembers = (result && result.memberResults) ? result.memberResults : [];
      const coordX = cleanNodes.map(n => +n.x || 0).concat(frameMembers.flatMap(m => [m.xi, m.xj]));
      const coordY = cleanNodes.map(n => +n.y || 0).concat(frameMembers.flatMap(m => [m.yi, m.yj]));
      const minX = Math.min(...coordX, 0), maxX = Math.max(...coordX, 1);
      const minY = Math.min(...coordY, 0), maxY = Math.max(...coordY, 1);
      const reservedRight = reservedRightOverride !== null ? reservedRightOverride : ((overlayMode === "sfd" || overlayMode === "bmd" || overlayMode === "axial") ? 205 : 40);
      const usableW = W - 2*P - reservedRight;
      const usableH = H - 2*P;
      const dx = Math.max(maxX - minX, 1e-9);
      const dy = Math.max(maxY - minY, 1e-9);
      const sc = Math.min(usableW / dx, usableH / dy);

      const unitVec = (x1,y1,x2,y2) => {

      };
      const overlayTitle = overlayMode === "bmd" ? `Bending Moment Diagram (${U.moment})`
        : overlayMode === "sfd" ? `Shear Force Diagram (${U.force})`
        : overlayMode === "axial" ? `Axial Load Diagram (${U.force})`
        : overlayMode === "deformed" ? `Deflected Shape (${U.disp})`
        : overlayMode === "mode" ? `Mode Shape ${modeShape ? modeShape.mode : ""}`
        : "Frame Diagram";

      const NodeCircle = ({x,y}) => <circle cx={x} cy={y} r="6" fill={CLR.bg} stroke={CLR.text} strokeWidth="1.8"/>;
      const Support = ({n,x,y}) => {
        const support = n.support || "Free";
        const stroke = support === "Free" ? CLR.muted : CLR.green;
        if (support === "Fixed") return <g><rect x={x-16} y={y+8} width="32" height="10" fill={CLR.green}/>{[0,1,2,3,4].map(i=><line key={i} x1={x-16+i*8} y1={y+20} x2={x-9+i*8} y2={y+13} stroke={CLR.green} strokeWidth="1.2" />)}</g>;
        if (support === "Pinned") return <g><polygon points={`${x},${y+8} ${x-14},${y+30} ${x+14},${y+30}`} fill="none" stroke={stroke} strokeWidth="1.7"/><line x1={x-18} y1={y+30} x2={x+18} y2={y+30} stroke={stroke} strokeWidth="1.4"/></g>;
        if (support === "Vertical Roller") return <g><polygon points={`${x},${y+8} ${x-14},${y+25} ${x+14},${y+25}`} fill="none" stroke={stroke} strokeWidth="1.7"/><circle cx={x-8} cy={y+31} r="4" fill="none" stroke={stroke} strokeWidth="1.3"/><circle cx={x+8} cy={y+31} r="4" fill="none" stroke={stroke} strokeWidth="1.3"/><line x1={x-18} y1={y+36} x2={x+18} y2={y+36} stroke={stroke} strokeWidth="1.2"/></g>;
        if (support === "Horizontal Roller") return <g><polygon points={`${x-8},${y} ${x-27},${y-14} ${x-27},${y+14}`} fill="none" stroke={stroke} strokeWidth="1.7"/><circle cx={x-33} cy={y-8} r="4" fill="none" stroke={stroke} strokeWidth="1.3"/><circle cx={x-33} cy={y+8} r="4" fill="none" stroke={stroke} strokeWidth="1.3"/><line x1={x-39} y1={y-18} x2={x-39} y2={y+18} stroke={stroke} strokeWidth="1.2"/></g>;
        return null;
      };
      const SpringSupports = ({n,x,y}) => {
        const kx = Math.max(0, +n.kx || 0);
        const ky = Math.max(0, +n.ky || 0);
        const kTheta = Math.max(0, +n.kTheta || 0);
        if (kx <= 1e-12 && ky <= 1e-12 && kTheta <= 1e-12) return null;
        const color = CLR.yellow;
        const zig = (pts) => pts.map(p => `${p[0]},${p[1]}`).join(' ');
        return <g>
          {kx > 1e-12 && <g>
            <title>{`Horizontal spring support kx = ${fmt3(kx)}`}</title>
            <line x1={x+7} y1={y} x2={x+12} y2={y} stroke={color} strokeWidth="1.5"/>
            <polyline points={zig([[x+12,y],[x+16,y-4],[x+20,y+4],[x+24,y-4],[x+28,y+4],[x+32,y]])} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
            <line x1={x+32} y1={y-8} x2={x+32} y2={y+8} stroke={color} strokeWidth="1.5"/>
            <line x1={x+36} y1={y-8} x2={x+36} y2={y+8} stroke={color} strokeWidth="1.5"/>
            <line x1={x+40} y1={y-8} x2={x+40} y2={y+8} stroke={color} strokeWidth="1.5"/>
            <text x={x+26} y={y-10} textAnchor="middle" fill={color} fontSize="9" fontWeight="800">kx</text>
          </g>}
          {ky > 1e-12 && <g>
            <title>{`Vertical spring support ky = ${fmt3(ky)}`}</title>
            <line x1={x} y1={y-7} x2={x} y2={y-12} stroke={color} strokeWidth="1.5"/>
            <polyline points={zig([[x,y-12],[x-4,y-16],[x+4,y-20],[x-4,y-24],[x+4,y-28],[x,y-32]])} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
            <line x1={x-8} y1={y-32} x2={x+8} y2={y-32} stroke={color} strokeWidth="1.5"/>
            <line x1={x-8} y1={y-36} x2={x+8} y2={y-36} stroke={color} strokeWidth="1.5"/>
            <line x1={x-8} y1={y-40} x2={x+8} y2={y-40} stroke={color} strokeWidth="1.5"/>
            <text x={x+11} y={y-28} fill={color} fontSize="9" fontWeight="800">ky</text>
          </g>}
          {kTheta > 1e-12 && <g>
            <title>{`Rotational spring support kθ = ${fmt3(kTheta)}`}</title>
            <path d={`M ${x-17} ${y-17} C ${x-24} ${y-16}, ${x-24} ${y-4}, ${x-17} ${y-3} C ${x-10} ${y-2}, ${x-10} ${y-14}, ${x-17} ${y-15} C ${x-22} ${y-16}, ${x-22} ${y-7}, ${x-16} ${y-8}`} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            <polygon points={`${x-13},${y-7} ${x-16},${y-12} ${x-18},${y-6}`} fill={color}/>
            <text x={x-28} y={y-19} fill={color} fontSize="9" fontWeight="800">kθ</text>
          </g>}
        </g>;
      };
      const formatLoad = v => Number.isFinite(+v) ? (+v).toFixed(Math.abs(+v)>=10 ? 1 : 2).replace(/\.0+$/,"").replace(/(\.\d*[1-9])0+$/, "$1") : "0";

      return <svg width={W} height={H} style={{display:"block",margin:"0 auto",overflow:"visible"}} onMouseLeave={()=>setHover(null)}>
        <defs>
          <filter id="frameGlow"><feDropShadow dx="0" dy="0" stdDeviation="2" floodColor="#58a6ff" floodOpacity="0.35"/></filter>
        </defs>
        {showInternalTitle && <text x="0" y="22" fill={CLR.accent} fontSize="16" fontWeight="800" letterSpacing="0.12em">{overlayTitle}</text>}

        {/* Base frame: one connected line segment per input member */}
        {frameMembers.map((m,idx) => {
          const x1=X(m.xi), y1=Y(m.yi), x2=X(m.xj), y2=Y(m.yj);
          const uv=unitVec(x1,y1,x2,y2);
          const mx=(x1+x2)/2, my=(y1+y2)/2;
          const qyA=+m.qyA||0, qyB=+m.qyB||0, qxA=+m.qxA||0, qxB=+m.qxB||0;
          const hasUDL=(overlayMode === "none") && (Math.abs(qyA)>1e-12||Math.abs(qyB)>1e-12||Math.abs(qxA)>1e-12||Math.abs(qxB)>1e-12);
          return <g key={`member-${m.id || idx}`}>
            {/* High-contrast member backbone: draw every input member visibly */}

            <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#7dd3fc" strokeWidth="5.5" strokeLinecap="round" filter="url(#frameGlow)"/>

            {hasUDL && (()=>{
              const nArr=Math.max(5,Math.round(uv.L/28));

              const arrows=[];
              for(let j=0;j<nArr;j++){
                const t=nArr===1?0.5:j/(nArr-1), bx=x1+t*(x2-x1), by=y1+t*(y2-y1);
                const qy=qyA+(qyB-qyA)*t, qx=qxA+(qxB-qxA)*t;
                const px=qx*uv.ux - qy*uv.nx, py=qx*uv.uy - qy*uv.ny;
                const mag=Math.hypot(px,py)||1, len=10+18*Math.hypot(qx,qy)/qMax;
                arrows.push({bx,by,dx:px/mag,dy:py/mag,len});
              }

              return <g><polyline points={topPts} fill="none" stroke={CLR.yellow} strokeWidth="1.3"/>{arrows.map((ar,j)=><g key={j}><line x1={ar.bx-ar.dx*ar.len} y1={ar.by-ar.dy*ar.len} x2={ar.bx-ar.dx*3} y2={ar.by-ar.dy*3} stroke={CLR.yellow} strokeWidth="1.3"/><polygon points={`${ar.bx},${ar.by} ${ar.bx-ar.dx*8-ar.dy*3},${ar.by-ar.dy*8+ar.dx*3} ${ar.bx-ar.dx*8+ar.dy*3},${ar.by-ar.dy*8-ar.dx*3}`} fill={CLR.yellow}/></g>)}<text x={mx} y={my-36} textAnchor="middle" fill={CLR.yellow} fontSize="10" fontWeight="800">
                {(() => { const qyOn = Math.abs(qyA)>1e-12 || Math.abs(qyB)>1e-12; const qxOn = Math.abs(qxA)>1e-12 || Math.abs(qxB)>1e-12; if (qyOn && qxOn) return `qx: ${formatLoad(qxA)} | ${formatLoad(qxB)} ${U.load} · qy: ${formatLoad(qyA)} | ${formatLoad(qyB)} ${U.load}`; if (qyOn) return `${formatLoad(qyA)} ${U.load} | ${formatLoad(qyB)} ${U.load}`; return `${formatLoad(qxA)} ${U.load} | ${formatLoad(qxB)} ${U.load}`; })()}
              </text></g>;
            })()}
          </g>;
        })}

        {result && (overlayMode === "sfd" || overlayMode === "bmd" || overlayMode === "axial") && solvedMembers.map((mr,idx)=>{
          const data = overlayMode === "sfd" ? mr.sfd : overlayMode === "bmd" ? mr.bmd : mr.axd;
          if (!data || data.length < 2) return null;
          const x1=X(mr.xi), y1=Y(mr.yi), x2=X(mr.xj), y2=Y(mr.yj);
          const uv=unitVec(x1,y1,x2,y2);
          const valueKey = overlayMode === "sfd" ? "V" : overlayMode === "bmd" ? "M" : "N";
          const maxAbs=Math.max(...data.map(p=>Math.abs(p[valueKey])),1e-9);
          const amp=(overlayMode === "bmd" ? 48 : 38)*overlayScale;

          const curvePts=data.map(p=>{ const t=(mr.L>0 ? p.x/mr.L : 0); const bx=x1+t*(x2-x1), by=y1+t*(y2-y1); const val=p[valueKey]; return { sx:bx+uv.nx*(val/maxAbs)*amp, sy:by+uv.ny*(val/maxAbs)*amp, bx, by, val, x:p.x }; });
          const areaPath=`M ${x1},${y1} `+curvePts.map(p=>`L ${p.sx},${p.sy}`).join(" ")+` L ${x2},${y2} Z`;
          const hatchStep=Math.max(4,Math.floor(curvePts.length/14));
          const maxPt=curvePts.reduce((a,p)=>Math.abs(p.val)>Math.abs(a.val)?p:a,curvePts[0]);
          return <g key={`overlay-${idx}`} opacity="0.98">
            <path d={areaPath} fill={color+"24"} stroke={color} strokeWidth="2.4"/>
            {curvePts.filter((_,i)=>i%hatchStep===0).map((p,i)=><line key={i} x1={p.bx} y1={p.by} x2={p.sx} y2={p.sy} stroke={color} strokeWidth="0.85" opacity="0.8"/>)}
            <polyline points={curvePts.map(p=>`${p.sx},${p.sy}`).join(" ")} fill="none" stroke={color} strokeWidth="2.6" strokeLinejoin="round"/>
            <text x={maxPt.sx+6} y={maxPt.sy-6} fill={color} fontSize="13" fontWeight="800">{fmt2(maxPt.val)}</text>
            {curvePts.filter((_,i)=>i%8===0).map((p,i)=><circle key={i} cx={p.sx} cy={p.sy} r="7" fill="transparent" onMouseEnter={()=>setHover({x:p.sx+12,y:p.sy-12,text:`${mr.name}  x=${fmt2(p.x)} ${U.dist}  ${overlayMode.toUpperCase()}=${fmt2(p.val)} ${overlayMode==='bmd'?U.moment:U.force}`})}><title>{`${mr.name}: x=${fmt2(p.x)} ${U.dist}, ${overlayMode.toUpperCase()}=${fmt2(p.val)} ${overlayMode==='bmd'?U.moment:U.force}`}</title></circle>)}
          </g>;
        })}

        {result && overlayMode === "deformed" && solvedMembers.map((mr,idx)=>{
          const pts=(mr.defl||[]).map(p=>{ const t=mr.L>0?p.x/mr.L:0; const bx=mr.xi+t*(mr.xj-mr.xi), by=mr.yi+t*(mr.yj-mr.yi); return { sx:X(bx+p.ux*overlayScale), sy:Y(by+p.uy*overlayScale), x:p.x, ux:p.ux, uy:p.uy }; });
          if (pts.length<2) return null;
          return <g key={`def-${idx}`}><polyline points={pts.map(p=>`${p.sx},${p.sy}`).join(" ")} fill="none" stroke={CLR.orange} strokeWidth="2.2" strokeDasharray="6,4"/>{pts.filter((_,i)=>i%8===0).map((p,i)=><circle key={i} cx={p.sx} cy={p.sy} r="7" fill="transparent" onMouseEnter={()=>setHover({x:p.sx+12,y:p.sy-12,text:`${mr.name}  x=${fmt2(p.x)} ${U.dist}  ux=${fmt3(p.ux)} ${U.disp}, uy=${fmt3(p.uy)} ${U.disp}`})}><title>{`${mr.name}: x=${fmt2(p.x)} ${U.dist}, ux=${fmt3(p.ux)} ${U.disp}, uy=${fmt3(p.uy)} ${U.disp}`}</title></circle>)}</g>;
        })}

        {result && overlayMode === "mode" && modeShape && (()=>{
          const baseSpan = Math.max(dx, dy, 1);
          const rawMembers = frameMembers.map((m,idx) => {
            const iNode = result.nodes.findIndex(n => String(n.label).trim() === String(m.near).trim());
            const jNode = result.nodes.findIndex(n => String(n.label).trim() === String(m.far).trim());
            if (iNode < 0 || jNode < 0) return { idx, pts:[] };
            const ux1=modeShape.full[iNode*3] || 0, uy1=modeShape.full[iNode*3+1] || 0, rz1=modeShape.full[iNode*3+2] || 0;
            const ux2=modeShape.full[jNode*3] || 0, uy2=modeShape.full[jNode*3+1] || 0, rz2=modeShape.full[jNode*3+2] || 0;
            const Lcoord = Math.hypot((m.xj-m.xi), (m.yj-m.yi)) || 1;
            const c=(m.xj-m.xi)/Lcoord, sn=(m.yj-m.yi)/Lcoord;
            const u1=ux1*c+uy1*sn, v1=-ux1*sn+uy1*c, u2=ux2*c+uy2*sn, v2=-ux2*sn+uy2*c;
            const pts=[];
            for (let k=0;k<=40;k++) {
              const t=k/40;
              const N1=1-3*t*t+2*t*t*t, N2=Lcoord*(t-2*t*t+t*t*t), N3=3*t*t-2*t*t*t, N4=Lcoord*(-t*t+t*t*t);
              const u=u1+(u2-u1)*t;
              const v=N1*v1+N2*rz1+N3*v2+N4*rz2;
              const dxg=u*c-v*sn, dyg=u*sn+v*c;
              pts.push({ x:m.xi+t*(m.xj-m.xi), y:m.yi+t*(m.yj-m.yi), dxg, dyg, t });
            }
            return { idx, name:m.name || `${m.near}-${m.far}`, pts };
          });
          const maxRaw = Math.max(...rawMembers.flatMap(r => r.pts.map(p => Math.hypot(p.dxg, p.dyg))), 1e-9);
          const amp = baseSpan * 0.12 * overlayScale;
          return <g>
            {rawMembers.map(r => {
              const pts = r.pts.map(p => ({ sx:X(p.x + p.dxg/maxRaw*amp), sy:Y(p.y + p.dyg/maxRaw*amp), p }));
              if (pts.length < 2) return null;
              return <g key={`mode-${r.idx}`}>
                <polyline points={pts.map(q=>`${q.sx},${q.sy}`).join(" ")} fill="none" stroke={CLR.yellow} strokeWidth="2.6" strokeDasharray="8,4" />
                {pts.filter((_,i)=>i%8===0).map((q,i)=><circle key={i} cx={q.sx} cy={q.sy} r="7" fill="transparent" onMouseEnter={()=>setHover({x:q.sx+12,y:q.sy-12,text:`Mode ${modeShape.mode} · ${r.name} · normalized shape`})}><title>{`Mode ${modeShape.mode}: ${r.name}`}</title></circle>)}
              </g>;
            })}
            <text x={W-205} y={H-48} fill={CLR.yellow} fontSize="11" fontWeight="800">T = {fmt3(modeShape.period)} s</text>
            <text x={W-205} y={H-32} fill={CLR.yellow} fontSize="11" fontWeight="800">λ = ω² = {fmt3(modeShape.lambda)}</text>
            <text x={W-205} y={H-16} fill={CLR.muted} fontSize="10">Mass-based eigenvector scaled for display</text>
          </g>;
        })()}

        {cleanNodes.map(n=>{ const x=X(+n.x||0), y=Y(+n.y||0); return <g key={`node-${n.id || n.label}`}><Support n={n} x={x} y={y}/><SpringSupports n={n} x={x} y={y}/><NodeCircle x={x} y={y}/><text x={x-18} y={y-12} fill={CLR.text} fontWeight="800">{n.label}</text>{overlayMode === "none" && (+n.fx||0)!==0 && <g><line x1={x-28} y1={y} x2={x-8} y2={y} stroke={CLR.orange} strokeWidth="2"/><polygon points={`${x-8},${y} ${x-15},${y-4} ${x-15},${y+4}`} fill={CLR.orange}/><text x={x-58} y={y-6} fill={CLR.orange}>{n.fx} {U.force}</text></g>}{overlayMode === "none" && (+n.fy||0)!==0 && <g><line x1={x} y1={y-28} x2={x} y2={y-8} stroke={CLR.orange} strokeWidth="2"/><polygon points={`${x},${y-8} ${x-4},${y-15} ${x+4},${y-15}`} fill={CLR.orange}/><text x={x+8} y={y-22} fill={CLR.orange}>{n.fy} {U.force}</text></g>}</g>})}

        {(overlayMode === "bmd" || overlayMode === "sfd" || overlayMode === "axial") && <g transform={`translate(${W-205},${P+20})`}><rect x="0" y="0" width="180" height="120" rx="8" fill={CLR.bg} stroke={CLR.border}/><text x="90" y="28" textAnchor="middle" fill={CLR.accent} fontWeight="800" fontSize="12">{overlayMode === "bmd" ? "BENDING MOMENT" : overlayMode === "sfd" ? "SHEAR FORCE" : "AXIAL LOAD"}</text><line x1="25" y1="55" x2="155" y2="55" stroke={CLR.accent} strokeWidth="3"/><path d="M25,55 C65,82 115,82 155,55" fill={(overlayMode === "bmd" ? CLR.violet : overlayMode === "sfd" ? CLR.teal : CLR.red)+"22"} stroke={overlayMode === "bmd" ? CLR.violet : overlayMode === "sfd" ? CLR.teal : CLR.red}/><text x="25" y="93" fill={overlayMode === "bmd" ? CLR.violet : overlayMode === "sfd" ? CLR.teal : CLR.red} fontSize="11">Hover for values</text><text x="25" y="110" fill={CLR.muted} fontSize="10">Units: {overlayMode === "bmd" ? U.moment : U.force}</text></g>}
        {hover && <g pointerEvents="none"><rect x={hover.x} y={hover.y-22} width={Math.min(430, hover.text.length*7+18)} height="26" rx="5" fill={CLR.bg} stroke={CLR.accent}/><text x={hover.x+9} y={hover.y-5} fill={CLR.text} fontSize="11">{hover.text}</text></g>}
      </svg>;
    }

    function Chart({ data, yKey, title, color }) {
      if (!data || data.length === 0) return null;
      return <TwoWayStyleChart data={data} yKey={yKey} color={color} label={title} unit="" compact={true} />;
    }

    function TwoWayStyleChart({ data, yKey, color, label, unit="", compact=false, invertMoment=false, report=false }) {
      if (!data || data.length === 0) return null;
      const W = report ? 900 : 900;
      const H = report ? 175 : (compact ? 180 : 240);
      const PADX = report ? 58 : 56;
      const PADY = report ? 24 : 24;
      const xs = data.map(d => +d.x || 0);
      const ys = data.map(d => +(d[yKey] || 0));
      const minX = Math.min(...xs, 0);
      const maxX = Math.max(...xs, 1);
      const minY = Math.min(...ys, 0);
      const maxY = Math.max(...ys, 0);
      const rangeX = maxX - minX || 1;
      const maxAbs = Math.max(Math.abs(minY), Math.abs(maxY), 1e-9);
      const scX = (W - 2 * PADX) / rangeX;
      const scY = (H - 2 * PADY) / (maxAbs * 2.2 || 1);
      const zeroY = H / 2;
      const toSvg = (x, y) => ({
        sx: PADX + (x - minX) * scX,
        sy: invertMoment ? (H / 2 + y * scY) : (H / 2 - y * scY)
      });
      const pts = data.map(d => {
        const { sx, sy } = toSvg(+d.x || 0, +(d[yKey] || 0));
        return `${sx},${sy}`;
      }).join(" ");
      const areaPath = data.map((d, i) => {
        const { sx, sy } = toSvg(+d.x || 0, +(d[yKey] || 0));
        return (i === 0 ? `M ${sx},${zeroY} L ${sx},${sy}` : `L ${sx},${sy}`);
      }).join(" ") + ` L ${toSvg(+data[data.length-1].x || 0, 0).sx},${zeroY} Z`;
      const tickVals = [maxAbs/2, maxAbs, -maxAbs/2, -maxAbs].filter(v => Math.abs(v) > 1e-9);
      const step = Math.max(1, Math.round(data.length / (report ? 6 : 8)));
      const fmtTick = v => Number.isFinite(v) ? (Math.abs(v) >= 100 ? v.toFixed(0) : Math.abs(v) >= 10 ? v.toFixed(1) : v.toFixed(2)) : "—";
      return (
        <svg className={report ? "report-svg" : undefined} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", margin:"0 auto", background:"transparent", overflow:"visible" }}>
          <line x1={PADX} y1={zeroY} x2={W-PADX} y2={zeroY} stroke={CLR.border} strokeWidth={1} />
          {tickVals.map((v, i) => {
            const y = invertMoment ? (H/2 + v * scY) : (H/2 - v * scY);
            if (y < 4 || y > H-4) return null;
            return (
              <g key={i}>
                <line x1={PADX-3} y1={y} x2={W-PADX} y2={y} stroke={CLR.border} strokeWidth={0.5} strokeDasharray="3,3" />
                <text x={PADX-5} y={y+4} textAnchor="end" fontSize={report ? 8 : 9} fill={CLR.muted}>{fmtTick(v)}</text>
              </g>
            );
          })}
          <path d={areaPath} fill={color+"33"} />
          <polyline points={pts} fill="none" stroke={color} strokeWidth={report ? 2 : 2} strokeLinejoin="round" />
          {data.filter((_, i) => i % step === 0 || i === data.length - 1).map((d, i) => {
            const { sx } = toSvg(+d.x || 0, 0);
            return <text key={i} x={sx} y={H-4} textAnchor="middle" fontSize={report ? 8 : 9} fill={CLR.muted}>{fmtTick(+d.x || 0)}</text>;
          })}
          <text x={PADX} y={12} fontSize={report ? 9 : 10} fill={color} fontWeight="700">{label}{unit ? ` [${unit}]` : ""}</text>
          <text x={W-PADX} y={H-4} textAnchor="end" fontSize={report ? 8 : 9} fill={CLR.muted}>x</text>
          <line x1={PADX} y1={PADY} x2={PADX} y2={H-PADY} stroke={CLR.border} strokeWidth={1} />
        </svg>
      );
    }

    function MemberDiagram({ member, dataType, title, color, unitLabel }) {
      if (!member) return null;
      const yKey = dataType === "N" ? "N" : dataType === "V" ? "V" : dataType === "M" ? "M" : dataType === "theta" ? "thetaLocal" : "vLocal";
      const data = dataType === "N" ? (member.axd || []) : dataType === "V" ? (member.sfd || []) : dataType === "M" ? (member.bmd || []) : (member.defl || []);
      if (!data || data.length === 0) return null;
      return <TwoWayStyleChart data={data} yKey={yKey} color={color} label={`${title} — member ${member.name}`} unit={unitLabel} invertMoment={dataType === "M"} />;
    }

    function reportSeriesStats(data, key) {
      const vals = (data || []).map(p => ({ x:+p.x || 0, y:+p[key] || 0 })).filter(p => Number.isFinite(p.y));
      if (!vals.length) return { min:null, max:null, start:null, end:null, labelPts:[] };
      const min = vals.reduce((a,p)=>p.y<a.y?p:a, vals[0]);
      const max = vals.reduce((a,p)=>p.y>a.y?p:a, vals[0]);
      const start = vals[0], end = vals[vals.length-1];
      const labelPts = [];
      [start, end, max, min].forEach((p,idx) => {
        if (!p) return;
        const duplicate = labelPts.some(q => Math.abs(q.x-p.x) < 1e-9 && Math.abs(q.y-p.y) < 1e-9);
        if (!duplicate) labelPts.push({ ...p, role:["Near", "Far", "Max", "Min"][idx] });
      });
      return { min, max, start, end, labelPts };
    }

    function ReportDiagram({ member, dataType, title, color, unitLabel }) {
      if (!member) return null;
      const yKey = dataType === "N" ? "N" : dataType === "V" ? "V" : dataType === "M" ? "M" : "vLocal";
      const data = dataType === "N" ? (member.axd || []) : dataType === "V" ? (member.sfd || []) : dataType === "M" ? (member.bmd || []) : (member.defl || []);
      if (!data || data.length < 2) return null;
      const stats = reportSeriesStats(data, yKey);
      return <div className="report-diagram-block">
        <TwoWayStyleChart data={data} yKey={yKey} color={color} label={title} unit={unitLabel} invertMoment={dataType === "M"} report={true} />
        <div className="report-note">Max = {stats.max ? `${fmt3(stats.max.y)} ${unitLabel} at x=${fmt2(stats.max.x)}` : "—"}; Min = {stats.min ? `${fmt3(stats.min.y)} ${unitLabel} at x=${fmt2(stats.min.x)}` : "—"}.</div>
      </div>;
    }


    function AnalysisPrintReport({ result, units, reportTitle="Analysis Results", reportSubtitle="" }) {
      if (!result || result.error) return null;
      const U = UNIT_SETS[units] || UNIT_SETS["kip/ft"];
      const printedAt = new Date().toLocaleString();
      const memberSummary = (result.memberResults || []).map(m => ({
        m,
        nStats: reportSeriesStats(m.axd || [], "N"),
        sStats: reportSeriesStats(m.sfd || [], "V"),
        mStats: reportSeriesStats(m.bmd || [], "M"),
        dStats: reportSeriesStats(m.defl || [], "vLocal")
      }));
      const memberRows = result.members || [];
      const supportReactions = (result.reactions || []).filter(r=>r.support!=="Free" || r.hasSpring);
      const hasModes = (result.eigenModes || []).length > 0;
      const rs = result.responseSpectrum;
      return <div className="print-report">
        <div className="report-page report-summary-page">
          <div className="report-cover">
            <div className="report-title">Frames v0.6.6 — Analysis and Design Report</div>
            <div className="report-subtitle">{reportTitle}{reportSubtitle ? ` — ${reportSubtitle}` : ""} · Units: {units} · Printed {printedAt}</div>
            <div className="report-note">This PDF report contains the analysis tables, input summary, dynamic tables where applicable, and all member axial/shear/moment/deflection diagrams. Values are taken from the solved analysis result currently shown on screen.</div>
          </div>
          <div className="report-title">Analysis Summary Tables</div>
          <div className="report-subtitle">Reactions, nodal displacements, and member end forces for the selected result case.</div>

          <div className="report-block">
            <div className="report-h2">Table 1: Reactions</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Node", "Support", `Rx (${U.force})`, `Ry (${U.force})`, `Mz (${U.moment})`].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{supportReactions.length ? supportReactions.map(r=><tr key={r.label}><td>{r.label}</td><td>{r.supportLabel || r.support}</td><td>{fmt3(r.Rx)}</td><td>{fmt3(r.Ry)}</td><td>{fmt3(r.Mz)}</td></tr>) : <tr><td colSpan="5">No restrained reactions reported.</td></tr>}</tbody></table></div>
          </div>

          <div className="report-block">
            <div className="report-h2">Table 2: Nodal Displacements</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Node", `ux (${U.disp})`, `uy (${U.disp})`, "θz (rad)"].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{(result.displacements || []).map(d=><tr key={d.label}><td>{d.label}</td><td>{fmt3(d.ux)}</td><td>{fmt3(d.uy)}</td><td>{fmt3(d.rz)}</td></tr>)}</tbody></table></div>
          </div>

          <div className="report-block">
            <div className="report-h2">Table 3: Member End Forces</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Member", "Release", `N1 (${U.force})`, `V1 (${U.force})`, `M1 (${U.moment})`, `N2 (${U.force})`, `V2 (${U.force})`, `M2 (${U.moment})`].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{(result.memberResults || []).map(m=><tr key={m.name}><td>{m.name}</td><td>{m.release}</td>{(m.qDisplay || []).map((v,j)=><td key={j}>{fmt3(v)}</td>)}</tr>)}</tbody></table></div>
          </div>
        </div>

        <div className="report-page">
          <div className="report-title">Model Input Summary</div>
          <div className="report-subtitle">Geometry, supports, material properties, releases, and active member loads used for this result case.</div>
          <div className="report-block">
            <div className="report-h2">Node Coordinates, Supports, and Nodal Loads</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Node", `x (${U.dist})`, `y (${U.dist})`, "Support", `kx (${U.force}/${U.disp})`, `ky (${U.force}/${U.disp})`, `kθ (${U.moment}/rad)`, `Fx (${U.force})`, `Fy (${U.force})`, `Mz (${U.moment})`].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{(result.nodes || []).map(n=><tr key={n.label}><td>{n.label}</td><td>{fmt3(+n.x || 0)}</td><td>{fmt3(+n.y || 0)}</td><td>{n.support || "Free"}</td><td>{fmt3(+n.kx || 0)}</td><td>{fmt3(+n.ky || 0)}</td><td>{fmt3(+n.kTheta || 0)}</td><td>{fmt3(+n.fx || 0)}</td><td>{fmt3(+n.fy || 0)}</td><td>{fmt3(+n.mz || 0)}</td></tr>)}</tbody></table></div>
          </div>
          <div className="report-block">
            <div className="report-h2">Member Definitions and Member Loads</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Member", "Near", "Far", "Release", `E (${U.E})`, `A (${U.area})`, `I (${U.inertia})`, `qxA (${U.load})`, `qxB (${U.load})`, `qyA (${U.load})`, `qyB (${U.load})`, `Px (${U.force})`, `Py (${U.force})`, `a (${U.dist})`].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{memberRows.map(m=><tr key={m.id || m.name}><td>{m.name}</td><td>{m.near}</td><td>{m.far}</td><td>{m.release || "Fix-Fix"}</td><td>{fmt3(+m.E || 0)}</td><td>{fmt3(+m.A || 0)}</td><td>{fmt3(+m.I || 0)}</td><td>{fmt3(+m.qxA || 0)}</td><td>{fmt3(+m.qxB || 0)}</td><td>{fmt3(+m.qyA || 0)}</td><td>{fmt3(+m.qyB || 0)}</td><td>{fmt3(+m.pointPx || 0)}</td><td>{fmt3(+m.pointPy || 0)}</td><td>{fmt3(+m.pointA || 0)}</td></tr>)}</tbody></table></div>
          </div>
        </div>

        {hasModes && <div className="report-page">
          <div className="report-title">Dynamic Mode Shape Results</div>
          <div className="report-subtitle">Mass-based eigenvalue and mode shape tables shown in the Results section.</div>
          <div className="report-block">
            <div className="report-h2">Mode Summary</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr>{["Mode", "Period T (s)", "Frequency (Hz)", "λ = ω²", "Mass % X", "Mass % Y"].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{(result.eigenModes || []).map(m=><tr key={m.mode}><td>{m.mode}</td><td>{fmt3(m.period)}</td><td>{fmt3(m.frequency)}</td><td>{fmt3(m.lambda)}</td><td>{fmt2(m.participationX)}</td><td>{fmt2(m.participationY)}</td></tr>)}</tbody></table></div>
          </div>
          {(result.eigenModes || []).map(m=><div className="report-block" key={m.mode}>
            <div className="report-h3">Mode {m.mode} Eigenvector Components</div>
            <div className="report-table-wrap"><table className="report-table"><thead><tr><th>Free DOF</th><th>φ</th></tr></thead><tbody>{(m.components || []).map(c=><tr key={c.label}><td>{c.label}</td><td>{fmt3(c.value)}</td></tr>)}</tbody></table></div>
          </div>)}
        </div>}

        {rs && <div className="report-page">
          <div className="report-title">Response Spectrum Results — SRSS</div>
          <div className="report-subtitle">Direction {rs.settings.direction} · Damping = {fmt2(rs.settings.damping)}% · SRSS base shear = {fmt2(rs.srssBaseShear)}</div>
          <div className="report-block">

    // Response spectrum graph removed by request. Spectrum values are edited in the table below.

    function InputsView({ nodes,setNodes,members,setMembers,loadCases,setLoadCases,loadCombinations,setLoadCombinations,activeLoadCaseId,setActiveLoadCaseId,massSource,setMassSource,rsSettings,setRsSettings,units,setUnits,onRun }) {
      const U = UNIT_SETS[units] || UNIT_SETS["kip/ft"];
      const activeLC = loadCases.find(lc => lc.id === activeLoadCaseId) || loadCases[0] || DEFAULT_LOAD_CASES[0];
      const preview = mergeLoadCaseLoads(nodes, members, activeLC);
      const updN=(id,f,v)=>setNodes(p=>p.map(n=>n.id===id?{...n,[f]:v}:n));
      const updM=(id,f,v)=>setMembers(p=>p.map(m=>m.id===id?{...m,[f]:v}:m));

      const duplicateLoadCase=()=>setLoadCases(p=>{ const id=p.reduce((m,lc)=>Math.max(m,lc.id||0),0)+1; setActiveLoadCaseId(id); return [...p,{ ...JSON.parse(JSON.stringify(activeLC)), id, name:`${activeLC.name} Copy` }]; });
      const delLoadCase=id=>setLoadCases(p=>{ const next=p.filter(lc=>lc.id!==id); if(activeLoadCaseId===id && next[0]) setActiveLoadCaseId(next[0].id); return next.length?next:p; });
      const addCombo=()=>setLoadCombinations(p=>{ const id=p.reduce((m,c)=>Math.max(m,c.id||0),0)+1; return [...p,{ id, name:`Combo ${p.length+1}`, type:"ULS", enabled:true, terms:[{id:Date.now(), loadCaseId:(loadCases[0]||{}).id||1, factor:1.0}] }]; });
      const duplicateCombo=combo=>setLoadCombinations(p=>{ const id=p.reduce((m,c)=>Math.max(m,c.id||0),0)+1; return [...p,{ ...JSON.parse(JSON.stringify(combo)), id, name:`${combo.name} Copy` }]; });
      const delCombo=id=>setLoadCombinations(p=>p.filter(c=>c.id!==id));
      const updCombo=(id,f,v)=>setLoadCombinations(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));
      const addComboTerm=comboId=>setLoadCombinations(p=>p.map(c=>c.id===comboId?{...c,terms:[...(c.terms||[]),{id:Date.now()+Math.random(), loadCaseId:(loadCases[0]||{}).id||1, factor:1.0}]}:c));
      const delComboTerm=(comboId,termId)=>setLoadCombinations(p=>p.map(c=>c.id===comboId?{...c,terms:(c.terms||[]).filter(t=>t.id!==termId)}:c));

      const resetDefault=()=>{ setNodes(DEFAULT_NODES.map(n=>({...n, fx:0, fy:0, mz:0}))); setMembers(DEFAULT_MEMBERS.map(m=>({...m, qxA:0, qxB:0, qyA:0, qyB:0, pointPx:0, pointPy:0, pointA:0}))); setLoadCases(DEFAULT_LOAD_CASES.map(lc=>JSON.parse(JSON.stringify(lc)))); setLoadCombinations(DEFAULT_LOAD_COMBINATIONS.map(c=>JSON.parse(JSON.stringify(c)))); setActiveLoadCaseId(DEFAULT_LOAD_CASES[0].id); setMassSource(JSON.parse(JSON.stringify(DEFAULT_MASS_SOURCE))); setRsSettings(JSON.parse(JSON.stringify(DEFAULT_RS_SETTINGS))); };
      const [newSpectrumPoint, setNewSpectrumPoint] = useState({ T:0.2, Sa:1.05 });
      const [spectrumText, setSpectrumText] = useState("0.2, 1.05\n0.5, 0.838\n1.0, 0.487\n2.0, 0.295");
      const updRS=(f,v)=>setRsSettings(p=>({...p,[f]:v}));
      const updSpectrum=(id,f,v)=>setRsSettings(p=>({...p,spectrum:(p.spectrum||[]).map(row=>row.id===id?{...row,[f]:v}:row)}));
      const sortSpectrum = pts => [...(pts||[])].map((pt,i)=>({ id:pt.id || Date.now()+i, T:+pt.T || 0, Sa:+pt.Sa || 0 })).sort((a,b)=>a.T-b.T);
      const addSpectrumPoint=()=>setRsSettings(p=>({...p,spectrum:sortSpectrum([...(p.spectrum||[]),{id:Date.now()+Math.random(),T:+newSpectrumPoint.T||0,Sa:+newSpectrumPoint.Sa||0}])}));
      const addBlankSpectrumRow=()=>setRsSettings(p=>({...p,spectrum:[...(p.spectrum||[]),{id:Date.now()+Math.random(),T:1,Sa:0.1}]}));
      const sortSpectrumPoints=()=>setRsSettings(p=>({...p,spectrum:sortSpectrum(p.spectrum||[])}));
      const resetSpectrumPoints=()=>setRsSettings(p=>({...p,spectrum:DEFAULT_RESPONSE_SPECTRUM.map(pt=>({...pt}))}));
      const clearSpectrumPoints=()=>setRsSettings(p=>({...p,spectrum:[]}));
      const parseSpectrumText=()=>{
        const rows = String(spectrumText || "").split(/\n+/).map(line => line.trim()).filter(Boolean);
        const pts = [];
        rows.forEach((line, i) => {
          const cleaned = line.replace(/[;\t]+/g, ",").replace(/\s*,\s*/g, ",");
          const parts = cleaned.includes(",") ? cleaned.split(",") : cleaned.split(/\s+/);
          const nums = parts.map(x => Number(String(x).replace(/[^0-9eE+\-.]/g, ""))).filter(Number.isFinite);
          if (nums.length >= 2 && nums[0] > 0 && nums[1] > 0) pts.push({ id:Date.now()+i+Math.random(), T:nums[0], Sa:nums[1] });
        });
        if (pts.length) setRsSettings(p=>({...p,spectrum:sortSpectrum(pts)}));

          const cleaned = line.replace(/[;\t]+/g, ",").replace(/\s*,\s*/g, ",");

      const duplicateSpectrumPoint=id=>setRsSettings(p=>{ const pts=p.spectrum||[]; const idx=pts.findIndex(row=>row.id===id); if(idx<0) return p; const row=pts[idx]; const copy={...row,id:Date.now()+Math.random()}; return {...p,spectrum:[...pts.slice(0,idx+1),copy,...pts.slice(idx+1)]}; });
      const insertSpectrumPointBelow=id=>setRsSettings(p=>{ const pts=p.spectrum||[]; const idx=pts.findIndex(row=>row.id===id); const base=idx>=0?pts[idx]:null; const next=idx>=0?pts[idx+1]:null; const T=base&&next?(+base.T + +next.T)/2:base?(+base.T||0)+0.1:1; const Sa=base&&next?(+base.Sa + +next.Sa)/2:base?(+base.Sa||0):0.1; const row={id:Date.now()+Math.random(),T:+T||0,Sa:+Sa||0}; return {...p,spectrum:idx>=0?[...pts.slice(0,idx+1),row,...pts.slice(idx+1)]:[...pts,row]}; });
      const updMassItem=(id,f,v)=>setMassSource(p=>({...p,items:(p.items||[]).map(it=>it.id===id?{...it,[f]:v}:it)}));
      const addMassItem=()=>setMassSource(p=>({...p,items:[...(p.items||[]),{id:Date.now(),loadCaseId:(loadCases[0]||{}).id||1,factor:1,includeNodal:true,includeMember:true}]}));
      const delMassItem=id=>setMassSource(p=>({...p,items:(p.items||[]).filter(it=>it.id!==id)}));
      return <div>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:"1.5rem", flexWrap:"wrap" }}>
          <div><div style={{ fontSize:22, fontWeight:800, color:CLR.text, letterSpacing:"-0.02em" }}>Frame Inputs</div><div style={{ color:CLR.muted, fontSize:12, marginTop:2 }}>Define geometry once, then assign nodal and member loads to separate load cases.</div></div>

        </div>

        <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div><div style={S.h2}>Load Case Manager</div><div style={{ fontSize:11, color:CLR.muted }}>Select the active load case, then enter the nodal and member loads below. The analysis runs every load case separately.</div></div><button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addLoadCase}>+ Add Case</button><button style={{ ...S.btn("ghost"), padding:"4px 12px", fontSize:11 }} onClick={duplicateLoadCase}>⧉ Duplicate Active</button></div>

                </div>

            <div style={{ background:CLR.bg, border:`1px solid ${CLR.border}`, borderRadius:6, overflow:"hidden", marginTop:"1rem" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"0.75rem 0.9rem", borderBottom:`1px solid ${CLR.border}`, flexWrap:"wrap" }}>
