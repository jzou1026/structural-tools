              </div>
              <div style={{ overflowX:"auto", maxHeight:"none" }}>
                <table style={{ ...S.table, minWidth:760 }}>
                  <thead><tr><th style={S.th}>Point</th><th style={S.th}>T (s)</th><th style={S.th}>Sa (g)</th><th style={S.th}>Actions</th></tr></thead>
                  <tbody>{(rsSettings.spectrum||[]).length ? (rsSettings.spectrum||[]).map((pt,i)=><tr key={pt.id} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={{ ...S.td, color:CLR.violet, fontWeight:700 }}>{i+1}</td><td style={S.td}><input type="number" step="0.001" min="0" style={S.input} value={pt.T} onChange={e=>updSpectrum(pt.id,"T",+e.target.value)} title="Edit response spectrum period T in seconds"/></td><td style={S.td}><input type="number" step="0.0001" min="0" style={S.input} value={pt.Sa} onChange={e=>updSpectrum(pt.id,"Sa",+e.target.value)} title="Edit spectral acceleration Sa in g"/></td><td style={S.td}><div style={{ display:"flex", gap:4, justifyContent:"center", flexWrap:"wrap" }}><button title="Insert interpolated point below" style={{ ...S.btn("ghost"), padding:"3px 7px", fontSize:10 }} onClick={()=>insertSpectrumPointBelow(pt.id)}>+ Below</button><button title="Duplicate this point" style={{ ...S.btn("ghost"), padding:"3px 7px", fontSize:10 }} onClick={()=>duplicateSpectrumPoint(pt.id)}>⧉</button><button title="Delete this response spectrum point" style={{ ...S.btn("danger"), padding:"3px 7px", fontSize:10 }} onClick={()=>delSpectrumPoint(pt.id)}>✕</button></div></td></tr>) : <tr><td style={{...S.td,color:CLR.muted}} colSpan="4">No spectrum points defined. Add a blank row, insert a point, paste/import points, or load the NBCC example.</td></tr>}</tbody>
                </table>
              </div>
              <div style={{ padding:"0.65rem 0.9rem", borderTop:`1px solid ${CLR.border}`, color:CLR.muted, fontSize:10 }}>This table displays every response spectrum point currently inputted by the user. It is intentionally placed full-width below Mass Source and Spectrum Input. Edit any T or Sa cell directly. Use Sort by T after editing periods. Only positive T and Sa values are used for log-log interpolation.</div>
            </div>
            <div style={{ marginTop:"0.8rem", fontSize:11, color:CLR.muted }}>Spectrum points are fully user-defined. Use the point editor, paste/import any two-column spectrum, clear the table, or load the NBCC example. Sa(T) values between points are evaluated with log-log interpolation.</div>
          </div>}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1.45fr", gap:"1.5rem" }}>
          <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div style={S.h2}>Table 1A: Nodes</div><button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addNode}>+ Add Node</button></div>
            <div style={{ overflowX:"auto" }}><table style={S.table}><thead><tr>{["Node",`x (${U.dist})`,`y (${U.dist})`,"—"].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead><tbody>{nodes.map((n,i)=><tr key={n.id} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={S.td}><input style={S.input} value={n.label} onChange={e=>updN(n.id,"label",e.target.value)}/></td><td style={S.td}><input type="number" style={S.input} value={n.x} onChange={e=>updN(n.id,"x",+e.target.value)}/></td><td style={S.td}><input type="number" style={S.input} value={n.y} onChange={e=>updN(n.id,"y",+e.target.value)}/></td><td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }} onClick={()=>delNode(n.id)}>✕</button></td></tr>)}</tbody></table></div>
          </div>

          <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div><div style={S.h2}>Table 1B: Supports & Nodal Loads</div><div style={{ fontSize:11, color:CLR.muted }}>Loads shown for active case: <strong style={{ color:CLR.yellow }}>{activeLC.name}</strong></div></div></div>
            <div style={{ overflowX:"auto" }}><table style={S.table}><thead><tr>{["Node","Support",`kx (${U.force}/${U.disp})`,`ky (${U.force}/${U.disp})`,`kθ (${U.moment}/rad)`,`Fx (${U.force})`,`Fy (${U.force})`,`Mz (${U.moment})`].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead><tbody>{nodes.map((n,i)=>{ const L=nodeLoadFor(activeLC,n.id); return <tr key={n.id} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={{...S.td,color:CLR.accent,fontWeight:700}}>{n.label}</td><td style={S.td}><select style={{...S.select,minWidth:120}} value={n.support} onChange={e=>updN(n.id,"support",e.target.value)}>{SUPPORTS.map(s=><option key={s}>{s}</option>)}</select></td><td style={S.td}><input type="number" min="0" step="0.001" style={S.input} value={n.kx || 0} onChange={e=>updN(n.id,"kx",+e.target.value)} title="Horizontal translational spring stiffness in force/displacement"/></td><td style={S.td}><input type="number" min="0" step="0.001" style={S.input} value={n.ky || 0} onChange={e=>updN(n.id,"ky",+e.target.value)} title="Vertical translational spring stiffness in force/displacement"/></td><td style={S.td}><input type="number" min="0" step="0.001" style={S.input} value={n.kTheta || 0} onChange={e=>updN(n.id,"kTheta",+e.target.value)} title="Rotational spring stiffness in moment/radian"/></td><td style={S.td}><input type="number" style={S.input} value={L.fx} onChange={e=>updNLoad(n.id,"fx",+e.target.value)}/></td><td style={S.td}><input type="number" style={S.input} value={L.fy} onChange={e=>updNLoad(n.id,"fy",+e.target.value)}/></td><td style={S.td}><input type="number" style={S.input} value={L.mz} onChange={e=>updNLoad(n.id,"mz",+e.target.value)}/></td></tr>})}</tbody></table></div>
            <div style={{ padding:"0.6rem 1rem", fontSize:11, color:CLR.muted, borderTop:`1px solid ${CLR.border}` }}><strong style={{ color:CLR.teal }}>Fixed</strong> = ux, uy, θ restrained · <strong style={{ color:CLR.yellow }}>Pinned</strong> = ux, uy restrained · rollers restrain one translation only · spring values add elastic restraint without fully fixing a DOF · springs are drawn on the diagram in yellow and tagged as <strong style={{ color:CLR.yellow }}>kx</strong>, <strong style={{ color:CLR.yellow }}>ky</strong>, and <strong style={{ color:CLR.yellow }}>kθ</strong>.</div>
          </div>
        </div>

        <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div><div style={S.h2}>Table 3: Members and Local-Axis Loads</div><div style={{ fontSize:11, color:CLR.muted }}>Geometry/properties are shared. Local-axis loads below belong to active case <strong style={{ color:CLR.yellow }}>{activeLC.name}</strong>.</div></div><button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addMember}>+ Add Member</button></div>
          <div style={{ overflowX:"auto" }}><table style={S.table}><thead><tr>{["Member","Near","Far","Release",`E (${U.E})`,`A (${U.area})`,`I (${U.inertia})`,`qxA (${U.load})`,`qxB (${U.load})`,`qyA (${U.load})`,`qyB (${U.load})`,`Px (${U.force})`,`Py (${U.force})`,`a from near (${U.dist})`,"—"].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead><tbody>{members.map((m,i)=>{ const L=memberLoadFor(activeLC,m.id); return <tr key={m.id} style={{ background:i%2===0?"transparent":"#ffffff05" }}>{["name","near","far"].map(f=><td style={S.td} key={f}><input style={S.input} value={m[f]} onChange={e=>updM(m.id,f,e.target.value)}/></td>)}<td style={S.td}><select style={{ ...S.select, minWidth:90 }} value={m.release || "Fix-Fix"} onChange={e=>updM(m.id,"release",e.target.value)}>{MEMBER_RELEASES.map(r=><option key={r}>{r}</option>)}</select></td>{["E","A","I"].map(f=><td style={S.td} key={f}><input type="number" style={S.input} value={m[f]} onChange={e=>updM(m.id,f,+e.target.value)}/></td>)}{["qxA","qxB","qyA","qyB","pointPx","pointPy","pointA"].map(f=><td style={S.td} key={f}><input type="number" style={S.input} value={L[f]} onChange={e=>updMLoad(m.id,f,+e.target.value)}/></td>)}<td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }} onClick={()=>delMember(m.id)}>✕</button></td></tr>})}</tbody></table></div>
        </div>
        <div style={{ ...S.card }}><div style={S.h2}>Figure 1: Frame Preview — Active Load Case</div><FrameDiagram nodes={preview.nodes} members={preview.members} units={units}/></div>
        <div style={{ ...S.card, background:CLR.surface, fontSize:11, color:CLR.muted }}><strong style={{ color:CLR.yellow }}>Notes:</strong> Fixed-end forces are generated internally from the active local-axis member loads. Use load cases to separate dead, live, wind, seismic, construction, or service-condition loading.</div>
      </div>;
    }

    function ResultsView({ result, units }) {
      const [activeCaseId, setActiveCaseId] = useState(null);
      if (!result) return <ResultsCore result={result} units={units}/>;
      if (!result.isLoadCaseBundle) return <ResultsCore result={result} units={units}/>;
      const cases = result.cases || [];
      if (!cases.length) return <div style={{...S.card,border:`1px solid ${CLR.red}`,color:CLR.red}}>No load cases are defined.</div>;
      const selected = cases.find(c => c.loadCase.id === activeCaseId) || cases[0];
      const lc = selected.loadCase;
      return <div>
        <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}`, flexWrap:"wrap" }}>
            <div><div style={S.h2}>Load Case / Combination Results</div><div style={{ fontSize:11, color:CLR.muted }}>Load cases are solved independently. Load combinations are linear combinations of regular load cases; the Response Spectrum case is excluded from combination input.</div></div>
            <span style={{ color:CLR.muted, fontSize:12, marginLeft:"auto" }}>Viewing:</span>
            <select style={{ ...S.select, width:220 }} value={lc.id} onChange={e=>setActiveCaseId(+e.target.value)}>{cases.map(c=><option key={c.loadCase.id} value={c.loadCase.id}>{c.loadCase.name} · {c.loadCase.type}</option>)}</select>
          </div>
          <div style={{ overflowX:"auto" }}><table style={S.table}><thead><tr>{["Case","Type","Factor","Status","Max |ux|","Max |uy|"].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead><tbody>{cases.map((c,i)=>{ const r=c.result; const maxUx=r && !r.error ? Math.max(...(r.displacements||[]).map(d=>Math.abs(d.ux)),0) : NaN; const maxUy=r && !r.error ? Math.max(...(r.displacements||[]).map(d=>Math.abs(d.uy)),0) : NaN; return <tr key={c.loadCase.id} onClick={()=>setActiveCaseId(c.loadCase.id)} style={{ background:i%2===0?"transparent":"#ffffff05", cursor:"pointer", outline:lc.id===c.loadCase.id?`1px solid ${CLR.accent}`:undefined }}><td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{c.loadCase.name}</td><td style={S.td}>{c.loadCase.type}</td><td style={S.td}>{fmt3(c.loadCase.factor)}</td><td style={S.td}><span style={S.badge(r && !r.error ? CLR.green : CLR.red)}>{r && !r.error ? "Solved" : "Error"}</span></td><td style={S.td}>{Number.isFinite(maxUx)?fmt3(maxUx):"—"}</td><td style={S.td}>{Number.isFinite(maxUy)?fmt3(maxUy):"—"}</td></tr>})}</tbody></table></div>
        </div>
        <div style={{ fontSize:12, color:CLR.muted, margin:"-0.7rem 0 1rem 0" }}>Showing results for <strong style={{ color:CLR.yellow }}>{lc.name}</strong> ({lc.type}){lc.isCombination ? ": linear load-combination results" : `, factor = ${fmt3(lc.factor)}`}. {selected.result && selected.result.loadCombination && <span> Terms: {selected.result.loadCombination.terms.map(t=>`${fmt3(t.factor)}×${t.loadCase.name}`).join(" + ")}</span>}</div>
        <ResultsCore result={selected.result} units={units} reportTitle={lc.name} reportSubtitle={lc.type}/>
      </div>;
    }

    function ResultsCore({ result, units, reportTitle="Analysis Results", reportSubtitle="" }) {
      const U = UNIT_SETS[units] || UNIT_SETS["kip/ft"];
      const [activeMemberIndex, setActiveMemberIndex] = useState(0);
      const [overlayMode, setOverlayMode] = useState("none");
      const [overlayScale, setOverlayScale] = useState(1);
      const [memberDiagramType, setMemberDiagramType] = useState("V");
      const [activeModeIndex, setActiveModeIndex] = useState(0);
      const [showRSResults, setShowRSResults] = useState(true);
      if (!result) return <div style={{ textAlign:"center", padding:"4rem", color:CLR.muted }}><div style={{ fontSize:48, marginBottom:16 }}>🏗️</div><div style={{ fontSize:16, fontWeight:700, color:CLR.text }}>No results yet</div><div style={{ fontSize:13, marginTop:8 }}>Go to Inputs and press Analyze.</div></div>;
      if (result.error) return <div style={{...S.card,border:`1px solid ${CLR.red}`,color:CLR.red}}>{result.error}</div>;
      const activeMember = result.memberResults[Math.min(activeMemberIndex, result.memberResults.length-1)] || result.memberResults[0];
      const activeMode = result.eigenModes ? (result.eigenModes[Math.min(activeModeIndex, result.eigenModes.length-1)] || result.eigenModes[0]) : null;
      return <div>
        <AnalysisPrintReport result={result} units={units} reportTitle={reportTitle} reportSubtitle={reportSubtitle}/>
        <div style={{ ...S.card, border:`1px solid ${CLR.green}`, background:CLR.surface }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
            <div><div style={S.h2}>Print / Save PDF Analysis and Design Report</div><div style={{ fontSize:11, color:CLR.muted }}>Generates a clean 8.5 × 11 PDF-style report like the Two Way Slabs app: all result tables, dynamic result tables where applicable, and every member AFD/SFD/BMD/deflection diagram with controlled page breaks so tables and diagrams are not cut off.</div></div>
            <button style={{ ...S.btn("primary"), marginLeft:"auto", padding:"8px 20px", fontSize:13 }} onClick={()=>window.print()}>🖨️ Print / Save PDF Report</button>
          </div>
        </div>
        <div style={{ ...S.card, marginBottom:"2rem" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:"1rem", flexWrap:"wrap" }}>
            <div style={S.h2}>Figure 1: Frame Diagram</div>
            <span style={{ color:CLR.muted, fontSize:12, marginLeft:"auto" }}>Overlay:</span>
            <select style={{ ...S.select, width:220 }} value={overlayMode} onChange={e=>setOverlayMode(e.target.value)}>
              <option value="none">Frame only</option>
              <option value="deformed">Deformed shape</option>
              {(result.eigenModes || []).length > 0 && <option value="mode">Mode shape</option>}
              <option value="axial">Axial load diagram</option>
              <option value="sfd">Shear force diagram</option>
              <option value="bmd">Bending moment diagram</option>
            </select>
            {overlayMode === "mode" && result.eigenModes && result.eigenModes.length > 0 && <><span style={{ color:CLR.muted, fontSize:12 }}>Mode</span><select style={{ ...S.select, width:112 }} value={activeModeIndex} onChange={e=>setActiveModeIndex(+e.target.value)}>{result.eigenModes.map((m,i)=><option key={m.mode} value={i}>Mode {m.mode}</option>)}</select></>}
            <span style={{ color:CLR.muted, fontSize:12 }}>Scale</span>
            <input type="number" step="0.25" min="0.25" style={{ ...S.input, width:76 }} value={overlayScale} onChange={e=>setOverlayScale(+e.target.value || 1)} />
          </div>
          <FrameDiagram nodes={result.nodes} members={result.members} result={result} units={units} overlayMode={overlayMode} overlayScale={overlayScale} modeShape={activeMode}/>
        </div>

        {result.isResponseSpectrum && <div style={{ display:"flex", justifyContent:"flex-end", margin:"-1rem 0 1rem" }}><label style={{ display:"flex", alignItems:"center", gap:8, color:CLR.muted, fontSize:12 }}><input type="checkbox" checked={showRSResults} onChange={e=>setShowRSResults(e.target.checked)}/> Show response spectrum result tables</label></div>}
        {result.isResponseSpectrum && showRSResults && <ResponseSpectrumResults result={result}/>} 

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"1.5rem" }}>
          <div style={{ ...S.card, padding:0, overflow:"hidden" }}><div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div style={S.h2}>Table 1: Reactions</div></div><table style={S.table}><thead><tr><th style={S.th}>Node</th><th style={S.th}>Support</th><th style={S.th}>Rx ({U.force})</th><th style={S.th}>Ry ({U.force})</th><th style={S.th}>Mz ({U.moment})</th></tr></thead><tbody>{result.reactions.filter(r=>r.support!=="Free" || r.hasSpring).map((r,i)=><tr key={r.label} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={{ ...S.td, color:CLR.green, fontWeight:700 }}>{r.label}</td><td style={S.td}><span style={S.badge(r.hasSpring?CLR.orange:r.support==="Fixed"?CLR.teal:r.support==="Pinned"?CLR.yellow:CLR.violet)}>{r.supportLabel || r.support}</span></td><td style={S.td}>{fmt2(r.Rx)}</td><td style={S.td}>{fmt2(r.Ry)}</td><td style={S.td}>{fmt2(r.Mz)}</td></tr>)}</tbody></table></div>

          <div style={{ ...S.card, padding:0, overflow:"hidden" }}><div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div style={S.h2}>Table 2: Nodal Displacements</div></div><table style={S.table}><thead><tr><th style={S.th}>Node</th><th style={S.th}>ux ({U.disp})</th><th style={S.th}>uy ({U.disp})</th><th style={S.th}>θz (rad)</th></tr></thead><tbody>{result.displacements.map((d,i)=><tr key={d.label} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={{ ...S.td, color:CLR.violet, fontWeight:700 }}>{d.label}</td><td style={S.td}>{fmt3(d.ux)}</td><td style={S.td}>{fmt3(d.uy)}</td><td style={S.td}>{fmt3(d.rz)}</td></tr>)}</tbody></table></div>

          <div style={{ ...S.card, padding:0, overflow:"hidden" }}><div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}><div style={S.h2}>Table 3: Member End Forces</div></div><table style={S.table}><thead><tr>{["Member","Release","N1","V1","M1","N2","V2","M2"].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead><tbody>{result.memberResults.map((m,i)=><tr key={m.name} style={{ background:i%2===0?"transparent":"#ffffff05", cursor:"pointer", outline:activeMemberIndex===i?`1px solid ${CLR.accent}`:undefined }} onClick={()=>setActiveMemberIndex(i)}><td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{m.name}</td><td style={S.td}>{m.release}</td>{m.qDisplay.map((v,j)=><td style={S.td} key={j}>{j===2||j===5?v.toFixed(0):fmt2(v)}</td>)}</tr>)}</tbody></table><div style={{ padding:"0.4rem 1rem", fontSize:10, color:CLR.muted, borderTop:`1px solid ${CLR.border}` }}>Click a row to view that member's diagrams.</div></div>
        </div>

        {(result.eigenModes || []).length > 0 && <div style={{ ...S.card }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:"1rem", flexWrap:"wrap" }}>
            <div style={S.h2}>Mass-Based Eigenvalue and Mode Shape Results</div>
            <span style={{ color:CLR.muted, fontSize:12, marginLeft:"auto" }}>Mode:</span>
            <select style={{ ...S.select, width:120 }} value={activeModeIndex} onChange={e=>setActiveModeIndex(+e.target.value)}>
              {(result.eigenModes || []).map((m,i)=><option key={m.mode} value={i}>Mode {m.mode}</option>)}
            </select>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"0.9fr 1.1fr", gap:"1rem" }}>
            <div style={{ overflowX:"auto" }}>
              <table style={S.table}><thead><tr><th style={S.th}>Mode</th><th style={S.th}>Period T (s)</th><th style={S.th}>Frequency (Hz)</th><th style={S.th}>λ = ω²</th><th style={S.th}>Max |φ|</th></tr></thead><tbody>{(result.eigenModes || []).map((m,i)=><tr key={m.mode} style={{ background:i%2===0?"transparent":"#ffffff05", cursor:"pointer", outline:activeModeIndex===i?`1px solid ${CLR.accent}`:undefined }} onClick={()=>setActiveModeIndex(i)}><td style={{ ...S.td, color:CLR.yellow, fontWeight:700 }}>{m.mode}</td><td style={S.td}>{fmt3(m.period)}</td><td style={S.td}>{fmt3(m.frequency)}</td><td style={S.td}>{fmt3(m.lambda)}</td><td style={S.td}>1.000</td></tr>)}</tbody></table>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={S.table}><thead><tr><th style={S.th}>Free DOF</th><th style={S.th}>Eigenvector Component φ</th></tr></thead><tbody>{activeMode && activeMode.components.map((c,i)=><tr key={c.label} style={{ background:i%2===0?"transparent":"#ffffff05" }}><td style={{ ...S.td, color:CLR.accent, fontWeight:700 }}>{c.label}</td><td style={S.td}>{fmt3(c.value)}</td></tr>)}</tbody></table>
            </div>
          </div>
          <div style={{ marginTop:"0.8rem", fontSize:11, color:CLR.muted }}>Mode shapes shown here are dynamic mass-based modes from the reduced stiffness and mass matrices. The mass matrix is assembled from the Mass Source definition. Rotational and other massless free DOFs are statically condensed during the modal calculation.</div>
        </div>}

        <div style={{ ...S.card }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:"1rem", flexWrap:"wrap" }}>
            <div style={S.h2}>Figures 2 & 3: Member Diagrams</div>
            <span style={{ color:CLR.muted, fontSize:12, marginLeft:"auto" }}>Member:</span>
            <select style={{ ...S.select, width:120 }} value={activeMemberIndex} onChange={e=>setActiveMemberIndex(+e.target.value)}>
              {result.memberResults.map((m,i)=><option key={m.name} value={i}>{m.name}</option>)}
            </select>
            <span style={{ color:CLR.muted, fontSize:12 }}>View:</span>
            <select style={{ ...S.select, width:190 }} value={memberDiagramType} onChange={e=>setMemberDiagramType(e.target.value)}>
              <option value="N">Axial load diagram</option>
              <option value="V">Shear force diagram</option>
              <option value="M">Bending moment diagram</option>
              <option value="theta">Angular rotation</option>
              <option value="vLocal">Deflection</option>
            </select>
          </div>
          {activeMember && (()=>{
            const cfg = memberDiagramType === "N" ? { title:`Axial Load Diagram (${U.force})`, color:CLR.red, unit:U.force }
              : memberDiagramType === "V" ? { title:`Shear Force Diagram (${U.force})`, color:CLR.teal, unit:U.force }
              : memberDiagramType === "M" ? { title:`Bending Moment Diagram (${U.moment})`, color:CLR.orange, unit:U.moment }
              : memberDiagramType === "theta" ? { title:"Angular Rotation θ (rad)", color:CLR.violet, unit:"rad" }
              : { title:`Deflection v (${U.disp})`, color:CLR.yellow, unit:U.disp };
            return <div>
              <div style={{ fontSize:11, color:CLR.muted, marginBottom:4 }}>{cfg.title} — {activeMember.name}</div>
              <MemberDiagram member={activeMember} dataType={memberDiagramType} title={cfg.title} color={cfg.color} unitLabel={cfg.unit}/>
            </div>;
          })()}
        </div>
      </div>;
    }

    function TheoryView() {
      const CodeBox = ({children}) => (
        <div style={{ background:CLR.bg, border:`1px solid ${CLR.border}`, borderRadius:6, padding:"1rem", color:CLR.teal, fontSize:12, lineHeight:1.8, marginBottom:"1rem", overflowX:"auto" }}>{children}</div>
      );
      const H3 = ({children}) => <div style={{ fontSize:15, fontWeight:800, color:CLR.accent, marginTop:"1.5rem", marginBottom:"0.6rem", letterSpacing:"0.06em", textTransform:"uppercase" }}>{children}</div>;
      const H4 = ({children}) => <div style={{ fontSize:13, fontWeight:800, color:CLR.text, marginTop:"1rem", marginBottom:"0.45rem" }}>{children}</div>;
      const P = ({children}) => <p style={{ color:CLR.muted, lineHeight:1.75, fontSize:13, marginBottom:"0.8rem" }}>{children}</p>;
      const MiniTable = ({rows}) => (
        <table style={{ ...S.table, marginBottom:"1rem" }}>
          <tbody>{rows.map((r,i)=>(
            <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
              <td style={{ ...S.td, textAlign:"left", color:CLR.yellow, fontWeight:700, width:"30%" }}>{r[0]}</td>
              <td style={{ ...S.td, textAlign:"left", color:CLR.muted }}>{r[1]}</td>
            </tr>
          ))}</tbody>
        </table>
      );
      return (
        <div>
          <div style={S.card}>
            <div style={{ fontSize:18, fontWeight:800, color:CLR.accent, marginBottom:"1rem" }}>Theory — Plane Frame Matrix Stiffness Method</div>
            <P>
              This application is a two-dimensional plane-frame analysis program. Its computation method follows the matrix stiffness method: the frame is idealized as straight prismatic members connected at nodes, each member is written in local coordinates, local quantities are transformed into global coordinates, the global stiffness matrix is assembled, unknown joint displacements are solved, and member end forces are recovered from the solved displacements.
            </P>
            <P>
              The app is an analysis tool, not a member-design tool. It reports the structural response requested in structural analysis: axial forces, shears, bending moments, support reactions, and displacements.
            </P>
          </div>

          <div style={S.card}>
            <H3>1. Analytical model used by the app</H3>
            <P>
              The frame is represented by a line diagram. Each member is drawn along its centroidal axis and each joint is treated as a node. This matches the usual plane-frame idealization: members are connected at nodes, and loads may be applied either at joints or along members.
            </P>
            <MiniTable rows={[
              ["Node", "A point on the analytical line diagram where member ends meet and where displacement degrees of freedom are defined."],
              ["Member", "A straight frame element between a near node and a far node."],
              ["Global axes", "The structure-level X-Y coordinate system used for node coordinates, support restraints, reactions, and assembled equations."],
              ["Local axes", "The member-level x-y coordinate system. Local x runs from the near node to the far node. Member loads in this app are entered in local axes only."]
            ]}/>
          </div>

          <div style={S.card}>
            <H3>2. Degrees of freedom</H3>
            <P>
              Each node of a plane frame has up to three degrees of freedom: horizontal translation, vertical translation, and in-plane rotation. Translations are positive in the positive global X and Y directions, and rotation is positive counterclockwise.
            </P>
            <CodeBox>
              Nodal displacement vector at node i:<br/>
              d_i = [u_i, v_i, θ_i]<sup>T</sup><br/><br/>
              Member local displacement vector:<br/>
              u_m = [u_1, v_1, θ_1, u_2, v_2, θ_2]<sup>T</sup>
            </CodeBox>
            <P>
              Support conditions work by restraining selected degrees of freedom. A fixed support restrains u, v, and θ. A pin restrains u and v but releases θ. A vertical roller restrains vertical displacement only. A horizontal roller restrains horizontal displacement only. Free nodes have no conventional restraints. Translational and rotational spring supports add elastic stiffness at selected DOFs without fully fixing them.
            </P>
          </div>

          <div style={S.card}>
            <H3>3. Local frame-element stiffness</H3>
            <P>
              The local stiffness matrix combines axial stiffness and flexural stiffness. Axial deformation is included through the AE/L terms, so the solver does not assume axial rigidity. Flexural behaviour is represented by the standard prismatic beam-column stiffness terms involving EI.
            </P>
            <CodeBox>
              Local member stiffness relation:<br/>
              Q = k u + Q_f<br/><br/>
              Axial terms: AE/L<br/>
              Flexural terms: 12EI/L³, 6EI/L², 4EI/L, 2EI/L
            </CodeBox>
            <P>
              In the equation above, Q is the local member end-force vector, k is the local stiffness matrix, u is the local member end-displacement vector, and Q_f is the local fixed-end force vector caused by loads applied directly to the member.
            </P>
          </div>

          <div style={S.card}>
            <H3>4. Member loads and fixed-end forces</H3>
            <P>
              Member loads are entered in the member local coordinate system. The program converts those local member loads into consistent fixed-end or equivalent nodal load vectors before the global system is solved. This is why the user does not need to manually input fixed-end forces.
            </P>
            <CodeBox>
              Local load input convention:<br/>
              qxA, qxB = local axial distributed load at near/far end<br/>
              qyA, qyB = local transverse distributed load at near/far end<br/>
              Px, Py = local concentrated loads<br/>
              a = distance from near end to concentrated load<br/><br/>
              Uniform load is the special case qA = qB.<br/>
              Trapezoidal load is handled by qA ≠ qB.
            </CodeBox>
            <P>
              The fixed-end force vector is assembled from the local member loads. Distributed loads with different start and end magnitudes are integrated as linearly varying loads. The same load model is then used to generate the member shear-force and bending-moment diagram points.
            </P>
          </div>

          <div style={S.card}>
            <H3>5. Coordinate transformation</H3>
            <P>
              Since frame members can be vertical, horizontal, or inclined, their local stiffness matrices must be transformed into the global X-Y coordinate system before assembly. The app computes the member length and direction cosines from the near and far node coordinates.
            </P>
            <CodeBox>
              Member geometry:<br/>
              L = √[(X₂ − X₁)² + (Y₂ − Y₁)²]<br/>
              c = (X₂ − X₁)/L<br/>
              s = (Y₂ − Y₁)/L<br/><br/>
              Displacement transformation:<br/>
              u = T v<br/><br/>
              Global member stiffness and fixed-end force:<br/>
              K = T<sup>T</sup> k T<br/>
              F_f = T<sup>T</sup> Q_f
            </CodeBox>
            <P>
              This transformation lets the user define loads locally while the structure itself is solved globally.
            </P>
          </div>

          <div style={S.card}>
            <H3>6. Member releases</H3>
            <P>
              Each member may be Fix-Fix, Pin-Fix, Fix-Pin, or Pin-Pin. A pin release at a member end means that the member end cannot transmit moment at that end. The app applies releases at the member level before assembling the member into the global stiffness matrix.
            </P>
            <CodeBox>
              Release options:<br/>
              Fix-Fix: both end rotations retained<br/>
              Pin-Fix: near-end moment release<br/>
              Fix-Pin: far-end moment release<br/>
              Pin-Pin: both end moments released<br/><br/>
              Released-end condition:<br/>
              M_released = 0
            </CodeBox>
            <P>
              Internally, the released rotational degrees are statically condensed from the local member relation so the released end moment is forced to zero while the remaining member stiffness and fixed-end effects are retained.
            </P>
          </div>

          <div style={S.card}>
            <H3>7. Global stiffness assembly</H3>
            <P>
              After each member has been transformed to global coordinates, its stiffness terms are placed into the structure stiffness matrix according to the global degree-of-freedom numbers of its near and far nodes. Where multiple members frame into the same degree of freedom, their stiffness contributions are algebraically added.
            </P>
            <CodeBox>
              Structure equilibrium equation:<br/>
              S d = P − P_f<br/><br/>
              S = assembled global structure stiffness matrix<br/>
              d = unknown global joint displacement vector<br/>
              P = applied nodal load vector<br/>
              P_f = assembled fixed-joint force vector from member loads
            </CodeBox>
            <P>
              The same assembly logic is also used for the fixed-joint force vector. Member load effects are transformed and stored in the corresponding global force rows before the unknown displacements are solved.
            </P>
          </div>

          <div style={S.card}>
            <H3>8. Boundary conditions and solution</H3>
            <P>
              Supports are applied by restraining the appropriate degrees of freedom. After restraints are imposed, the remaining simultaneous equations are solved for unknown joint translations and rotations.
            </P>
            <CodeBox>
              Unknowns solved by the app:<br/>
              d = S<sup>−1</sup>(P − P_f)<br/><br/>
              The app uses Gaussian elimination to solve the linear system.
            </CodeBox>
            <P>
              If the stiffness matrix is singular, the app reports a solver error. This usually means the model is unstable, disconnected, has insufficient restraints, contains invalid member geometry, or has too many releases for the available supports.
            </P>
          </div>

          <div style={S.card}>
            <H3>9. Member end-force recovery</H3>
            <P>
              Once the global joint displacements are known, each member extracts the six relevant global displacement components, transforms them back into local coordinates, and computes local member end forces.
            </P>
            <CodeBox>
              Recovery sequence:<br/>
              v_m = member global end displacements from d<br/>
              u_m = T v_m<br/>
              Q_m = k u_m + Q_f<br/><br/>
              Q_m = [N₁, V₁, M₁, N₂, V₂, M₂]<sup>T</sup>
            </CodeBox>
            <P>
              These recovered local end forces are the values reported in the member end-force table. They also supply the end conditions used to draw the member shear and bending moment diagrams.
            </P>
          </div>

          <div style={S.card}>
            <H3>10. SFD, BMD, and deformed-shape output</H3>
            <P>
              The shear-force and bending-moment diagrams are generated member by member in local coordinates, from the recovered end forces and the applied local loads. The one-member diagrams are plotted from near end to far end. The frame overlay view draws the SFD or BMD directly on the frame for qualitative interpretation.
            </P>
            <CodeBox>
              Differential relationships used for diagram shape:<br/>
              dV/dx = −w(x)<br/>
              dM/dx = V(x)<br/><br/>
              Curvature relation used for deflected shape recovery:<br/>
              vʺ(x) = M(x) / EI
            </CodeBox>
            <P>
              For the displayed deformed shape, the program samples each member along its length and numerically integrates curvature to obtain the transverse deflection shape. The resulting local transverse deflection is combined with the solved nodal translations, then transformed back to global display coordinates.
            </P>
          </div>

          <div style={S.card}>
            <H3>11. What the results mean</H3>
            <MiniTable rows={[
              ["Displacements", "Global nodal translations and rotations after applying loads, member stiffnesses, and support restraints."],
              ["Reactions", "Support forces and moments needed to enforce the restrained degrees of freedom."],
              ["Member end forces", "Local axial force, shear, and moment at each end of each member."],
              ["SFD/BMD overlays", "Graphical representation of internal shear and bending moment along each frame member."],
              ["Deflected shape", "Scaled displacement shape used for visual interpretation; it is not drawn to true scale unless the scale factor is chosen accordingly."],
              ["Eigenvalues and mode shapes", "Dynamic eigenvalues and eigenvectors from the reduced stiffness and mass matrices when a mass source is defined. These modes are used for response spectrum analysis and mode-shape display."]
            ]}/>
            <P>
              The numerical results are governed by the chosen analytical model, units, member stiffness properties, load case definitions, local load directions, support restraints, and member releases.
            </P>
          </div>
        </div>
      );
    }

    function App() {
      const [tab,setTab]=useState("inputs");
      const [nodes,setNodes]=useState(DEFAULT_NODES.map(n=>({...n, fx:0, fy:0, mz:0})));
      const [members,setMembers]=useState(DEFAULT_MEMBERS.map(m=>({...m, qxA:0, qxB:0, qyA:0, qyB:0, pointPx:0, pointPy:0, pointA:0})));
      const [loadCases,setLoadCases]=useState(DEFAULT_LOAD_CASES.map(lc=>JSON.parse(JSON.stringify(lc))));
      const [loadCombinations,setLoadCombinations]=useState(DEFAULT_LOAD_COMBINATIONS.map(c=>JSON.parse(JSON.stringify(c))));
      const [activeLoadCaseId,setActiveLoadCaseId]=useState(DEFAULT_LOAD_CASES[0].id);
      const [massSource,setMassSource]=useState(JSON.parse(JSON.stringify(DEFAULT_MASS_SOURCE)));
      const [rsSettings,setRsSettings]=useState(JSON.parse(JSON.stringify(DEFAULT_RS_SETTINGS)));
      const [units,setUnits]=useState("kip/ft");
      const [result,setResult]=useState(null);
      const run=()=>{ setResult(solveLoadCases(nodes,members,loadCases,loadCombinations,units,massSource,rsSettings)); setTab("results"); };
      const tabs=["inputs","results","theory"];
      return <div style={S.app}><header style={S.header}><div><div style={{fontSize:18,fontWeight:800,color:CLR.accent,letterSpacing:"0.05em"}}>Frames v0.6.6</div><div style={{fontSize:10,color:CLR.muted,letterSpacing:"0.1em"}}>PLANE FRAME ANALYSIS · 3 DOF/NODE · LOAD CASES · LOAD COMBINATIONS · RESPONSE SPECTRUM · SRSS</div></div><nav style={S.nav}>{tabs.map(t=><button key={t} style={S.navBtn(tab===t)} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}{t==="results"&&result&&<span style={{marginLeft:6,...S.badge(CLR.green),fontSize:9}}>✓</span>}</button>)}</nav></header><main style={S.main}>{tab==="inputs"&&<InputsView nodes={nodes} setNodes={setNodes} members={members} setMembers={setMembers} loadCases={loadCases} setLoadCases={setLoadCases} loadCombinations={loadCombinations} setLoadCombinations={setLoadCombinations} activeLoadCaseId={activeLoadCaseId} setActiveLoadCaseId={setActiveLoadCaseId} massSource={massSource} setMassSource={setMassSource} rsSettings={rsSettings} setRsSettings={setRsSettings} units={units} setUnits={setUnits} onRun={run}/>} {tab==="results"&&<ResultsView result={result} units={units}/>} {tab==="theory"&&<TheoryView/>}</main></div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
