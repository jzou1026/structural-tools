<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beams v0.3.6 — Continuous Beam Analysis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }

    select { -webkit-appearance: none; appearance: none; }

    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }


    /* ── PRINT / PDF REPORT STYLES ─────────────────────────────────────────── */
    .print-report-header { display: none; }
    .print-only { display: none; }
    .screen-only { display: inherit; }
    .print-avoid { break-inside: avoid; page-break-inside: avoid; }

      @page { size: letter portrait; margin: 0.55in; }

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef, useMemo } = React;

    // ── COLORS ─────────────────────────────────────────────────────────────────
    const CLR = {
      bg: "#0d1117", surface: "#161b22", card: "#1c2333", border: "#30363d",
      accent: "#58a6ff", green: "#3fb950", red: "#f85149", yellow: "#d29922",
      text: "#e6edf3", muted: "#8b949e", teal: "#39d353", violet: "#bc8cff",
      orange: "#f0883e",
    };

    // ── STYLES ─────────────────────────────────────────────────────────────────
    const S = {
      app: { minHeight:"100vh", background:CLR.bg, color:CLR.text, fontFamily:"'JetBrains Mono','Fira Code','Cascadia Code',monospace", display:"flex", flexDirection:"column" },
      header: { background:CLR.surface, borderBottom:`1px solid ${CLR.border}`, padding:"0 2rem", display:"flex", alignItems:"center", gap:"2rem", minHeight:60 },
      nav: { display:"flex", gap:0, marginLeft:"auto" },
      navBtn: active => ({ background:"none", border:"none", borderBottom: active ? `2px solid ${CLR.accent}` : "2px solid transparent", color: active ? CLR.accent : CLR.muted, padding:"18px 20px", cursor:"pointer", fontSize:13, fontFamily:"inherit", fontWeight: active ? 700 : 400, letterSpacing:"0.05em", transition:"color 0.15s,border-color 0.15s" }),
      main: { flex:1, padding:"2rem", maxWidth:1400, margin:"0 auto", width:"100%" },
      card: { background:CLR.card, border:`1px solid ${CLR.border}`, borderRadius:8, padding:"1.5rem", marginBottom:"1.5rem" },
      h2: { fontSize:14, fontWeight:700, color:CLR.accent, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"1rem" },
      table: { width:"100%", borderCollapse:"collapse", fontSize:12 },
      th: { background:"#21262d", color:CLR.muted, padding:"7px 10px", textAlign:"center", fontWeight:600, letterSpacing:"0.06em", fontSize:11, textTransform:"uppercase", borderBottom:`1px solid ${CLR.border}` },
      td: { padding:"6px 10px", textAlign:"center", borderBottom:"1px solid #21262d", color:CLR.text },
      input: { background:"#0d1117", border:`1px solid ${CLR.border}`, borderRadius:4, color:CLR.text, fontFamily:"inherit", fontSize:12, padding:"4px 7px", width:"100%", textAlign:"center", outline:"none" },
      select: { background:"#0d1117", border:`1px solid ${CLR.border}`, borderRadius:4, color:CLR.text, fontFamily:"inherit", fontSize:12, padding:"4px 7px", width:"100%", textAlign:"center", outline:"none", cursor:"pointer" },
      btn: (v="primary") => ({ background: v==="primary"?CLR.accent : v==="danger"?"#3d1f1f":"#21262d", color: v==="danger"?CLR.red : v==="primary"?"#000":CLR.text, border:`1px solid ${v==="danger"?CLR.red : v==="primary"?CLR.accent:CLR.border}`, borderRadius:6, padding:"8px 18px", cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:700, letterSpacing:"0.08em" }),
      badge: color => ({ display:"inline-block", background:color+"22", color, border:`1px solid ${color}55`, borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:700 }),
    };

    // ── UNIT SETS ─────────────────────────────────────────────────────────────
    const UNIT_SETS = {
      "kN/m":  { force:"kN",   dist:"m",  moment:"kN·m",  settle:"mm" },
      "kN/mm": { force:"kN",   dist:"mm", moment:"kN·mm", settle:"mm" },
      "N/m":   { force:"N",    dist:"m",  moment:"N·m",   settle:"mm" },
      "kip/ft":{ force:"kips", dist:"ft", moment:"kip·ft",settle:"in" },
      "kip/in":{ force:"kips", dist:"in", moment:"kip·in",settle:"in" },
    };

    // Settlement unit conversion factors (settle unit → dist unit)
    const DEFAULT_UNITS = "kN/m";

    const SETTLE_CONV = {
      "kN/m":   1/1000,   // mm → m
      "kN/mm":  1,        // mm → mm
      "N/m":    1/1000,   // mm → m
      "kip/ft": 1/12,     // in → ft
      "kip/in": 1,        // in → in
    };

    const NODE_TYPES = ["Pin", "Fix", "Free"];

    // ── DEFAULT DATA — FIG. P16.12 / P16.16 ────────────────────────────────────
    // 3-span continuous beam: A–C–E–G (4 pin supports)
    // B, D, F are load points WITHIN spans, not supports.
    // Spans: AC = 10 m (I), CE = 10 m (2I), EG = 8 m (I)
    // Point loads within spans: 120 kN at B (a=6 from A in span AC),
    //                           120 kN at D (a=6 from C in span CE),
    //                           150 kN at F (a=4 from E in span EG)
    // E = 200 GPa = 200×10⁶ kN/m²,  I = 500×10⁶ mm⁴ = 5×10⁻⁴ m⁴
    // Settlements (downward, mm): A=10, C=65, E=40, G=25
    const DEFAULT_NODES = [
      { id:1, label:"A", x:0,  type:"Pin", settle:10, Pz:0, kZ:0, kTheta:0 },
      { id:2, label:"C", x:10, type:"Pin", settle:65, Pz:0, kZ:0, kTheta:0 },
      { id:3, label:"E", x:20, type:"Pin", settle:40, Pz:0, kZ:0, kTheta:0 },
      { id:4, label:"G", x:28, type:"Pin", settle:25, Pz:0, kZ:0, kTheta:0 },
    ];
    // E=200×10⁶ kN/m², I_base=5×10⁻⁴ m⁴ (I), 2I=10⁻³ m⁴
    const DEFAULT_MEMBERS = [
      { id:1, near:"A", far:"C", name:"AC", E:200e6, I:5e-4, wa:0, wb:0, P:0, a:6, b:4 },
      { id:2, near:"C", far:"E", name:"CE", E:200e6, I:1e-3, wa:0, wb:0, P:0, a:6, b:4 },
      { id:3, near:"E", far:"G", name:"EG", E:200e6, I:5e-4, wa:0, wb:0, P:0, a:4, b:4 },
    ];

    // ── LOAD CASE MANAGER DATA — COPIED FROM FRAMES v0.6.6 PATTERN ─────────
    // Geometry, stiffness, supports, settlements, and springs are model data.
    // Nodal/member loads are stored per load case and copied onto the analysis
    // model only when that case or combination is solved.
    const LOAD_TYPES = ["Dead", "Live", "Snow", "Wind", "Seismic", "Other"];
    const COMBO_TYPES = ["Strength", "Service", "Envelope", "Other"];
    const EMPTY_NODE_LOAD = { Pz:0 };
    const EMPTY_MEMBER_LOAD = { wa:0, wb:0, P:0, a:0 };
    const DEFAULT_LOAD_CASES = [
      {
        id:1, name:"LC1", type:"Dead", factor:1.0,
        nodalLoads:{},
        memberLoads:{
          "1":{ wa:0, wb:0, P:120, a:6 },
          "2":{ wa:0, wb:0, P:120, a:6 },
          "3":{ wa:0, wb:0, P:150, a:4 },
        }
      }
    ];
    const DEFAULT_LOAD_COMBINATIONS = [];
    const cloneDeep = obj => JSON.parse(JSON.stringify(obj));
    function nodeLoadFor(loadCase, nodeId) { return { ...EMPTY_NODE_LOAD, ...(((loadCase || {}).nodalLoads || {})[String(nodeId)] || {}) }; }
    function memberLoadFor(loadCase, memberId) { return { ...EMPTY_MEMBER_LOAD, ...(((loadCase || {}).memberLoads || {})[String(memberId)] || {}) }; }
    function mergeBeamLoadCaseLoads(nodes, members, loadCase) {
      const f = +((loadCase || {}).factor ?? 1) || 0;
      return {
        nodes: nodes.map(n => {
          const L = nodeLoadFor(loadCase, n.id);
          return { ...n, Pz:(+L.Pz || 0) * f };
        }),
        members: members.map(m => {
          const L = memberLoadFor(loadCase, m.id);
          const a = (L.a === undefined || L.a === null || L.a === "") ? (+m.a || 0) : (+L.a || 0);
          return { ...m, wa:(+L.wa || 0)*f, wb:(+L.wb || 0)*f, P:(+L.P || 0)*f, a, b:Math.max(0, (+m.b || 0)) };
        })
      };
    }

    // ── SOLVER ────────────────────────────────────────────────────────────────
    // Continuous beam by Direct Stiffness Method (rotational DOFs only).
    // Supports support settlements: each Pin/Fix node may have a prescribed
    // downward settlement δ (in the SAME distance unit as x-coordinates).
    // Settlement contribution to member FEMs (chord rotation ψ = (δ_far−δ_near)/L):
    //   FEM_near_settle = FEM_far_settle = −6EI/L² · (δ_far − δ_near)
    // Nodal point loads Pz (downward positive) do not enter the moment equations
    // for supported nodes but are added to reactions for equilibrium.

    function solveBeam(nodes, members, settleConv) {
      const validNodes = nodes.filter(n => String(n.label || "").trim() !== "");
      const validMembers = members.filter(m =>
        String(m.near || "").trim() && String(m.far || "").trim() &&
        validNodes.some(n => String(n.label).trim() === String(m.near).trim()) &&
        validNodes.some(n => String(n.label).trim() === String(m.far).trim())
      );

      if (validNodes.length < 2) return { error: "Need at least 2 nodes." };
      if (validMembers.length < 1) return { error: "Need at least 1 member." };

      const nodeMap = {};
      validNodes.forEach((n, i) => { nodeMap[String(n.label).trim()] = i; });
      const N = validNodes.length;

      // Beams v0.3.3 cantilever update:
      // Use the same displacement-based direct stiffness idea used by Frames v0.6.6,
      // but specialized to a horizontal Euler-Bernoulli beam element.
      // Each node now has TWO beam DOFs:
      //   v  = vertical displacement, positive downward
      //   θ  = rotation, positive clockwise
      // This is what allows a true fixed-free cantilever to solve: the free tip has
      // both v and θ as unknowns instead of being forced through pin-end moment releases.
      const dofV = i => i*2;
      const dofT = i => i*2 + 1;
      const nDOF = N * 2;
      const K  = Array.from({ length: nDOF }, () => new Array(nDOF).fill(0));
      const F  = new Array(nDOF).fill(0);
      const built = [];

      // Nodal vertical loads are entered positive downward.
      validNodes.forEach((n, i) => { F[dofV(i)] += +n.Pz || 0; });

      const conv = settleConv || 1;
      const prescribed = new Map();
      validNodes.forEach((n, i) => {
        const type = n.type || "Pin";
        const settlement = (+n.settle || 0) * conv; // support settlement, downward positive, in distance units
        if (type === "Pin" || type === "Fix") prescribed.set(dofV(i), settlement);
        if (type === "Fix") prescribed.set(dofT(i), 0);
      });

      for (const mem of validMembers) {
        const ni = nodeMap[String(mem.near).trim()];
        const fi = nodeMap[String(mem.far).trim()];
        const nNode = validNodes[ni];
        const fNode = validNodes[fi];

        const E = +mem.E || 1;
        const I = +mem.I || 1;
        const Lspan = Math.abs((+fNode.x || 0) - (+nNode.x || 0));
        const Luse  = Lspan > 1e-12 ? Lspan : 1;
        const EI = E * I;

        const wa = (+mem.wa || 0);   // downward-positive line load at near end
        const wb = (+mem.wb || 0);   // downward-positive line load at far end
        const P  = +mem.P || 0;      // downward-positive point load
        let a = +mem.a || 0;
        if (a < 0) a = 0;
        if (a > Luse) a = Luse;
        const b = Luse - a;

        // Local beam stiffness for DOFs [v1, θ1, v2, θ2].
        // This is the beam-only analogue of Frames v0.6.6's member stiffness assembly.
        const L = Luse;
        const k = [
          [ 12*EI/(L**3),  6*EI/(L**2), -12*EI/(L**3),  6*EI/(L**2)],
          [  6*EI/(L**2),  4*EI/L,       -6*EI/(L**2),  2*EI/L     ],
          [-12*EI/(L**3), -6*EI/(L**2),  12*EI/(L**3), -6*EI/(L**2)],
          [  6*EI/(L**2),  2*EI/L,       -6*EI/(L**2),  4*EI/L     ],
        ];

        // Consistent fixed-end/member load vector from Frames v0.6.6, adapted to
        // downward-positive beam loading. This works for cantilevers, overhangs,
        // fixed-fixed spans, simple spans, and continuous beams because loads are
        // assembled as nodal equivalents before global boundary conditions are applied.
        const fe = [0,0,0,0];
        if (Math.abs(wa)>1e-12 || Math.abs(wb)>1e-12) {
          fe[0] += L * (7*wa + 3*wb) / 20;
          fe[1] += L*L * (3*wa + 2*wb) / 60;
          fe[2] += L * (3*wa + 7*wb) / 20;
          fe[3] += -L*L * (2*wa + 3*wb) / 60;
        }
        if (Math.abs(P) > 1e-12) {
          const xi = L > 0 ? a / L : 0;
          const N1 = 1 - 3*xi*xi + 2*xi*xi*xi;
          const N2 = L * (xi - 2*xi*xi + xi*xi*xi);
          const N3 = 3*xi*xi - 2*xi*xi*xi;
          const N4 = L * (-xi*xi + xi*xi*xi);
          fe[0] += P * N1;
          fe[1] += P * N2;
          fe[2] += P * N3;
          fe[3] += P * N4;
        }

        const dofs = [dofV(ni), dofT(ni), dofV(fi), dofT(fi)];
        for (let r=0; r<4; r++) {
          F[dofs[r]] += fe[r];
          for (let c=0; c<4; c++) K[dofs[r]][dofs[c]] += k[r][c];
        }

        built.push({ mem, ni, fi, nNode, fNode, E, I, EI, Luse, wa, wb, P, a, b, k, fe, dofs });
      }

      // Spring support feature copied from Frames v0.6.6 and specialized for beams.
      // kZ is a vertical translational spring entered as force per distance unit
      // (for example kN/m, kN/mm, N/m, kip/ft, or kip/in).
      // kTheta is a rotational spring entered as moment per radian in the active moment unit.
      // Springs are added directly to the global stiffness matrix before boundary conditions.
      validNodes.forEach((n, i) => {
        const kZ = Math.max(0, +n.kZ || 0);
        const kTheta = Math.max(0, +n.kTheta || 0);
        K[dofV(i)][dofV(i)] += kZ;
        K[dofT(i)][dofT(i)] += kTheta;
      });

      const free = [];
      const fixed = [];
      for (let i=0; i<nDOF; i++) (prescribed.has(i) ? fixed : free).push(i);
      if (free.length === 0) return { error: "No free degrees of freedom are available to solve." };

      const D = new Array(nDOF).fill(0);
      prescribed.forEach((value, dof) => { D[dof] = value; });

      // Partitioned stiffness solution, matching the Frames v0.6.6 approach while
      // also supporting prescribed vertical settlements at Pin/Fix supports:
      // Kff·Df = Ff − Kfc·Dc
      const Kff = free.map(i => free.map(j => K[i][j]));
      const Ff = free.map(i => {
        let rhs = F[i];
        fixed.forEach(j => { rhs -= K[i][j] * D[j]; });
        return rhs;
      });
      const Df = gaussElim(Kff, Ff);
      if (!Df) return { error: "Singular stiffness matrix — check supports/connectivity. A free-free beam needs at least one vertical or rotational restraint." };
      free.forEach((dof, i) => { D[dof] = Df[i]; });

      const rotations = validNodes.map((n, i) => ({
        label: n.label,
        type: n.type,
        settle: (+n.settle || 0),
        kZ: (+n.kZ || 0),
        kTheta: (+n.kTheta || 0),
        hasSpring: Math.abs(+n.kZ || 0) > 1e-12 || Math.abs(+n.kTheta || 0) > 1e-12,
        supportLabel: (Math.abs(+n.kZ || 0) > 1e-12 || Math.abs(+n.kTheta || 0) > 1e-12)
          ? (n.type === "Free" ? "Spring" : `${n.type} + Spring`)
          : n.type,
        dz: D[dofV(i)] / conv,
        theta: D[dofT(i)],
      }));

      // Global residual. With downward-positive force DOFs, a negative residual at a
      // restrained vertical DOF is an upward support reaction; report Rz upward-positive.
      const KD = K.map(row => row.reduce((sum, kij, j) => sum + kij * D[j], 0));
      const residual = KD.map((v, i) => v - F[i]);

      const memberResults = built.map(o => {
        const dl = o.dofs.map(i => D[i]);
        const kd = o.k.map(row => row.reduce((sum, kij, j) => sum + kij * dl[j], 0));
        // Member end forces from the element on the nodes. Negating gives the
        // familiar beam end actions used by the existing Beams tables/diagrams.
        const q = kd.map((v, i) => v - o.fe[i]);
        const V_near = -q[0];
        const M_near = -q[1];
        const V_far  = -q[2];
        const M_far  = -q[3];

        const ndiv = 80;
        const sfd = [], bmd = [], raw = [];
        for (let d = 0; d <= ndiv; d++) {
          const x = d / ndiv * o.Luse;
          let Vx = V_near - o.wa*x - (o.wb - o.wa)*x*x/(2*o.Luse);
          if (x >= o.a && Math.abs(o.P) > 1e-12) Vx -= o.P;
          let Mx = -M_near + V_near*x - o.wa*x*x/2 - (o.wb - o.wa)*x*x*x/(6*o.Luse);
          if (x >= o.a && Math.abs(o.P) > 1e-12) Mx -= o.P*(x - o.a);
          sfd.push({ x, V: Vx });
          bmd.push({ x, M: Mx });
          raw.push({ x, M: Mx });
        }

        // Deflection plotting copied from the Frames v0.6.6 member-output approach:
        // numerically integrate curvature from the displayed BMD and choose constants
        // so the curve passes through the solved end vertical displacements.
        // Beams uses downward-positive v and clockwise-positive theta. The displayed
        // sagging/hogging BMD convention is opposite the downward-positive curvature,
        // so kappa = -M/(EI).
        const thetaRaw = [0], vRaw = [0];
        for (let i=1; i<raw.length; i++) {
          const dx = raw[i].x - raw[i-1].x;
          const k0 = -raw[i-1].M / (o.EI || 1);
          const k1 = -raw[i].M / (o.EI || 1);
          const th = thetaRaw[i-1] + 0.5*(k0+k1)*dx;
          thetaRaw.push(th);
          vRaw.push(vRaw[i-1] + 0.5*(thetaRaw[i-1]+th)*dx);
        }
        const v1 = dl[0], v2 = dl[2];
        const C2 = v1;
        const C1 = (o.Luse > 1e-12) ? (v2 - v1 - vRaw[vRaw.length-1]) / o.Luse : 0;
        const defl = raw.map((pt, i) => ({
          x: pt.x,
          vLocal: (vRaw[i] + C1*pt.x + C2) / (conv || 1),
          thetaLocal: thetaRaw[i] + C1,
        }));

        return {
          name: o.mem.name || `${o.mem.near}-${o.mem.far}`,
          near: o.mem.near, far: o.mem.far,
          L: o.Luse, nearType: o.nNode.type, farType: o.fNode.type,
          V_near, M_near, V_far, M_far, sfd, bmd, defl,
          q, fe:o.fe,
        };
      });

      const reactions = [];
      validNodes.forEach((n, i) => {
        const kZ = Math.max(0, +n.kZ || 0);
        const kTheta = Math.max(0, +n.kTheta || 0);
        const hasSpring = kZ > 1e-12 || kTheta > 1e-12;
        const isSupport = n.type !== "Free";
        if (!isSupport && !hasSpring) return;

        const springRz = kZ * (D[dofV(i)] || 0);       // upward-positive spring reaction for downward +v
        const springRm = kTheta * (D[dofT(i)] || 0);   // moment reaction from rotational spring
        const Rz = isSupport ? -residual[dofV(i)] : springRz;
        const Rm = n.type === "Fix" ? -residual[dofT(i)] : (hasSpring ? springRm : 0);
        const supportLabel = hasSpring ? (isSupport ? `${n.type} + Spring` : "Spring") : n.type;
        reactions.push({ label: n.label, type: n.type, supportLabel, hasSpring, kZ:+n.kZ||0, kTheta:+n.kTheta||0, Rz, Rm, springRz, springRm, settle: +n.settle || 0 });
      });

      const allSFD = [], allBMD = [];
      memberResults.forEach(mr => {
        const nearNode = validNodes[nodeMap[String(mr.near).trim()]];
        const xStart = +nearNode.x || 0;
        mr.sfd.forEach(pt => allSFD.push({ x: xStart + pt.x, V: pt.V }));
        mr.bmd.forEach(pt => allBMD.push({ x: xStart + pt.x, M: pt.M }));
      });
      allSFD.sort((a,b) => a.x - b.x);
      allBMD.sort((a,b) => a.x - b.x);

      return { rotations, displacements: rotations, memberResults, reactions, allSFD, allBMD, nodes: validNodes, members: validMembers, D, K, F, freeDofs: free };
    }

    function combineSeries(terms, getter, key) {
      const ref = terms.find(t => getter(t.result) && getter(t.result).length);
      const base = ref ? getter(ref.result) : [];
      return base.map((pt, idx) => ({
        ...pt,
        [key]: terms.reduce((sum, t) => sum + (+t.factor || 0) * ((((getter(t.result) || [])[idx] || {})[key]) || 0), 0)
      }));
    }

    function combineBeamResults(combo, solvedCases) {
      const caseMap = {};
      (solvedCases || []).forEach(c => { caseMap[String(c.loadCase.id)] = c; });
      const terms = (combo.terms || [])
        .map(t => ({ factor:+t.factor || 0, case:caseMap[String(t.loadCaseId)] }))
        .filter(t => t.case && t.case.result && !t.case.result.error);
      if (!terms.length) return { error:"Load combination could not be solved: no valid load cases were selected." };

      const base = terms[0].case.result;
      const combineAt = (arrName, fields) => (base[arrName] || []).map((row, i) => {
        const out = { ...row };
        fields.forEach(f => {
          out[f] = terms.reduce((sum,t)=>sum+(+t.factor||0)*(((((t.case.result || {})[arrName] || [])[i] || {})[f])||0),0);
        });
        return out;
      });

      const memberResults = (base.memberResults || []).map((mr, mi) => {
        const out = { ...mr };
        ["V_near","M_near","V_far","M_far"].forEach(f => {
          out[f] = terms.reduce((sum,t)=>sum + (+t.factor || 0) * (((t.case.result.memberResults || [])[mi] || {})[f] || 0), 0);
        });
        out.sfd = combineSeries(terms.map(t=>({factor:t.factor,result:((t.case.result.memberResults || [])[mi] || {})})), r=>r.sfd, "V");
        out.bmd = combineSeries(terms.map(t=>({factor:t.factor,result:((t.case.result.memberResults || [])[mi] || {})})), r=>r.bmd, "M");
        out.defl = combineSeries(terms.map(t=>({factor:t.factor,result:((t.case.result.memberResults || [])[mi] || {})})), r=>r.defl, "vLocal").map((p,idx)=>({
          ...p,
          thetaLocal: terms.reduce((sum,t)=>sum+(+t.factor||0)*(((((t.case.result.memberResults || [])[mi] || {}).defl || [])[idx] || {}).thetaLocal || 0),0)
        }));
        return out;
      });

      return {
        ...base,
        isLoadCombination:true,
        loadCombination:{ ...combo, terms:terms.map(t=>({ factor:t.factor, loadCase:t.case.loadCase })) },
        rotations:combineAt("rotations", ["dz","theta"]),
        displacements:combineAt("displacements", ["dz","theta"]),
        reactions:combineAt("reactions", ["Rz","Rm"]),
        memberResults,
        allSFD:memberResults.flatMap(m=>m.sfd || []),
        allBMD:memberResults.flatMap(m=>m.bmd || [])
      };
    }

    function solveLoadCases(nodes, members, loadCases, loadCombinations, units) {
      const conv = SETTLE_CONV[units];
      const activeCases = (loadCases || []).filter(lc => String(lc.name || '').trim());
      const cases = activeCases.map(lc => {
        const model = mergeBeamLoadCaseLoads(nodes, members, lc);
        const solved = solveBeam(model.nodes, model.members, conv);
        return { loadCase:{ id:lc.id, name:lc.name, type:lc.type, factor:+lc.factor || 0 }, result:{ ...solved, modelNodes:model.nodes, modelMembers:model.members } };
      });
      const combos = (loadCombinations || []).filter(c => c.enabled !== false && String(c.name || '').trim()).map(combo => ({
        loadCase:{ id:2000000 + (+combo.id || 0), comboId:combo.id, name:combo.name, type:`Combination · ${combo.type || "Service"}`, factor:1 },
        result:combineBeamResults(combo, cases)
      }));
      return [...cases, ...combos];
    }

    function gaussElim(A, b) {
      const n = b.length;
      const M = A.map((r, i) => [...r, b[i]]);
      for (let col = 0; col < n; col++) {
        let maxRow = col;
        for (let row = col+1; row < n; row++)
          if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
        [M[col], M[maxRow]] = [M[maxRow], M[col]];
        if (Math.abs(M[col][col]) < 1e-14) return null;
        for (let row = col+1; row < n; row++) {
          const f = M[row][col] / M[col][col];
          for (let k = col; k <= n; k++) M[row][k] -= f * M[col][k];
        }
      }
      const x = new Array(n).fill(0);
      for (let i = n-1; i >= 0; i--) {
        x[i] = M[i][n];
        for (let j = i+1; j < n; j++) x[i] -= M[i][j] * x[j];
        x[i] /= M[i][i];
      }
      return x;
    }

    const fmt3 = v => typeof v === "number" ? (Math.abs(v) < 1e-9 ? "0" : v.toFixed(3)) : v;
    const fmt4 = v => typeof v === "number" ? (Math.abs(v) < 1e-9 ? "0" : v.toFixed(4)) : v;

    // ── BEAM DIAGRAM SVG ──────────────────────────────────────────────────────
    function BeamDiagram({ nodes, members, result=null, overlayMode="none", overlayScale=1 }) {
      const validNodes = nodes.filter(n => n.label.trim());
      if (validNodes.length < 2) return <div style={{ color:CLR.muted, textAlign:"center", padding:"2rem" }}>Add at least 2 nodes.</div>;

      const xs = validNodes.map(n => +n.x || 0);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const W = 700, H = 175, PAD = 56;
      const rangeX = maxX - minX || 1;
      const scX = (W - 2*PAD) / rangeX;
      const beamY = 72;
      const toSvgX = x => PAD + (x - minX) * scX;
      const nodeMap = {};
      validNodes.forEach(n => { nodeMap[n.label] = +n.x || 0; });

      const SupportSymbol = ({ type, sx, settle }) => {
        const hasSettle = Math.abs(settle || 0) > 1e-9;
        if (type === "Pin") return (
          <g>
            <polygon points={`${sx},${beamY+4} ${sx-10},${beamY+22} ${sx+10},${beamY+22}`} fill="none" stroke={hasSettle ? CLR.orange : CLR.green} strokeWidth={1.5} />
            <line x1={sx-13} y1={beamY+23} x2={sx+13} y2={beamY+23} stroke={hasSettle ? CLR.orange : CLR.green} strokeWidth={1.5} />
            {hasSettle
              ? [0,1,2,3].map(k => <line key={k} x1={sx-13+k*7} y1={beamY+26} x2={sx-9+k*7} y2={beamY+23} stroke={CLR.orange} strokeWidth={1} />)
              : [0,1,2,3].map(k => <line key={k} x1={sx-13+k*7} y1={beamY+26} x2={sx-9+k*7} y2={beamY+23} stroke={CLR.green} strokeWidth={1} />)
            }
          </g>
        );
        if (type === "Fix") return (
          <g>
            <rect x={sx-3} y={beamY+4} width={6} height={20} fill={CLR.green} />
            {[0,1,2,3].map(k => <line key={k} x1={sx+3} y1={beamY+6+k*5} x2={sx+11} y2={beamY+2+k*5} stroke={CLR.green} strokeWidth={1.5} />)}
          </g>
        );
        return null;
      };

      const SpringSupports = ({ n, sx }) => {
        const kZ = Math.max(0, +n.kZ || 0);
        const kTheta = Math.max(0, +n.kTheta || 0);
        if (kZ <= 1e-12 && kTheta <= 1e-12) return null;
        const color = CLR.violet;
        return (
          <g>
            {kZ > 1e-12 && <g>
              <title>{`Vertical spring support kZ = ${fmt3(kZ)}`}</title>
              <polyline points={`${sx},${beamY+8} ${sx-6},${beamY+14} ${sx+6},${beamY+20} ${sx-6},${beamY+26} ${sx+6},${beamY+32} ${sx},${beamY+38}`} fill="none" stroke={color} strokeWidth="1.6" />
              <line x1={sx-14} y1={beamY+40} x2={sx+14} y2={beamY+40} stroke={color} strokeWidth="1.2" />
              <text x={sx+20} y={beamY+30} fill={color} fontSize="9" fontWeight="800">kZ</text>
            </g>}
            {kTheta > 1e-12 && <g>
              <title>{`Rotational spring support kθ = ${fmt3(kTheta)}`}</title>
              <path d={`M ${sx-18} ${beamY-7} A 15 15 0 1 1 ${sx+10} ${beamY-13}`} fill="none" stroke={color} strokeWidth="1.6" />
              <polygon points={`${sx+10},${beamY-13} ${sx+4},${beamY-15} ${sx+8},${beamY-8}`} fill={color}/>
              <text x={sx+22} y={beamY-12} fill={color} fontSize="9" fontWeight="800">kθ</text>
            </g>}
          </g>
        );
      };

      return (
        <svg width={W} height={H} style={{ display:"block", margin:"0 auto", background:"transparent", overflow:"visible" }}>
          {members.filter(m => m.near.trim() && m.far.trim() && nodeMap[m.near.trim()] !== undefined && nodeMap[m.far.trim()] !== undefined).map((m, i) => {
            const x1 = toSvgX(nodeMap[m.near.trim()]);
            const x2 = toSvgX(nodeMap[m.far.trim()]);
            const hasUDL = Math.abs(+m.wa || 0) > 1e-10 || Math.abs(+m.wb || 0) > 1e-10;
            const wa_val = +m.wa || 0, wb_val = +m.wb || 0;
            const wMax   = Math.max(Math.abs(wa_val), Math.abs(wb_val)) || 1;
            const midX = (x1 + x2) / 2;
            const spanW = Math.abs(x2 - x1);
            return (
              <g key={i}>
                <line x1={x1} y1={beamY} x2={x2} y2={beamY} stroke={CLR.accent} strokeWidth={5} strokeLinecap="butt" />
                <text x={midX} y={beamY + 62} textAnchor="middle" fontSize={10} fill={CLR.muted} fontFamily="monospace">{m.name || `${m.near}${m.far}`}</text>
                {hasUDL && (() => {
                  const nArr = Math.max(4, Math.round(spanW / 20));
                  const arrows = Array.from({ length: nArr }).map((_, j) => {
                    const t = nArr > 1 ? j / (nArr - 1) : 0.5;
                    const ax = x1 + t * (x2 - x1);
                    const wLocal = wa_val + (wb_val - wa_val) * t;
                    const h = 6 + 14 * Math.abs(wLocal) / wMax;
                    return { ax, h };
                  });
                  const topPts = arrows.map(({ax, h}) => `${ax},${beamY - h}`).join(" ");
                  return (
                    <g>
                      <polyline points={topPts} fill="none" stroke={CLR.yellow} strokeWidth={1.2}/>
                      {arrows.map(({ax, h}, j) => (
                        <g key={j}>
                          <line x1={ax} y1={beamY - h} x2={ax} y2={beamY - 2} stroke={CLR.yellow} strokeWidth={1.2}/>
                          <polygon points={`${ax},${beamY-2} ${ax-3},${beamY-8} ${ax+3},${beamY-8}`} fill={CLR.yellow}/>
                        </g>
                      ))}
                    </g>
                  );
                })()}
                {Math.abs(+m.P || 0) > 1e-10 && (() => {
                  const nearX = nodeMap[m.near.trim()], farX = nodeMap[m.far.trim()];
                  const px = toSvgX(nearX + (+m.a||0) * (farX > nearX ? 1 : -1));
                  return (<g><line x1={px} y1={beamY-8} x2={px} y2={beamY-28} stroke={CLR.orange} strokeWidth={2}/><polygon points={`${px},${beamY-8} ${px-4},${beamY-16} ${px+4},${beamY-16}`} fill={CLR.orange}/><text x={px+6} y={beamY-18} fontSize={9} fill={CLR.orange}>{m.P}</text></g>);
                })()}
              </g>
            );
          })}
          {result && overlayMode === "deformed" && (result.memberResults || []).map((mr, idx) => {
            const nearX = nodeMap[String(mr.near || "").trim()];
            const farX  = nodeMap[String(mr.far || "").trim()];
            if (nearX === undefined || farX === undefined || !(mr.defl || []).length) return null;
            const sign = farX >= nearX ? 1 : -1;
            const pts = (mr.defl || []).map(p => {
              const gx = nearX + sign*(+p.x || 0);
              const sx = toSvgX(gx);
              const sy = beamY + (+p.vLocal || 0) * (+overlayScale || 1);
              return `${sx},${sy}`;
            }).join(" ");
            return <polyline key={`defl-${idx}`} points={pts} fill="none" stroke={CLR.yellow} strokeWidth={2.2} strokeDasharray="6,4"/>;
          })}
          {validNodes.map((n, i) => {
            const sx = toSvgX(+n.x || 0);
            const hasPz = Math.abs(+n.Pz || 0) > 1e-10;
            const hasSettle = Math.abs(+n.settle || 0) > 1e-9;
            return (
              <g key={i}>
                <SpringSupports n={n} sx={sx} />
                <SupportSymbol type={n.type} sx={sx} settle={+n.settle||0} />
                {/* Nodal load arrow */}
                {hasPz && (<g>
                  <line x1={sx} y1={beamY-10} x2={sx} y2={beamY-30} stroke={CLR.red} strokeWidth={2}/>
                  <polygon points={`${sx},${beamY-10} ${sx-4},${beamY-18} ${sx+4},${beamY-18}`} fill={CLR.red}/>
                  <text x={sx+6} y={beamY-22} fontSize={9} fill={CLR.red}>{n.Pz}</text>
                </g>)}
                {/* Settlement annotation */}
                {hasSettle && (
                  <text x={sx} y={beamY+42} textAnchor="middle" fontSize={8} fill={CLR.orange}>δ={n.settle}</text>
                )}
                <circle cx={sx} cy={beamY} r={5} fill={(Math.abs(+n.kZ||0)>1e-12 || Math.abs(+n.kTheta||0)>1e-12) ? CLR.violet : (n.type === "Free" ? CLR.muted : CLR.green)} stroke={CLR.bg} strokeWidth={1.5}/>
                <text x={sx} y={beamY-10} textAnchor="middle" fontSize={11} fill={CLR.text} fontFamily="monospace" fontWeight="700">{n.label}</text>
                <text x={sx} y={beamY+74} textAnchor="middle" fontSize={9} fill={CLR.muted}>{+n.x||0}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ── DIAGRAM CHART ─────────────────────────────────────────────────────────
    function DiagramChart({ data, yKey, color, label, unit }) {
      if (!data || data.length === 0) return null;
      const W = 700, H = 160, PADX = 56, PADY = 24;
      const xs = data.map(d => d.x);
      const ys = data.map(d => d[yKey]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const rangeX = maxX - minX || 1;
      const maxAbs = Math.max(Math.abs(minY), Math.abs(maxY)) || 1;
      const scX = (W - 2*PADX) / rangeX;
      const scY = (H - 2*PADY) / (maxAbs * 2.2);
      const toSvg = (x, y) => ({ sx: PADX + (x - minX) * scX, sy: H/2 - y * scY });
      const pts = data.map(d => { const {sx,sy} = toSvg(d.x, d[yKey]); return `${sx},${sy}`; }).join(" ");
      const zeroY = H / 2;
      const areaPath = data.map((d, i) => {
        const {sx, sy} = toSvg(d.x, d[yKey]);
        return (i === 0 ? `M ${sx},${zeroY} L ${sx},${sy}` : `L ${sx},${sy}`);
      }).join(" ") + ` L ${toSvg(data[data.length-1].x, 0).sx},${zeroY} Z`;
      const tickVals = [maxAbs/2, maxAbs, -maxAbs/2, -maxAbs].filter(v => Math.abs(v) > 1e-9);
      return (
        <svg width={W} height={H} style={{ display:"block", margin:"0 auto", background:"transparent", overflow:"visible" }}>
          <line x1={PADX} y1={zeroY} x2={W-PADX} y2={zeroY} stroke={CLR.border} strokeWidth={1}/>
          {tickVals.map((v, i) => {
            const y = H/2 - v*scY;
            if (y < 4 || y > H-4) return null;
            return (<g key={i}>
              <line x1={PADX-3} y1={y} x2={W-PADX} y2={y} stroke={CLR.border} strokeWidth={0.5} strokeDasharray="3,3"/>
              <text x={PADX-5} y={y+4} textAnchor="end" fontSize={9} fill={CLR.muted}>{fmt3(v)}</text>
            </g>);
          })}
          <path d={areaPath} fill={color+"33"}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round"/>
          {(() => {
            const step = Math.max(1, Math.round(data.length / 8));
            return data.filter((_, i) => i % step === 0 || i === data.length - 1).map((d, i) => {
              const {sx} = toSvg(d.x, 0);
              return <text key={i} x={sx} y={H-4} textAnchor="middle" fontSize={9} fill={CLR.muted}>{fmt3(d.x)}</text>;
            });
          })()}
          <text x={PADX} y={12} fontSize={10} fill={color} fontWeight="700">{label} [{unit}]</text>
          <text x={W-PADX} y={H-4} textAnchor="end" fontSize={9} fill={CLR.muted}>x</text>
          <line x1={PADX} y1={PADY} x2={PADX} y2={H-PADY} stroke={CLR.border} strokeWidth={1}/>
        </svg>
      );
    }

    // ── INPUTS VIEW ───────────────────────────────────────────────────────────
    function InputsView({ nodes, setNodes, members, setMembers, units, setUnits, loadCases, setLoadCases, loadCombinations, setLoadCombinations, activeLoadCaseId, setActiveLoadCaseId, onCalculate }) {
      const nextNodeId = useRef(nodes.length + 1);
      const nextMemId  = useRef(members.length + 1);
      const u = UNIT_SETS[units];
      const activeLC = loadCases.find(lc => String(lc.id) === String(activeLoadCaseId)) || loadCases[0] || DEFAULT_LOAD_CASES[0];

      const updateNode = (id, field, val) => setNodes(prev => prev.map(n => n.id===id ? {...n,[field]:val} : n));
      const addNode    = () => { nextNodeId.current++; setNodes(prev => [...prev, { id:nextNodeId.current, label:"", x:"", type:"Pin", settle:0, Pz:0, kZ:0, kTheta:0 }]); };
      const delNode    = id  => { setNodes(prev => prev.filter(n => n.id !== id)); setLoadCases(prev => prev.map(lc => { const nl={...(lc.nodalLoads||{})}; delete nl[String(id)]; return {...lc,nodalLoads:nl}; })); };

      const updateMem  = (id, field, val) => setMembers(prev => prev.map(m => m.id===id ? {...m,[field]:val} : m));
      const addMem     = () => { nextMemId.current++; setMembers(prev => [...prev, { id:nextMemId.current, near:"", far:"", name:"", E:1, I:1, wa:0, wb:0, P:0, a:0, b:0 }]); };
      const delMem     = id  => { setMembers(prev => prev.filter(m => m.id !== id)); setLoadCases(prev => prev.map(lc => { const ml={...(lc.memberLoads||{})}; delete ml[String(id)]; return {...lc,memberLoads:ml}; })); };

      const updateActiveNodeLoad = (nodeId, field, val) => setLoadCases(prev => prev.map(lc => {
        if (String(lc.id) !== String(activeLC.id)) return lc;
        const current = nodeLoadFor(lc, nodeId);
        return { ...lc, nodalLoads:{ ...(lc.nodalLoads || {}), [String(nodeId)]:{ ...current, [field]:val } } };
      }));
      const updateActiveMemberLoad = (memId, field, val) => setLoadCases(prev => prev.map(lc => {
        if (String(lc.id) !== String(activeLC.id)) return lc;
        const current = memberLoadFor(lc, memId);
        return { ...lc, memberLoads:{ ...(lc.memberLoads || {}), [String(memId)]:{ ...current, [field]:val } } };
      }));
      const updateLoadCase = (id, field, val) => setLoadCases(prev => prev.map(lc => lc.id===id ? { ...lc, [field]:val } : lc));
      const addLoadCase = () => {
        const id = Math.max(0, ...loadCases.map(lc => +lc.id || 0)) + 1;
        const newCase = { id, name:`LC${id}`, type:"Live", factor:1.0, nodalLoads:{}, memberLoads:{} };
        setLoadCases(prev => [...prev, newCase]);
        setActiveLoadCaseId(id);
      };
      const duplicateLoadCase = () => {
        const id = Math.max(0, ...loadCases.map(lc => +lc.id || 0)) + 1;
        const copy = cloneDeep(activeLC);
        copy.id = id; copy.name = `${activeLC.name || "LC"} Copy`;
        setLoadCases(prev => [...prev, copy]);
        setActiveLoadCaseId(id);
      };
      const deleteLoadCase = (id) => {
        if (loadCases.length <= 1) return;
        setLoadCases(prev => prev.filter(lc => lc.id !== id));
        if (String(activeLoadCaseId) === String(id)) setActiveLoadCaseId((loadCases.find(lc => lc.id !== id) || loadCases[0]).id);
      };
      const addCombo = () => {
        const id = Math.max(0, ...loadCombinations.map(c => +c.id || 0)) + 1;
        const firstId = loadCases[0]?.id || 1;
        setLoadCombinations(prev => [...prev, { id, name:`COMBO${id}`, type:"Service", enabled:true, terms:[{ id:1, loadCaseId:firstId, factor:1.0 }] }]);
      };
      const updateCombo = (id, updater) => setLoadCombinations(prev => prev.map(c => c.id===id ? (typeof updater === "function" ? updater(c) : { ...c, ...updater }) : c));
      const delCombo = id => setLoadCombinations(prev => prev.filter(c => c.id !== id));
      const addComboTerm = comboId => updateCombo(comboId, c => ({ ...c, terms:[...(c.terms || []), { id:Math.max(0, ...((c.terms || []).map(t=>+t.id||0)))+1, loadCaseId:loadCases[0]?.id || 1, factor:1.0 }] }));
      const updateComboTerm = (comboId, termId, field, val) => updateCombo(comboId, c => ({ ...c, terms:(c.terms || []).map(t => t.id===termId ? { ...t, [field]:val } : t) }));
      const delComboTerm = (comboId, termId) => updateCombo(comboId, c => ({ ...c, terms:(c.terms || []).filter(t => t.id !== termId) }));

      const resetDefault = () => {
        setNodes(DEFAULT_NODES.map(n => ({...n})));
        setMembers(DEFAULT_MEMBERS.map(m => ({...m})));
        setLoadCases(DEFAULT_LOAD_CASES.map(lc => cloneDeep(lc)));
        setLoadCombinations(DEFAULT_LOAD_COMBINATIONS.map(c => cloneDeep(c)));
        setActiveLoadCaseId(DEFAULT_LOAD_CASES[0].id);
        nextNodeId.current = DEFAULT_NODES.length + 1;
        nextMemId.current  = DEFAULT_MEMBERS.length + 1;
      };

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:"1.5rem", flexWrap:"wrap" }}>
            <div>
              <div style={{ fontSize:22, fontWeight:800, color:CLR.text, letterSpacing:"-0.02em" }}>Beam Inputs</div>
              <div style={{ color:CLR.muted, fontSize:12, marginTop:2 }}>Define nodes, spans, loading, support settlements, and spring supports.</div>
            </div>
            <div style={{ marginLeft:"auto", display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ color:CLR.muted, fontSize:12 }}>Units:</span>
              <select style={{ ...S.select, width:"auto", padding:"6px 10px" }} value={units} onChange={e=>setUnits(e.target.value)}>
                {Object.keys(UNIT_SETS).map(u => <option key={u} value={u}>{u}</option>)}
              </select>
              <button style={S.btn("ghost")} onClick={resetDefault}>↺ Reset Example</button>
              <button style={{ ...S.btn("primary"), padding:"8px 24px", fontSize:13 }} onClick={onCalculate}>▶ Analyze</button>
            </div>
          </div>

          <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}>
              <div>
                <div style={S.h2}>Load Case Manager</div>
                <div style={{ fontSize:11, color:CLR.muted }}>Select the active load case, then enter nodal and span loads in the tables below. The analysis runs every load case separately.</div>
              </div>
              <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addLoadCase}>+ Add Case</button>
              <button style={{ ...S.btn("ghost"), padding:"4px 12px", fontSize:11 }} onClick={duplicateLoadCase}>⧉ Duplicate Active</button>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Active</th><th style={S.th}>Case</th><th style={S.th}>Type</th><th style={S.th}>Analysis Factor</th><th style={S.th}>—</th>
                </tr></thead>
                <tbody>
                  {loadCases.map((lc, i) => (
                    <tr key={lc.id} style={{ background:String(activeLC.id)===String(lc.id)?CLR.accent+"12":(i%2===0?"transparent":"#ffffff05") }}>
                      <td style={S.td}><input type="radio" checked={String(activeLC.id)===String(lc.id)} onChange={()=>setActiveLoadCaseId(lc.id)}/></td>
                      <td style={S.td}><input style={{ ...S.input, fontWeight:700, color:String(activeLC.id)===String(lc.id)?CLR.accent:CLR.text }} value={lc.name} onChange={e=>updateLoadCase(lc.id,"name",e.target.value)}/></td>
                      <td style={S.td}><select style={S.select} value={lc.type || "Dead"} onChange={e=>updateLoadCase(lc.id,"type",e.target.value)}>{LOAD_TYPES.map(t=><option key={t}>{t}</option>)}</select></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={lc.factor} onChange={e=>updateLoadCase(lc.id,"factor",e.target.value)}/></td>
                      <td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10, opacity:loadCases.length<=1?0.4:1 }} disabled={loadCases.length<=1} onClick={()=>deleteLoadCase(lc.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}>
              <div>
                <div style={S.h2}>Load Combinations</div>
                <div style={{ fontSize:11, color:CLR.muted }}>Optional linear combinations copied from the Frames manager workflow. Leave empty to solve only individual load cases.</div>
              </div>
              <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addCombo}>+ Add Combo</button>
            </div>
            {loadCombinations.length === 0 ? (
              <div style={{ padding:"0.85rem 1.25rem", fontSize:11, color:CLR.muted }}>No load combinations defined.</div>
            ) : loadCombinations.map((combo, ci) => (
              <div key={combo.id} style={{ padding:"0.85rem 1.25rem", borderTop:ci?`1px solid ${CLR.border}`:"none" }}>
                <div style={{ display:"grid", gridTemplateColumns:"90px 1fr 150px 90px", gap:8, alignItems:"center", marginBottom:8 }}>
                  <label style={{ fontSize:11, color:CLR.muted }}><input type="checkbox" checked={combo.enabled !== false} onChange={e=>updateCombo(combo.id,{enabled:e.target.checked})}/> Enabled</label>
                  <input style={S.input} value={combo.name} onChange={e=>updateCombo(combo.id,{name:e.target.value})}/>
                  <select style={S.select} value={combo.type || "Service"} onChange={e=>updateCombo(combo.id,{type:e.target.value})}>{COMBO_TYPES.map(t=><option key={t}>{t}</option>)}</select>
                  <button style={{ ...S.btn("danger"), padding:"4px 10px", fontSize:10 }} onClick={()=>delCombo(combo.id)}>Delete</button>
                </div>
                <table style={S.table}>
                  <thead><tr><th style={S.th}>Factor</th><th style={S.th}>Load Case</th><th style={S.th}>—</th></tr></thead>
                  <tbody>
                    {(combo.terms || []).map(term => (
                      <tr key={term.id}>
                        <td style={S.td}><input style={S.input} type="number" step="any" value={term.factor} onChange={e=>updateComboTerm(combo.id,term.id,"factor",e.target.value)}/></td>
                        <td style={S.td}><select style={S.select} value={term.loadCaseId} onChange={e=>updateComboTerm(combo.id,term.id,"loadCaseId",e.target.value)}>{loadCases.map(lc=><option key={lc.id} value={lc.id}>{lc.name}</option>)}</select></td>
                        <td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }} onClick={()=>delComboTerm(combo.id,term.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button style={{ ...S.btn("ghost"), padding:"4px 12px", fontSize:11, marginTop:8 }} onClick={()=>addComboTerm(combo.id)}>+ Add Term</button>
              </div>
            ))}
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:"1.5rem" }}>
            {/* Table 1: Nodes */}
            <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}`, gap:12 }}>
                <div style={S.h2}>Table 1: Nodes</div>
                <div style={{ color:CLR.muted, fontSize:11 }}>
                  <span style={{ color:CLR.orange }}>Settlement</span> = downward displacement at support &nbsp;·&nbsp;
                  <span style={{ color:CLR.red }}>Pz</span> = nodal point load (downward ↓) &nbsp;·&nbsp; <span style={{ color:CLR.violet }}>kZ / kθ</span> = spring supports
                </div>
                <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addNode}>+ Add</button>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={S.table}>
                  <thead><tr>
                    <th style={S.th}>Label</th>
                    <th style={S.th}>x [{u.dist}]</th>
                    <th style={S.th}>Type</th>
                    <th style={{ ...S.th, color:CLR.orange }}>Settlement [{u.settle}] ↓</th>
                    <th style={{ ...S.th, color:CLR.red }}>Pz [{u.force}] ↓</th>
                    <th style={{ ...S.th, color:CLR.violet }}>kZ [{u.force}/{u.dist}]</th>
                    <th style={{ ...S.th, color:CLR.violet }}>kθ [{u.moment}/rad]</th>
                    <th style={S.th}>—</th>
                  </tr></thead>
                  <tbody>
                    {nodes.map((n, i) => (
                      <tr key={n.id} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                        <td style={S.td}><input style={S.input} value={n.label} onChange={e=>updateNode(n.id,"label",e.target.value)} placeholder="A"/></td>
                        <td style={S.td}><input style={S.input} type="number" step="any" value={n.x} onChange={e=>updateNode(n.id,"x",e.target.value)}/></td>
                        <td style={S.td}>
                          <select style={S.select} value={n.type} onChange={e=>updateNode(n.id,"type",e.target.value)}>
                            {NODE_TYPES.map(t => <option key={t}>{t}</option>)}
                          </select>
                        </td>
                        <td style={S.td}><input style={{ ...S.input, borderColor: Math.abs(+n.settle||0)>1e-9 ? CLR.orange+"88" : CLR.border }} type="number" step="any" value={n.settle} onChange={e=>updateNode(n.id,"settle",e.target.value)}/></td>
                        {(() => { const L = nodeLoadFor(activeLC, n.id); return <td style={S.td}><input style={{ ...S.input, borderColor: Math.abs(+L.Pz||0)>1e-9 ? CLR.red+"88" : CLR.border }} type="number" step="any" value={L.Pz} onChange={e=>updateActiveNodeLoad(n.id,"Pz",e.target.value)}/></td>; })()}
                        <td style={S.td}><input style={{ ...S.input, borderColor: Math.abs(+n.kZ||0)>1e-9 ? CLR.violet+"88" : CLR.border }} type="number" step="any" value={n.kZ ?? 0} onChange={e=>updateNode(n.id,"kZ",e.target.value)}/></td>
                        <td style={S.td}><input style={{ ...S.input, borderColor: Math.abs(+n.kTheta||0)>1e-9 ? CLR.violet+"88" : CLR.border }} type="number" step="any" value={n.kTheta ?? 0} onChange={e=>updateNode(n.id,"kTheta",e.target.value)}/></td>
                        <td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }} onClick={()=>delNode(n.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ padding:"0.6rem 1rem", fontSize:11, color:CLR.muted, borderTop:`1px solid ${CLR.border}` }}>
                <strong style={{ color:CLR.yellow }}>Pin</strong> = fixed translation, free rotation &nbsp;·&nbsp;
                <strong style={{ color:CLR.teal }}>Fix</strong> = fixed translation + rotation &nbsp;·&nbsp;
                <strong style={{ color:CLR.violet }}>Free</strong> = free (overhang) &nbsp;·&nbsp;
                <strong style={{ color:CLR.violet }}>Spring</strong> = finite kZ / kθ restraint &nbsp;·&nbsp;
                <strong style={{ color:CLR.orange }}>Settlement</strong> inputs highlighted in orange when non-zero
              </div>
            </div>

            {/* Table 2: Unit Convention */}
            <div style={{ ...S.card }}>
              <div style={S.h2}>Table 2: Unit Convention</div>
              <table style={S.table}>
                <thead><tr><th style={S.th}>Quantity</th><th style={S.th}>Unit</th></tr></thead>
                <tbody>
                  {[
                    ["Length (x, L)", u.dist],
                    ["Force / UDL (P, wa, wb)", u.force + " / " + u.force + "/" + u.dist],
                    ["Moment (M)", u.moment],
                    ["Modulus (E)", u.force + "/" + u.dist + "²"],
                    ["Inertia (I)", u.dist + "⁴"],
                    ["Settlement (δ)", u.settle + " (↓ positive)"],
                    ["Nodal Load (Pz)", u.force + " (↓ positive)"],
                    ["Vertical Spring (kZ)", u.force + "/" + u.dist],
                    ["Rotational Spring (kθ)", u.moment + "/rad"],
                    ["Sign Convention", "+M sagging · +V upward near"],
                  ].map(([q, v], i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
                      <td style={S.td}>{q}</td>
                      <td style={{ ...S.td, color:CLR.teal, fontWeight:600 }}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Table 3: Members */}
          <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}`, gap:12 }}>
              <div style={S.h2}>Table 3: Spans (Members)</div>
              <div style={{ color:CLR.muted, fontSize:11, marginLeft:8 }}>
                Loads shown are for active load case: <span style={{ color:CLR.accent, fontWeight:700 }}>{activeLC.name}</span> &nbsp;·&nbsp; wa/wb = UDL &nbsp;·&nbsp; P = point load &nbsp;·&nbsp; a = dist from near to P
              </div>
              <button style={{ ...S.btn("ghost"), marginLeft:"auto", padding:"4px 12px", fontSize:11 }} onClick={addMem}>+ Add</button>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Near</th>
                  <th style={S.th}>Far</th>
                  <th style={S.th}>Label</th>
                  <th style={S.th}>E</th>
                  <th style={S.th}>I</th>
                  <th style={S.th}>wa [{u.force}/{u.dist}]</th>
                  <th style={S.th}>wb [{u.force}/{u.dist}]</th>
                  <th style={S.th}>P [{u.force}]</th>
                  <th style={S.th}>a [{u.dist}]</th>
                  <th style={S.th}>b [{u.dist}]</th>
                  <th style={S.th}>—</th>
                </tr></thead>
                <tbody>
                  {members.map((m, i) => (
                    <tr key={m.id} style={{ background: i%2===0?"transparent":"#ffffff05" }}>
                      <td style={S.td}><input style={S.input} value={m.near} onChange={e=>updateMem(m.id,"near",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} value={m.far}  onChange={e=>updateMem(m.id,"far",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} value={m.name} onChange={e=>updateMem(m.id,"name",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={m.E}  onChange={e=>updateMem(m.id,"E",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={m.I}  onChange={e=>updateMem(m.id,"I",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={memberLoadFor(activeLC,m.id).wa} onChange={e=>updateActiveMemberLoad(m.id,"wa",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={memberLoadFor(activeLC,m.id).wb} onChange={e=>updateActiveMemberLoad(m.id,"wb",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={memberLoadFor(activeLC,m.id).P}  onChange={e=>updateActiveMemberLoad(m.id,"P",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={memberLoadFor(activeLC,m.id).a}  onChange={e=>updateActiveMemberLoad(m.id,"a",e.target.value)}/></td>
                      <td style={S.td}><input style={S.input} type="number" step="any" value={m.b}  onChange={e=>updateMem(m.id,"b",e.target.value)}/></td>
                      <td style={S.td}><button style={{ ...S.btn("danger"), padding:"3px 8px", fontSize:10 }} onClick={()=>delMem(m.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Beam Preview */}
          <div style={{ ...S.card }}>
            <div style={S.h2}>Figure 1: Beam Preview</div>
            <BeamDiagram nodes={mergeBeamLoadCaseLoads(nodes, members, activeLC).nodes} members={mergeBeamLoadCaseLoads(nodes, members, activeLC).members}/>
          </div>

          <div style={{ ...S.card, background:"#161b22", fontSize:11, color:CLR.muted }}>
            <strong style={{ color:CLR.yellow }}>⚠ Notes:</strong>&nbsp;
            Nodes must appear in order along the beam. Near/far labels must match node labels exactly.
            L is computed from node x-coordinates. Settlement units are separate from length units (mm for kN/m systems, in for kip systems).
            Nodal point loads Pz are added directly to support reactions; they do not modify bending moments at supported nodes.
            Positive shear = upward on near face. Positive moment = sagging (tension at bottom).
          </div>
        </div>
      );
    }


    function AllSpanPrintDiagrams({ memberResults, u }) {
      if (!memberResults || memberResults.length === 0) return null;
      return (
        <div className="print-only">
          {memberResults.map((mr, i) => (
            <div key={i} className="print-avoid print-diagram-section" style={{ ...S.card, padding:"1rem", marginBottom:"1.5rem" }}>
              <div style={{ ...S.h2, marginBottom:"0.75rem" }}>Figures {2 + i*2} & {3 + i*2}: Diagrams — Span {mr.name}</div>
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:11, color:CLR.muted, marginBottom:4, textTransform:"uppercase", fontWeight:700 }}>Shear Force Diagram — {mr.name} [{u.force}]</div>
                <DiagramChart data={mr.sfd} yKey="V" color={CLR.teal} label="V" unit={u.force}/>
              </div>
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:11, color:CLR.muted, marginBottom:4, textTransform:"uppercase", fontWeight:700 }}>Bending Moment Diagram — {mr.name} [{u.moment}]</div>
                <DiagramChart data={mr.bmd} yKey="M" color={CLR.orange} label="M" unit={u.moment}/>
              </div>
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:11, color:CLR.muted, marginBottom:4, textTransform:"uppercase", fontWeight:700 }}>Deflection Diagram — {mr.name} [{u.settle}]</div>
                <DiagramChart data={mr.defl} yKey="vLocal" color={CLR.yellow} label="v" unit={u.settle}/>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── RESULTS VIEW ──────────────────────────────────────────────────────────
    function ResultsView({ result, nodes, members, units, selectedResultId, setSelectedResultId }) {
      const u = UNIT_SETS[units];
      const [activeSpan, setActiveSpan] = useState(0);
      const [memberDiagramType, setMemberDiagramType] = useState("V");
      const [overlayMode, setOverlayMode] = useState("none");
      const [overlayScale, setOverlayScale] = useState(5);
      const caseList = result && Array.isArray(result.cases) ? result.cases : [];
      const activeOutput = caseList.find(c => String(c.loadCase.id) === String(selectedResultId)) || caseList[0];
      const activeResult = activeOutput ? activeOutput.result : null;
      const displayNodes = (activeResult && activeResult.modelNodes) || nodes;
      const displayMembers = (activeResult && activeResult.modelMembers) || members;

      if (!result || !activeResult) return (
        <div style={{ textAlign:"center", padding:"4rem", color:CLR.muted }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🏗️</div>
          <div style={{ fontSize:16, fontWeight:700, color:CLR.text }}>No results yet</div>
          <div style={{ fontSize:13, marginTop:8 }}>Go to Inputs and press Analyze.</div>
        </div>
      );

      if (activeResult.error) return (
        <div style={{ ...S.card, border:`1px solid ${CLR.red}44` }}>
          <div style={{ fontSize:14, fontWeight:700, color:CLR.red, marginBottom:8 }}>✗ Solver Error</div>
          <div style={{ color:CLR.muted, fontSize:13 }}>{activeResult.error}</div>
        </div>
      );

      const { rotations, memberResults, reactions } = activeResult;
      const activeMem = memberResults[activeSpan];
      const reportDate = new Date().toLocaleDateString();
      const printReport = () => {
        setTimeout(() => window.print(), 50);
      };

      const hasSettlements = rotations.some(r => Math.abs(r.settle) > 1e-9);

      return (
        <div className="report-results-block">
          <div className="screen-only" style={{ ...S.card, display:"flex", alignItems:"center", gap:"1rem", marginBottom:"1.5rem", background:"#161b22", flexWrap:"wrap" }}>
            <div>
              <div style={{ ...S.h2, marginBottom:4 }}>Analysis Report</div>
              <div style={{ fontSize:11, color:CLR.muted }}>Review individual load cases or load combinations, then print/save the selected results package as a PDF.</div>
            </div>
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:11, color:CLR.muted }}>Results:</span>
              <select style={{ ...S.select, width:240 }} value={activeOutput?.loadCase?.id || ""} onChange={e=>setSelectedResultId(e.target.value)}>
                {caseList.map(c => <option key={c.loadCase.id} value={c.loadCase.id}>{c.loadCase.name} — {c.loadCase.type}</option>)}
              </select>
              <button style={{ ...S.btn("primary"), padding:"8px 20px", fontSize:13 }} onClick={printReport}>🖨 Print / Save PDF Report</button>
            </div>
          </div>

          <div className="print-report-header">
            <h1>Beams v0.3.6 — Continuous Beam / Cantilever Analysis Report</h1>
            <div className="meta">
              Generated: {reportDate}<br/>
              Result Set: {activeOutput?.loadCase?.name || "—"} ({activeOutput?.loadCase?.type || "—"})<br/>
              Units: force = {u.force}, distance = {u.dist}, moment = {u.moment}, settlement = {u.settle}<br/>
              Method: Direct stiffness analysis with beam displacement + rotation DOFs, consistent member load vectors, support settlements, and nodal spring supports.
            </div>
          </div>

          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:"2rem" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", marginBottom:"1rem" }}>
              <div style={{ ...S.h2, marginBottom:0 }}>Figure 1: Beam Diagram</div>
              <div className="screen-only" style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8, fontSize:11, color:CLR.muted }}>
                Overlay
                <select style={{ ...S.select, width:180 }} value={overlayMode} onChange={e=>setOverlayMode(e.target.value)}>
                  <option value="none">None</option>
                  <option value="deformed">Deflected shape</option>
                </select>
                Scale
                <input style={{ ...S.input, width:80 }} type="number" step="0.5" value={overlayScale} onChange={e=>setOverlayScale(+e.target.value || 1)}/>
              </div>
            </div>
            <BeamDiagram nodes={displayNodes} members={displayMembers} result={activeResult} overlayMode={overlayMode} overlayScale={overlayScale}/>
          </div>

          <div className="report-results-block" style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"1.5rem" }}>
            {/* Table 1: Reactions */}
            <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden" }}>
              <div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}>
                <div style={S.h2}>Table 1: Reactions</div>
              </div>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Node</th>
                  <th style={S.th}>Type</th>
                  {hasSettlements && <th style={{ ...S.th, color:CLR.orange }}>δ [{u.settle}]</th>}
                  <th style={S.th}>Rz [{u.force}]</th>
                  <th style={S.th}>Rm [{u.moment}]</th>
                </tr></thead>
                <tbody>
                  {reactions.map((r, i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
                      <td style={{ ...S.td, fontWeight:700, color:CLR.green }}>{r.label}</td>
                      <td style={S.td}><span style={S.badge(r.hasSpring?CLR.violet:(r.type==="Pin"?CLR.yellow:r.type==="Fix"?CLR.teal:CLR.violet))}>{r.supportLabel || r.type}</span></td>
                      {hasSettlements && <td style={{ ...S.td, color:Math.abs(r.settle)>1e-9?CLR.orange:CLR.muted }}>{r.settle || "0"}</td>}
                      <td style={{ ...S.td, color:Math.abs(r.Rz)>1e-6?CLR.text:CLR.muted }}>{fmt3(r.Rz)}</td>
                      <td style={{ ...S.td, color:Math.abs(r.Rm)>1e-6?CLR.text:CLR.muted }}>{fmt3(r.Rm)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Table 2: Nodal Displacements and Rotations */}
            <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden" }}>
              <div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}>
                <div style={S.h2}>Table 2: Nodal Displacements / Rotations</div>
              </div>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Node</th>
                  <th style={S.th}>Type</th>
                  <th style={S.th}>Δz [{u.settle}]</th>
                  <th style={S.th}>θ [rad]</th>
                </tr></thead>
                <tbody>
                  {rotations.map((r, i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
                      <td style={{ ...S.td, fontWeight:700, color:CLR.violet }}>{r.label}</td>
                      <td style={S.td}><span style={S.badge(r.hasSpring?CLR.violet:(r.type==="Pin"?CLR.yellow:r.type==="Fix"?CLR.teal:CLR.violet))}>{r.supportLabel || r.type}</span></td>
                      <td style={{ ...S.td, color:Math.abs(r.dz)>1e-9?CLR.text:CLR.muted }}>{fmt3(r.dz || 0)}</td>
                      <td style={{ ...S.td, color:Math.abs(r.theta)>1e-9?CLR.text:CLR.muted }}>{fmt4(r.theta)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Table 3: Span End Forces */}
            <div className="print-avoid print-table-section" style={{ ...S.card, padding:0, overflow:"hidden" }}>
              <div style={{ padding:"1rem 1.25rem 0.75rem", borderBottom:`1px solid ${CLR.border}` }}>
                <div style={S.h2}>Table 3: Span End Forces</div>
              </div>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Span</th>
                  <th style={S.th}>Vnear [{u.force}]</th>
                  <th style={S.th}>Mnear [{u.moment}]</th>
                  <th style={S.th}>Vfar [{u.force}]</th>
                  <th style={S.th}>Mfar [{u.moment}]</th>
                </tr></thead>
                <tbody>
                  {memberResults.map((mr, i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05", cursor:"pointer", outline: activeSpan===i?`1px solid ${CLR.accent}`:undefined }} onClick={()=>setActiveSpan(i)}>
                      <td style={{ ...S.td, fontWeight:700, color:CLR.accent }}>{mr.name}</td>
                      <td style={{ ...S.td, color:CLR.teal }}>{fmt3(mr.V_near)}</td>
                      <td style={{ ...S.td, color:CLR.orange }}>{fmt3(mr.M_near)}</td>
                      <td style={{ ...S.td, color:CLR.teal }}>{fmt3(mr.V_far)}</td>
                      <td style={{ ...S.td, color:CLR.orange }}>{fmt3(mr.M_far)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="screen-only" style={{ padding:"0.4rem 1rem", fontSize:10, color:CLR.muted, borderTop:`1px solid ${CLR.border}` }}>Click a row to view its diagrams below.</div>
            </div>
          </div>

          {/* Span diagrams */}
          <div className="screen-only" style={{ ...S.card }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:"1rem", flexWrap:"wrap" }}>
              <div style={S.h2}>Figures 2–5: Span Diagrams</div>
              {memberResults.map((mr, i) => (
                <button key={i} style={{ ...S.btn(activeSpan===i?"primary":"ghost"), padding:"4px 14px", fontSize:12 }} onClick={()=>setActiveSpan(i)}>{mr.name}</button>
              ))}
            </div>
            {activeMem && (() => {
              const cfg = memberDiagramType === "V" ? { title:`Shear Force Diagram (SFD) — ${activeMem.name} [${u.force}]`, data:activeMem.sfd, key:"V", color:CLR.teal, label:"V", unit:u.force }
                : memberDiagramType === "M" ? { title:`Bending Moment Diagram (BMD) — ${activeMem.name} [${u.moment}]`, data:activeMem.bmd, key:"M", color:CLR.orange, label:"M", unit:u.moment }
                : memberDiagramType === "theta" ? { title:`Angular Rotation θ — ${activeMem.name} [rad]`, data:activeMem.defl, key:"thetaLocal", color:CLR.violet, label:"θ", unit:"rad" }
                : { title:`Deflection Diagram — ${activeMem.name} [${u.settle}]`, data:activeMem.defl, key:"vLocal", color:CLR.yellow, label:"v", unit:u.settle };
              return (
                <div>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, flexWrap:"wrap" }}>
                    <div style={{ fontSize:11, color:CLR.muted }}>{cfg.title}</div>
                    <select style={{ ...S.select, width:210, marginLeft:"auto" }} value={memberDiagramType} onChange={e=>setMemberDiagramType(e.target.value)}>
                      <option value="V">Shear force</option>
                      <option value="M">Bending moment</option>
                      <option value="theta">Angular rotation</option>
                      <option value="vLocal">Deflection</option>
                    </select>
                  </div>
                  <DiagramChart data={cfg.data} yKey={cfg.key} color={cfg.color} label={cfg.label} unit={cfg.unit}/>
                </div>
              );
            })()}
          </div>

          <AllSpanPrintDiagrams memberResults={memberResults} u={u}/>
        </div>
      );
    }

    // ── THEORY VIEW ───────────────────────────────────────────────────────────
    function TheoryView() {
      return (
        <div>
          <div style={{ ...S.card }}>
            <div style={S.h2}>Method: Direct Stiffness (Beam Displacement + Rotation DOFs)</div>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"1rem" }}>
              Beams v0.3 solves continuous beams using the <strong style={{ color:CLR.text }}>Direct Stiffness Method</strong>.
              Each node has two beam degrees of freedom: vertical displacement Δz and rotation θ. The global equation K·D = F is assembled from
              Euler-Bernoulli beam stiffness matrices and consistent member load vectors. This is the same displacement-based stiffness logic used in Frames v0.6.6,
              specialized to horizontal beams, so fixed-free cantilevers and overhangs are solved directly instead of being approximated with pin-end reductions.
            </p>
            <div style={{ ...S.card, background:"#0d1117", fontSize:12, lineHeight:2.2, color:CLR.teal }}>
              <div><span style={{ color:CLR.muted }}>Member stiffness (4×4):          </span>DOFs = [v1, θ1, v2, θ2], with standard Euler-Bernoulli beam stiffness.</div>
              <div><span style={{ color:CLR.muted }}>Chord rotation (span rotation):  </span>ψ = Δ/L = (δ_far − δ_near)/L  [Eq. 10-8 / 10-10, positive clockwise]</div>
              <div><span style={{ color:CLR.muted }}>Case 1 — far end fixed (Eq.10-8):</span>M_N = 2Ek(2θ_N + θ_F − 3ψ) + (FEM)_N  →  chord term = −6EI/L² · Δ (same at both ends)</div>
              <div><span style={{ color:CLR.muted }}>Case 2 — far end pin  (Eq.10-10):</span>M_N = 3Ek(θ_N − ψ) + (FEM*)_N  →  chord term = −3EI/L² · Δ (from pin-end reduction)</div>
              <div><span style={{ color:CLR.muted }}>FEM — Trapezoidal UDL (fix-fix): </span>M_near = +L²·(3wa+2wb)/60 · M_far = −L²·(2wa+3wb)/60</div>
              <div><span style={{ color:CLR.muted }}>  (uniform: wa=wb=w gives ±wL²/12; triangular: wa=0 gives wL²/30, −wL²/20)</span></div>
              <div><span style={{ color:CLR.muted }}>FEM — Point load P (fix-fix):    </span>M_near = +Pab²/L² · M_far = −Pa²b/L²</div>
              <div><span style={{ color:CLR.muted }}>FEM — Chord rotation (Eq.10-8):  </span>FEM_chord = −6EI/L · ψ  [added to both ends; for pin-end: 0.5·FEM_chord = −3EI/L·ψ]</div>
              <div><span style={{ color:CLR.muted }}>FEM — Pin-end modification:      </span>M_near = FEM_ff_near − ½·FEM_ff_far  (FEM_ff includes FEM_chord)</div>
              <div><span style={{ color:CLR.muted }}>End moments (recovery):          </span>M = k·θ + FEM_modified  (FEM_modified includes chord rotation via FEM_chord)</div>
              <div><span style={{ color:CLR.muted }}>Shear (near):                    </span>V_near = (M_near + M_far + L²·(2wa+wb)/6 + P·a) / L</div>
              <div><span style={{ color:CLR.muted }}>Internal BMD:                    </span>M(x) = −M_near + V_near·x − wa·x²/2 − (wb−wa)·x³/(6L) − P·(x−a)·H(x≥a)</div>
              <div><span style={{ color:CLR.muted }}>Global system:                   </span>[Kff]·Df = Ff − Kfc·Dc</div>
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1.5rem" }}>
            <div style={{ ...S.card }}>
              <div style={S.h2}>Node Types</div>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Type</th><th style={S.th}>Translation</th>
                  <th style={S.th}>Rotation</th><th style={S.th}>Reactions</th>
                </tr></thead>
                <tbody>
                  {[
                    ["Pin",  "Fixed (δ prescribed)", "Free (θ ≠ 0)",  "Rz only"],
                    ["Fix",  "Fixed (δ prescribed)", "Fixed (θ = 0)", "Rz + Rm"],
                    ["Free", "Free (δ ≠ 0)",         "Free (θ ≠ 0)", "None (overhang)"],
                    ["Spring", "Finite kZ",           "Finite kθ",     "Spring reaction = k·displacement"],
                  ].map(([t,tr,rot,rx], i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
                      <td style={{ ...S.td, color: t==="Pin"?CLR.yellow:t==="Fix"?CLR.teal:CLR.violet, fontWeight:700 }}>{t}</td>
                      <td style={S.td}>{tr}</td><td style={S.td}>{rot}</td>
                      <td style={{ ...S.td, color:CLR.teal }}>{rx}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{ ...S.card }}>
              <div style={S.h2}>Sign Convention</div>
              <table style={S.table}>
                <thead><tr><th style={S.th}>Quantity</th><th style={S.th}>Positive direction</th></tr></thead>
                <tbody>
                  {[
                    ["Shear V (near face)",   "Upward on near face (↑)"],
                    ["Shear V (far face)",    "Downward on far face (↓)"],
                    ["Moment M (near/far)",   "As per nodal stiffness convention"],
                    ["BMD convention",        "+M = sagging (tension at bottom)"],
                    ["Rotation θ",            "Anti-clockwise"],
                    ["Settlement δ",          "Downward (+) — in settle units"],
                    ["Nodal load Pz",         "Downward (+) — added to reaction"],
                    ["Spring supports",      "kZ restrains vertical translation; kθ restrains rotation"],
                  ].map(([q,v],i) => (
                    <tr key={i} style={{ background:i%2===0?"transparent":"#ffffff05" }}>
                      <td style={{ ...S.td, color:CLR.yellow }}>{q}</td>
                      <td style={{ ...S.td, color:CLR.teal }}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ ...S.card }}>
            <div style={S.h2}>Default Example — Fig. P16.12 / P16.16</div>
            <p style={{ fontSize:12, color:CLR.muted, lineHeight:1.8 }}>
              Three-span continuous beam A–C–E–G. All four nodes are pin supports.
              B, D, F are load points <em>within</em> spans (not supports).
              Spans: AC = 10 m (EI), CE = 10 m (2EI), EG = 8 m (EI), where EI = 200 GPa × 500×10⁶ mm⁴ = 100,000 kN·m².
              Point loads: 120 kN at B (6 m from A), 120 kN at D (6 m from C), 150 kN at F (4 m from E).
              Support settlements (downward): A = 10 mm, C = 65 mm, E = 40 mm, G = 25 mm.
              Results: M_AC,far ≈ −357 kN·m, M_CE,near ≈ +357 kN·m, M_CE,far ≈ −144 kN·m, M_EG,near ≈ +144 kN·m.
            </p>
          </div>
        </div>
      );
    }

    // ── APP ────────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab]         = useState("inputs");
      const [nodes, setNodes]     = useState(DEFAULT_NODES.map(n => ({...n})));
      const [members, setMembers] = useState(DEFAULT_MEMBERS.map(m => ({...m})));
      const [units, setUnits]     = useState(DEFAULT_UNITS);
      const [loadCases, setLoadCases] = useState(DEFAULT_LOAD_CASES.map(lc => cloneDeep(lc)));
      const [loadCombinations, setLoadCombinations] = useState(DEFAULT_LOAD_COMBINATIONS.map(c => cloneDeep(c)));
      const [activeLoadCaseId, setActiveLoadCaseId] = useState(DEFAULT_LOAD_CASES[0].id);
      const [selectedResultId, setSelectedResultId] = useState(DEFAULT_LOAD_CASES[0].id);
      const [result, setResult]   = useState(null);

      const saveWorkingFile = () => {
        // Save the current model by producing a new HTML file with the same source code,
        // but with the DEFAULT_* input constants replaced by the live React state.
        // This is intentionally code-level saving: the downloaded file opens like a fresh app,
        // with the saved model becoming the default model in the source.
        const clone = document.documentElement.cloneNode(true);
        const root = clone.querySelector("#root");
        if (root) root.innerHTML = "";
        let html = "<!DOCTYPE html>\n" + clone.outerHTML;

        const safeLiteral = (value) => JSON.stringify(value, null, 2)
          .replace(/</g, "\\u003C")
          .replace(/>/g, "\\u003E")
          .replace(/&/g, "\\u0026")
          .replace(/\u2028/g, "\\u2028")
          .replace(/\u2029/g, "\\u2029");

        const replaceConstAssignment = (source, constName, literal) => {
          const marker = "const " + constName + " =";
          const start = source.indexOf(marker);
          if (start < 0) return source;
          let i = start + marker.length;
          while (i < source.length && /\s/.test(source[i])) i++;
          let depth = 0;
          let quote = null;
          let escaped = false;
          let end = i;
          for (; end < source.length; end++) {
