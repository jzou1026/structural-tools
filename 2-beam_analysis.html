            const ch = source[end];
            if (quote) {
              if (escaped) {
                escaped = false;
              } else if (ch === "\\") {
                escaped = true;
              } else if (ch === quote) {
                quote = null;
              }
              continue;
            }
            if (ch === '"' || ch === "'" || ch === "`") {
              quote = ch;
            } else if (ch === "[" || ch === "{") {
              depth++;
            } else if (ch === "]" || ch === "}") {
              depth--;
            } else if (ch === ";" && depth <= 0) {
              end++;
              break;
            }
          }
          return source.slice(0, start) + "const " + constName + " = " + literal + ";" + source.slice(end);
        };

        const savedNodes = nodes.map(n => ({...n}));
        const savedMembers = members.map(m => ({...m}));
        const savedLoadCases = cloneDeep(loadCases);
        const savedLoadCombinations = cloneDeep(loadCombinations);

        html = replaceConstAssignment(html, "DEFAULT_UNITS", safeLiteral(units));
        html = replaceConstAssignment(html, "DEFAULT_NODES", safeLiteral(savedNodes));
        html = replaceConstAssignment(html, "DEFAULT_MEMBERS", safeLiteral(savedMembers));
        html = replaceConstAssignment(html, "DEFAULT_LOAD_CASES", safeLiteral(savedLoadCases));
        html = replaceConstAssignment(html, "DEFAULT_LOAD_COMBINATIONS", safeLiteral(savedLoadCombinations));

        const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        const blob = new Blob([html], { type:"text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Beams_v0_3_6_working_${timestamp}.html`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const handleCalculate = () => {
        const cases = solveLoadCases(nodes, members, loadCases, loadCombinations, units);
        const preferred = cases.find(c => String(c.loadCase.id) === String(activeLoadCaseId)) || cases[0];
        setResult({ cases });
        setSelectedResultId(preferred ? preferred.loadCase.id : "");
        setTab("results");
      };

      const tabs = [
        { id:"inputs",  label:"Inputs" },
        { id:"results", label:"Results" },
        { id:"theory",  label:"Theory" },
      ];

      return (
        <div style={S.app}>
          <header style={S.header}>
            <div>
              <div style={{ fontSize:16, fontWeight:800, color:CLR.accent, letterSpacing:"0.05em" }}>Beams v0.3.6</div>
              <div style={{ fontSize:10, color:CLR.muted, letterSpacing:"0.1em" }}>CONTINUOUS BEAM ANALYSIS · DIRECT STIFFNESS METHOD</div>
            </div>
            <nav style={S.nav}>
              {tabs.map(t => (
                <button key={t.id} style={S.navBtn(tab===t.id)} onClick={() => setTab(t.id)}>
                  {t.label}
                  {t.id==="results" && result && Array.isArray(result.cases) && result.cases.some(c=>c.result && !c.result.error) && <span style={{ marginLeft:6, ...S.badge(CLR.green), fontSize:9, padding:"1px 5px" }}>✓</span>}
                  {t.id==="results" && result && Array.isArray(result.cases) && result.cases.every(c=>c.result && c.result.error) && <span style={{ marginLeft:6, ...S.badge(CLR.red),   fontSize:9, padding:"1px 5px" }}>✗</span>}
                </button>
              ))}
            </nav>
            <button style={{ ...S.btn("secondary"), marginLeft:12, whiteSpace:"nowrap" }} onClick={saveWorkingFile}>💾 Save Working File</button>
          </header>
          <main style={S.main}>
            {tab==="inputs"  && <InputsView nodes={nodes} setNodes={setNodes} members={members} setMembers={setMembers} units={units} setUnits={setUnits} loadCases={loadCases} setLoadCases={setLoadCases} loadCombinations={loadCombinations} setLoadCombinations={setLoadCombinations} activeLoadCaseId={activeLoadCaseId} setActiveLoadCaseId={setActiveLoadCaseId} onCalculate={handleCalculate}/>}
            {tab==="results" && <ResultsView result={result} nodes={nodes} members={members} units={units} selectedResultId={selectedResultId} setSelectedResultId={setSelectedResultId}/>}
            {tab==="theory"  && <TheoryView/>}
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
