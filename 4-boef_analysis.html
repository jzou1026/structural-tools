const fmt2 = v => Number.isFinite(v) ? (Math.abs(v)<1e-9 ? "0.00" : v.toFixed(2)) : "—";
const fmt3 = v => Number.isFinite(v) ? (Math.abs(v)<1e-9 ? "0.000" : v.toFixed(3)) : "—";

function nodeLoadFor(loadCase, nodeId) { return { ...EMPTY_NODE_LOAD, ...(((loadCase || {}).nodalLoads || {})[String(nodeId)] || {}) }; }
function memberLoadFor(loadCase, memberId) { return { ...EMPTY_MEMBER_LOAD, ...(((loadCase || {}).memberLoads || {})[String(memberId)] || {}) }; }
function clone(x){ return JSON.parse(JSON.stringify(x)); }

function combineLoadCases(loadCases, combo) {
  const combined = { id:`combo-${combo.id}`, name:combo.name, type:"Combination", factor:1.0, nodalLoads:{}, memberLoads:{} };
  (loadCases || []).forEach(lc => {
    const key = LOAD_TYPE_KEYS[lc.type] || lc.type;
    const comboFactor = +(combo.factors && combo.factors[key] || 0);
    const caseFactor = +(lc.factor ?? 1) || 0;
    const f = comboFactor * caseFactor;
    if (Math.abs(f) < 1e-12) return;

    Object.entries(lc.nodalLoads || {}).forEach(([nodeId, L]) => {
      const cur = { ...EMPTY_NODE_LOAD, ...(combined.nodalLoads[nodeId] || {}) };
      combined.nodalLoads[nodeId] = {
        fx: cur.fx + f*(+L.fx || 0),
        fy: cur.fy + f*(+L.fy || 0),
        mz: cur.mz + f*(+L.mz || 0)
      };
    });

    Object.entries(lc.memberLoads || {}).forEach(([memberId, L]) => {
      const cur = { ...EMPTY_MEMBER_LOAD, ...(combined.memberLoads[memberId] || {}) };
      combined.memberLoads[memberId] = {
        qyA: cur.qyA + f*(+L.qyA || 0),
        qyB: cur.qyB + f*(+L.qyB || 0),
        pointPy: cur.pointPy + f*(+L.pointPy || 0),
        pointA: (+L.pointA || 0) || cur.pointA || 0
      };
    });
  });
  return combined;
}

function gauss(A,b) {
  const n=b.length, M=A.map((r,i)=>[...r,b[i]]);
  for (let c=0;c<n;c++) {
    let p=c; for (let r=c+1;r<n;r++) if (Math.abs(M[r][c])>Math.abs(M[p][c])) p=r;
    [M[c],M[p]]=[M[p],M[c]];
    if (Math.abs(M[c][c])<1e-12) return null;
    for (let r=c+1;r<n;r++) { const f=M[r][c]/M[c][c]; for (let k=c;k<=n;k++) M[r][k]-=f*M[c][k]; }
  }
  const x=Array(n).fill(0);
  for (let i=n-1;i>=0;i--) { let s=M[i][n]; for (let j=i+1;j<n;j++) s-=M[i][j]*x[j]; x[i]=s/M[i][i]; }
  return x;
}
function addMat(K, dofs, ke) { for(let i=0;i<dofs.length;i++) for(let j=0;j<dofs.length;j++) K[dofs[i]][dofs[j]] += ke[i][j]; }
function matVec(K,x){ return K.map(r=>r.reduce((s,v,i)=>s+v*x[i],0)); }

function makeBand(n,bw){ return Array.from({length:n},()=>new Float64Array(2*bw+1)); }
function bandOffset(i,j,bw){ const o=j-i+bw; return (o>=0 && o<2*bw+1) ? o : -1; }
function getBand(K,i,j,bw){ const o=bandOffset(i,j,bw); return o<0 ? 0 : K[i][o]; }
function setBand(K,i,j,v,bw){ const o=bandOffset(i,j,bw); if(o>=0) K[i][o]=v; }
function addBand(K,i,j,v,bw){ const o=bandOffset(i,j,bw); if(o>=0) K[i][o]+=v; }
function addMatBand(K,dofs,ke,bw){ for(let i=0;i<dofs.length;i++) for(let j=0;j<dofs.length;j++) addBand(K,dofs[i],dofs[j],ke[i][j],bw); }
function cloneBand(K){ return K.map(r=>new Float64Array(r)); }
function matVecBand(K,x,bw){
  const n=x.length, y=Array(n).fill(0);
  for(let i=0;i<n;i++){
    const j0=Math.max(0,i-bw), j1=Math.min(n-1,i+bw);
    let s=0;
    for(let j=j0;j<=j1;j++) s += getBand(K,i,j,bw)*(x[j]||0);
    y[i]=s;
  }
  return y;
}
function gaussBand(K,b,bw){
  const n=b.length, rhs=Float64Array.from(b);
  for(let k=0;k<n;k++){
    const piv=getBand(K,k,k,bw);
    if(Math.abs(piv)<1e-14) return null;
    const iMax=Math.min(n-1,k+bw);
    for(let i=k+1;i<=iMax;i++){
      const aik=getBand(K,i,k,bw);
      if(Math.abs(aik)<1e-18) continue;
      const f=aik/piv;
      setBand(K,i,k,f,bw);
      const jMax=Math.min(n-1,k+bw);
      for(let j=k+1;j<=jMax;j++){
        addBand(K,i,j,-f*getBand(K,k,j,bw),bw);
      }
      rhs[i]-=f*rhs[k];
    }
  }
  const x=new Float64Array(n);
  for(let i=n-1;i>=0;i--){
    let s=rhs[i];
    const jMax=Math.min(n-1,i+bw);
    for(let j=i+1;j<=jMax;j++) s-=getBand(K,i,j,bw)*x[j];
    const piv=getBand(K,i,i,bw);
    if(Math.abs(piv)<1e-14) return null;
    x[i]=s/piv;
  }
  return Array.from(x);
}
function beamK(EI,L){
  const L2=L*L, L3=L2*L;
  return [
    [12*EI/L3, 6*EI/L2, -12*EI/L3, 6*EI/L2],
    [6*EI/L2, 4*EI/L, -6*EI/L2, 2*EI/L],
    [-12*EI/L3, -6*EI/L2, 12*EI/L3, -6*EI/L2],
    [6*EI/L2, 2*EI/L, -6*EI/L2, 4*EI/L]
  ];
}
function shape(t,L){
  return [
    1 - 3*t*t + 2*t*t*t,
    L*(t - 2*t*t + t*t*t),
    3*t*t - 2*t*t*t,
    L*(-t*t + t*t*t)
  ];
}
function dshapeDx(t,L){
  return [
    (-6*t + 6*t*t)/L,

    -2*t + 3*t*t
  ];

function d2shapeDx2(t,L){

    (-4 + 6*t)/L,

// RK4 helper used for post-processing the beam ODE state [w, theta, M, V].
// The finite-element backbone provides nodal compatibility; this RK4 pass is used
// to generate smooth station values using the elastic-foundation differential equations.
function rk4Step(state, h, x, EI, qFunc, kFunc) {
  const f = (s, xx) => [s[1], s[2]/EI, s[3], qFunc(xx) - kFunc(xx)*s[0]];
  const k1=f(state,x);
  const s2=state.map((v,i)=>v+0.5*h*k1[i]); const k2=f(s2,x+0.5*h);
  const s3=state.map((v,i)=>v+0.5*h*k2[i]); const k3=f(s3,x+0.5*h);
  const s4=state.map((v,i)=>v+h*k3[i]); const k4=f(s4,x+h);
  return state.map((v,i)=>v+h*(k1[i]+2*k2[i]+2*k3[i]+k4[i])/6);
}
function restraints(support) {
  // BOEF v0.3 intentionally removes conventional supports.
  // The model is supported only by linear springs: continuous kw and optional nodal ky/kθ.
  return [];
}
function solveCase(nodes, members, loadCase, units) {
  const U=UNIT_SETS[units] || UNIT_SETS["kip/ft"];
  const inputNodes = nodes.filter(n=>String(n.label).trim()).map(n=>({...n, x:+n.x||0})).sort((a,b)=>a.x-b.x);
  if (inputNodes.length < 2) return { error:"At least two nodes are required." };
  const inputNodeByLabel={}; inputNodes.forEach(n=>inputNodeByLabel[String(n.label).trim()]=n);

  const analysisNodes=[];
  const addAnalysisNode=(x, originalLabel=null)=>{
    const key=x.toFixed(9);
    let idx=analysisNodes.findIndex(n=>n.key===key);
    if(idx>=0) {
      if(originalLabel) analysisNodes[idx].label=originalLabel;
      return idx;
    }
    analysisNodes.push({ key, x, label:originalLabel || "" });
    analysisNodes.sort((a,b)=>a.x-b.x);
    return analysisNodes.findIndex(n=>n.key===key);
  };
  inputNodes.forEach(n=>addAnalysisNode(n.x, n.label));

  const expandedElements=[];
  const memberMeta=[];
  for (const m of members) {
    const a=inputNodeByLabel[String(m.near).trim()], b=inputNodeByLabel[String(m.far).trim()];
    if(!a || !b || Math.abs((+b.x||0)-(+a.x||0))<1e-12) continue;
    const xA=Math.min(+a.x||0,+b.x||0), xB=Math.max(+a.x||0,+b.x||0), Luser=xB-xA;
    const E=(+m.E||30000)*U.EFactor, I=+m.I||1, EI=E*I;
    const kAvgSolver=Math.max(0,((+m.kwA||0)+(+m.kwB||0))/2*U.foundationToFperLen2);
    const betaSolver=(kAvgSolver>0 && EI>0)?Math.pow(kAvgSolver/(4*EI),0.25):0;
    // Balanced BOEF mesh: finer than the original coarse mesh, but less laggy than the 100x fine version.
    // For the default 600 in beam, this gives roughly dx ≈ 0.25 in instead of ~0.06 in.
    const targetSolver = betaSolver>0 ? Math.min(0.25*U.coordToLen, 0.005/betaSolver) : 0.25*U.coordToLen;
    const nSub=Math.max(600, Math.min(12000, Math.ceil((Luser*U.coordToLen)/Math.max(targetSolver,1e-9))));
    const memberPointXs=[];
    const Lm=memberLoadFor(loadCase,m.id);
    const pointAUser=Math.max(0,Math.min(Luser,+Lm.pointA||0));
    if(Math.abs(+Lm.pointPy||0)>1e-12) memberPointXs.push(xA+pointAUser);
    const xs=[xA,xB,...memberPointXs];
    for(let i=1;i<nSub;i++) xs.push(xA+Luser*i/nSub);
    xs.sort((p,q)=>p-q);
    const unique=[]; xs.forEach(x=>{ if(!unique.length || Math.abs(x-unique[unique.length-1])>1e-8) unique.push(x); });
    const startIndex=expandedElements.length;
    for(let i=0;i<unique.length-1;i++){
      const xa=unique[i], xb=unique[i+1];
      expandedElements.push({ member:m, x1:xa, x2:xb, parentName:m.name||`${m.near}-${m.far}`, parentNear:m.near, parentFar:m.far, E, I, EI, localX1:xa-xA, localX2:xb-xA, memberX1:xA, memberX2:xB, Luser });
      addAnalysisNode(xa); addAnalysisNode(xb);
    }
    memberMeta.push({ name:m.name||`${m.near}-${m.far}`, near:m.near, far:m.far, x1:xA, x2:xB, L:Luser, E:E/U.EFactor, I, kwA:+m.kwA||0, kwB:+m.kwB||0, load:Lm, startIndex, endIndex:expandedElements.length });
  }

  analysisNodes.sort((a,b)=>a.x-b.x);
  const nodeAtX={}; analysisNodes.forEach((n,i)=>nodeAtX[n.key]=i);
  const nodeIndexByInput={}; inputNodes.forEach(n=>nodeIndexByInput[String(n.label).trim()]=nodeAtX[(+n.x||0).toFixed(9)]);
  const nDOF=analysisNodes.length*2;
  const BW=5;
  const K=makeBand(nDOF,BW);
  const F=Array(nDOF).fill(0);

  for (const o of expandedElements) {
    const ni=nodeAtX[o.x1.toFixed(9)], nj=nodeAtX[o.x2.toFixed(9)];
    const L=(o.x2-o.x1)*U.coordToLen;
    if(L<=1e-9) continue;
    let ke=beamK(o.EI,L);
    const fe=[0,0,0,0];
    const Lm=memberLoadFor(loadCase,o.member.id);
    const fcase=+(loadCase.factor ?? 1) || 0;
    const parentL=o.Luser || 1;
    const t1=o.localX1/parentL, t2=o.localX2/parentL;
    const qy1=(+Lm.qyA||0)*fcase*U.loadToFperLen + (((+Lm.qyB||0)-(+Lm.qyA||0))*fcase*U.loadToFperLen)*t1;
    const qy2=(+Lm.qyA||0)*fcase*U.loadToFperLen + (((+Lm.qyB||0)-(+Lm.qyA||0))*fcase*U.loadToFperLen)*t2;
    const kw1=Math.max(0,+o.member.kwA||0)*U.foundationToFperLen2 + (Math.max(0,+o.member.kwB||0)-Math.max(0,+o.member.kwA||0))*U.foundationToFperLen2*t1;
    const kw2=Math.max(0,+o.member.kwA||0)*U.foundationToFperLen2 + (Math.max(0,+o.member.kwB||0)-Math.max(0,+o.member.kwA||0))*U.foundationToFperLen2*t2;
    const gaussPts=[[-0.8611363116,0.3478548451],[-0.3399810436,0.6521451549],[0.3399810436,0.6521451549],[0.8611363116,0.3478548451]];
    gaussPts.forEach(([xi,wgt])=>{
      const tt=(xi+1)/2, jac=L/2, N=shape(tt,L);
      const q=qy1+(qy2-qy1)*tt;
      const kw=kw1+(kw2-kw1)*tt;
      for(let i=0;i<4;i++) {
        fe[i] += N[i]*q*wgt*jac;
        for(let j=0;j<4;j++) ke[i][j] += N[i]*kw*N[j]*wgt*jac;
      }
    });
    const dofs=[ni*2,ni*2+1,nj*2,nj*2+1];
    addMatBand(K,dofs,ke,BW);
    for(let i=0;i<4;i++) F[dofs[i]] += fe[i];
  }

  // Member point loads: user-defined location from the near/left end of that member.
  for (const meta of memberMeta) {
    const m=members.find(mm=>(mm.name||`${mm.near}-${mm.far}`)===meta.name);
    const Lm=memberLoadFor(loadCase,m.id);
    const P=(+Lm.pointPy||0)*(+(loadCase.factor ?? 1)||0);
    if(Math.abs(P)>1e-12) {
      const aUser=Math.max(0,Math.min(meta.L,+Lm.pointA||0));
      const xP=meta.x1+aUser;
      const ni=nodeAtX[xP.toFixed(9)];
      if(ni!==undefined) F[ni*2]+=P;
    }
  }

  // Nodal loads from input nodes.
  inputNodes.forEach(n=>{
    const idx=nodeIndexByInput[String(n.label).trim()];
    if(idx===undefined) return;
    const Ld=nodeLoadFor(loadCase,n.id), fcase=+(loadCase.factor ?? 1)||0;
    F[idx*2] += (+Ld.fy||0)*fcase;
    F[idx*2+1] += (+Ld.mz||0)*fcase*U.momentToSolver;
  });

  // No conventional supports: continuous foundation stiffness stabilizes the model.
  const Korig=cloneBand(K);
  const D=gaussBand(K,F,BW);
  if(!D) return { error:"Singular BOEF model. Add continuous foundation stiffness kw on the members." };
  const R=matVecBand(Korig,D,BW).map((v,i)=>v-F[i]);

  const displacements=inputNodes.map(n=>{
    const i=nodeIndexByInput[String(n.label).trim()];
    return { label:n.label, x:n.x, w:D[i*2]||0, theta:D[i*2+1]||0 };
  });
  const reactions=inputNodes.map(n=>{
    const i=nodeIndexByInput[String(n.label).trim()];
    return { label:n.label, x:n.x, support:"Spring foundation only", Ry:R[i*2]||0, Mz:(R[i*2+1]||0)*U.momentFromSolver, springRy:0, springMz:0 };
  });

  const memberResults=memberMeta.map(meta=>{
    const points=[];
    const els=expandedElements.slice(meta.startIndex,meta.endIndex);
    els.forEach((o,ei)=>{
      const ni=nodeAtX[o.x1.toFixed(9)], nj=nodeAtX[o.x2.toFixed(9)];
      const L=(o.x2-o.x1)*U.coordToLen;
      const d=[D[ni*2],D[ni*2+1],D[nj*2],D[nj*2+1]];
      for(let ii=0;ii<=(ei===els.length-1?1:0);ii++){
        const tt=ii, x=o.x1+(o.x2-o.x1)*tt;
        const N=shape(tt,L), B1=dshapeDx(tt,L), B2=d2shapeDx2(tt,L);
        const w=N.reduce((s,v,j)=>s+v*d[j],0);
        const theta=B1.reduce((s,v,j)=>s+v*d[j],0);
        const Msolver=o.EI*B2.reduce((s,v,j)=>s+v*d[j],0);
        const parentT=(x-meta.x1)/(meta.L||1);
        const kw=(+meta.kwA||0) + ((+meta.kwB||0)-(+meta.kwA||0))*parentT;
        points.push({x,w,theta,M:Msolver*U.momentFromSolver,kw});
      }
    });
    points.sort((a,b)=>a.x-b.x);
    for(let i=0;i<points.length;i++){
      const prev=points[Math.max(0,i-1)], next=points[Math.min(points.length-1,i+1)];
      const dx=(next.x-prev.x)*U.coordToLen || 1;
      points[i].V=((next.M-prev.M)*U.momentToSolver/dx);
    }
    const Lm=memberLoadFor(loadCase,(members.find(mm=>(mm.name||`${mm.near}-${mm.far}`)===meta.name)||{}).id);
    return { name:meta.name, near:meta.near, far:meta.far, x1:meta.x1, x2:meta.x2, L:meta.L, E:meta.E, I:meta.I, kwA:meta.kwA, kwB:meta.kwB,
      defl:points.map(p=>({x:p.x,w:p.w/U.coordToLen, theta:p.theta})),
      bmd:points.map(p=>({x:p.x,M:p.M})),
      sfd:points.map(p=>({x:p.x,V:p.V})),
      foundation:points.map(p=>({x:p.x, r:p.kw*(p.w/U.coordToLen), kw:p.kw})),
      rk:[],
      pointP:(+Lm.pointPy||0)*(+(loadCase.factor ?? 1)||0),
      pointX:+Lm.pointA||0,
      qDisplay:[+Lm.qyA||0,+Lm.qyB||0]
    };
  });

  return { units, nodes:inputNodes, members, D, displacements, reactions, memberResults, K, F };
}

function solveLoadCases(nodes,members,loadCases,combos,units){
  const cases=(loadCases||[]).filter(lc=>String(lc.name||"").trim()).map(lc=>({ loadCase:{ id:lc.id, name:lc.name, type:lc.type, factor:+lc.factor||0 }, result:solveCase(nodes,members,lc,units) }));
  const comboCases=(combos||[]).filter(c=>c.enabled && String(c.name||"").trim()).map(c=>{
    const combined = combineLoadCases(loadCases, c);
    return { combo:{ id:c.id, name:c.name, factors:c.factors }, loadCase:combined, result:solveCase(nodes,members,combined,units) };
  });
  return { cases, combos:comboCases, units, isBundle:true };
}

function Chart({ data, yKey, label, color, unit="", invert=false, report=false }) {
  if(!data || data.length === 0) return null;
  const W = 900, H = report ? 240 : 240, PADX = 56, PADY = 24;
  const xs = data.map(d => +d.x || 0);
  const ys = data.map(d => +(d[yKey] || 0));
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1;
  const maxAbs = Math.max(Math.abs(minY), Math.abs(maxY), 1e-9);

  const scX = (W - 2*PADX) / rangeX;
  const scY = (H - 2*PADY) / (maxAbs * 2.2 || 1);

  const toSvg = (x, y) => ({
    sx: PADX + (x - minX) * scX,
    sy: invert ? (H / 2 + y * scY) : (H / 2 - y * scY)
  });

  const pts = data.map(d => {
    const { sx, sy } = toSvg(+d.x || 0, +(d[yKey] || 0));
    return `${sx},${sy}`;
  }).join(" ");

  const zeroY = H / 2;
  const areaPath = data.map((d, i) => {
    const { sx, sy } = toSvg(+d.x || 0, +(d[yKey] || 0));
    return (i === 0 ? `M ${sx},${zeroY} L ${sx},${sy}` : `L ${sx},${sy}`);
  }).join(" ") + ` L ${toSvg(xs[xs.length-1], 0).sx},${zeroY} Z`;

  const tickVals = [maxAbs/2, maxAbs, -maxAbs/2, -maxAbs].filter(v => Math.abs(v) > 1e-9);
  const fmtAxis = v => Number.isFinite(v) ? (Math.abs(v) >= 100 ? v.toFixed(0) : Math.abs(v) >= 10 ? v.toFixed(1) : v.toFixed(2)) : "—";
  const fmtVal = v => Number.isFinite(v) ? (Math.abs(v) >= 100 ? v.toFixed(0) : Math.abs(v) >= 10 ? v.toFixed(1) : v.toFixed(3)) : "—";
  const step = Math.max(1, Math.round(data.length / 8));
  const xLabelData = data.filter((_, i) => i % step === 0 || i === data.length - 1);
  // Graphics-only: label the positive and negative peak values on every plotted diagram.
  const peakMax = data.reduce((a,d)=>(+(d[yKey]||0)) > (+(a[yKey]||0)) ? d : a, data[0]);
  const peakMin = data.reduce((a,d)=>(+(d[yKey]||0)) < (+(a[yKey]||0)) ? d : a, data[0]);
  const calloutData = (() => {
    // Graphics-only: always show the maximum and minimum response values when they are distinct.
    const samePoint = Math.abs((+peakMax.x||0)-(+peakMin.x||0)) <= rangeX*0.002 && Math.abs(+(peakMax[yKey]||0)-+(peakMin[yKey]||0)) <= maxAbs*0.002;
    return samePoint ? [{ ...peakMax, _peakLabel: "Peak" }] : [{ ...peakMax, _peakLabel: "Max" }, { ...peakMin, _peakLabel: "Min" }];
  })();

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", margin:"0 auto", background:"transparent", overflow:"visible" }}>
      <line x1={PADX} y1={zeroY} x2={W-PADX} y2={zeroY} stroke={CLR.border} strokeWidth={1} />
      {tickVals.map((v, i) => {
        const y = toSvg(minX, v).sy;
        if (y < 4 || y > H-4) return null;
        return (
          <g key={i}>
            <line x1={PADX-3} y1={y} x2={W-PADX} y2={y} stroke={CLR.border} strokeWidth={0.5} strokeDasharray="3,3" />
            <text x={PADX-5} y={y+4} textAnchor="end" fontSize={9} fill={CLR.muted}>{fmtAxis(v)}</text>
          </g>
        );
      })}
      <path d={areaPath} fill={color+"33"} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
      {xLabelData.map((d, i) => {
        const { sx } = toSvg(+d.x || 0, 0);
        return <text key={i} x={sx} y={H-4} textAnchor="middle" fontSize={9} fill={CLR.muted}>{fmtAxis(+d.x || 0)}</text>;
      })}
      {calloutData.map((d, i) => {
        const x = +d.x || 0, yVal = +(d[yKey] || 0);
        const { sx, sy } = toSvg(x, yVal);
        const tx = Math.max(PADX+54, Math.min(W-PADX-54, sx + (sx > W*0.72 ? -54 : 54)));
        const ty = Math.max(PADY+10, Math.min(H-PADY-18, sy + (sy < H/2 ? -18 : 24)));
        return <g key={`callout-${i}`}>
          <circle cx={sx} cy={sy} r={3.2} fill={color} />
          <line x1={sx} y1={sy} x2={tx} y2={ty-4} stroke={color} strokeWidth={0.8} strokeDasharray="2,2" />
          <rect x={tx-58} y={ty-18} width={116} height={24} rx={2} fill="#ffffff" stroke={color} strokeWidth={0.8} />
          <text x={tx} y={ty-7} textAnchor="middle" fontSize={7.5} fill={color} fontWeight="800">{d._peakLabel}</text>
          <text x={tx} y={ty+3} textAnchor="middle" fontSize={9} fill={color} fontWeight="800">{fmtVal(yVal)}</text>
        </g>;
      })}
      <text x={PADX} y={12} fontSize={10} fill={color} fontWeight="700">{label}{unit ? ` [${unit}]` : ""}</text>
      <text x={W-PADX} y={H-4} textAnchor="end" fontSize={9} fill={CLR.muted}>Global x</text>
      <line x1={PADX} y1={PADY} x2={PADX} y2={H-PADY} stroke={CLR.border} strokeWidth={1} />
    </svg>
  );
}

function BeamDiagram({nodes,members,result,units,overlay="none",scale=1}) {
  const U=UNIT_SETS[units]||UNIT_SETS["kip/ft"], W=980,H=330,P=70;
  const xs=nodes.map(n=>+n.x||0).concat(members.flatMap(m=>{
    const a=nodes.find(n=>String(n.label)===String(m.near)), b=nodes.find(n=>String(n.label)===String(m.far));
    return [a?+a.x:0,b?+b.x:0];
  }));
  const minX=Math.min(...xs,0), maxX=Math.max(...xs,1), span=maxX-minX||1;
  const X=x=>P+(x-minX)/span*(W-2*P);
  const Y0=H/2;
  const nodeMap={}; nodes.forEach(n=>nodeMap[String(n.label)]=n);
  const support = (n,x,y) => null;
  const spring = (x,y,label) => <g><polyline points={`${x},${y} ${x-4},${y+5} ${x+4},${y+10} ${x-4},${y+15} ${x+4},${y+20} ${x},${y+25}`} fill="none" stroke={CLR.yellow} strokeWidth="1.3"/><line x1={x-12} y1={y+25} x2={x+12} y2={y+25} stroke={CLR.yellow}/>{label&&<text x={x+14} y={y+15} fill={CLR.yellow} fontSize="9" fontWeight="800">{label}</text>}</g>;
  const nice = v => Number.isFinite(+v) ? (+v).toFixed(Math.abs(+v)>=10 ? 1 : 2).replace(/\.0+$/,"").replace(/(\.\d*[1-9])0+$/,"$1") : "0";
  const activeLoads = result ? (result.members || members) : members;
  const title = overlay==="bmd"?"Bending Moment Diagram":overlay==="sfd"?"Shear Force Diagram":overlay==="defl"?"Deflected Shape":overlay==="foundation"?"Foundation Reaction Diagram":"Beam on Elastic Foundation";
  return <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
    <defs><filter id="glowB"><feDropShadow dx="0" dy="0" stdDeviation="2" floodColor="#58a6ff" floodOpacity="0.35"/></filter></defs>
    <text x="0" y="22" fill={CLR.accent} fontSize="16" fontWeight="800" letterSpacing="0.12em">{title}</text>
    {members.map((m,i)=>{
      const a=nodeMap[String(m.near)], b=nodeMap[String(m.far)]; if(!a||!b)return null;
      const x1=X(+a.x||0), x2=X(+b.x||0), mid=(x1+x2)/2;
      const hasFound=(+m.kwA||0)>0 || (+m.kwB||0)>0;
      return <g key={m.id||i}>
        <line x1={x1} y1={Y0} x2={x2} y2={Y0} stroke="#020617" strokeWidth="10" strokeLinecap="round"/>
        <line x1={x1} y1={Y0} x2={x2} y2={Y0} stroke="#7dd3fc" strokeWidth="5.5" strokeLinecap="round" filter="url(#glowB)"/>
        <line x1={x1} y1={Y0} x2={x2} y2={Y0} stroke={CLR.accent} strokeWidth="2" strokeLinecap="round"/>
        <text x={mid} y={Y0-12} textAnchor="middle" fill={CLR.text} fontWeight="800" fontSize="12">{m.name||`${m.near}-${m.far}`}</text>
        {hasFound && Array.from({length:Math.max(3,Math.round((x2-x1)/65))},(_,j)=>{
          const nSpr=Math.max(3,Math.round((x2-x1)/65)); const t=(j+0.5)/nSpr; return <g key={j}>{spring(x1+t*(x2-x1),Y0+10,j===0?`kw ${nice(+m.kwA||0)} | ${nice(+m.kwB||0)} ${U.foundation}`:"")}</g>;
        })}
        {(() => { const lcq=(result && result.memberResults||[]).find(r=>r.name===(m.name||`${m.near}-${m.far}`)); const qA=lcq?lcq.qDisplay[0]:0,qB=lcq?lcq.qDisplay[1]:0; if(overlay!=="none" || (Math.abs(qA)<1e-12&&Math.abs(qB)<1e-12)) return null; const n=6; return <g>{Array.from({length:n},(_,j)=>{ const t=j/(n-1), x=x1+t*(x2-x1); return <g key={j}><line x1={x} y1={Y0-45} x2={x} y2={Y0-8} stroke={CLR.orange} strokeWidth="1.4"/><polygon points={`${x},${Y0-5} ${x-4},${Y0-13} ${x+4},${Y0-13}`} fill={CLR.orange}/></g> })}<text x={mid} y={Y0-52} fill={CLR.orange} fontSize="10" fontWeight="800" textAnchor="middle">qy {nice(qA)} | {nice(qB)} {U.load}</text></g> })()}
        {(() => { const lcq=(result && result.memberResults||[]).find(r=>r.name===(m.name||`${m.near}-${m.far}`)); if(!lcq || overlay!=="none" || Math.abs(+lcq.pointP||0)<1e-12) return null; const xp=x1+(Math.max(0,Math.min(lcq.L,+lcq.pointX||0))/(lcq.L||1))*(x2-x1); return <g><line x1={xp} y1={Y0-70} x2={xp} y2={Y0-9} stroke={CLR.red} strokeWidth="2"/><polygon points={`${xp},${Y0-6} ${xp-5},${Y0-16} ${xp+5},${Y0-16}`} fill={CLR.red}/><text x={xp+8} y={Y0-64} fill={CLR.red} fontSize="10" fontWeight="800">P = {nice(lcq.pointP)} {U.force}</text><text x={xp+8} y={Y0-50} fill={CLR.red} fontSize="9">a = {nice(lcq.pointX)} {U.dist}</text></g>; })()}
      </g>
    })}
    {result && overlay!=="none" && (result.memberResults||[]).map((mr,i)=>{
      const data = overlay==="bmd"?mr.bmd:overlay==="sfd"?mr.sfd:overlay==="foundation"?mr.foundation:mr.defl;
      const key = overlay==="bmd"?"M":overlay==="sfd"?"V":overlay==="foundation"?"r":"w";
      const maxAbs=Math.max(...data.map(p=>Math.abs(p[key])),1e-9);
      const color=overlay==="bmd"?CLR.violet:overlay==="sfd"?CLR.teal:overlay==="foundation"?CLR.yellow:CLR.orange;
      const amp=(overlay==="defl"?70:55)*scale;
      const pts=data.map(p=>`${X(p.x)},${Y0-(p[key]/maxAbs)*amp}`).join(" ");
      const area=`M ${X(data[0].x)},${Y0} `+data.map(p=>`L ${X(p.x)},${Y0-(p[key]/maxAbs)*amp}`).join(" ")+` L ${X(data[data.length-1].x)},${Y0} Z`;
      const peakMax=data.reduce((a,p)=>(+(p[key]||0)) > (+(a[key]||0)) ? p : a, data[0]);
      const peakMin=data.reduce((a,p)=>(+(p[key]||0)) < (+(a[key]||0)) ? p : a, data[0]);
      const fmtPeak=v=>Number.isFinite(+v) ? (+v).toFixed(Math.abs(+v)>=100?0:Math.abs(+v)>=10?1:3) : "—";
      const peakCallouts=(()=>{ const samePoint=Math.abs((+peakMax.x||0)-(+peakMin.x||0))<=span*0.002 && Math.abs(+(peakMax[key]||0)-+(peakMin[key]||0))<=maxAbs*0.002; return samePoint?[{p:peakMax,t:"Peak"}]:[{p:peakMax,t:"Max"},{p:peakMin,t:"Min"}]; })();
      return <g key={i}>
        <path d={area} fill={color+"25"} stroke={color} strokeWidth="1.8"/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2.4"/>
        {peakCallouts.map((c,j)=>{ const px=X(c.p.x), py=Y0-((c.p[key]||0)/maxAbs)*amp; const tx=Math.max(P+54,Math.min(W-P-54,px+(px>W*0.72?-60:60))); const ty=Math.max(46,Math.min(H-42,py+(py<Y0?-22:30))); return <g key={`peak-${j}`}>
          <circle cx={px} cy={py} r="3.3" fill={color}/>
          <line x1={px} y1={py} x2={tx} y2={ty-5} stroke={color} strokeWidth="0.9" strokeDasharray="2,2"/>
          <rect x={tx-48} y={ty-18} width="96" height="25" rx="2" fill="#ffffff" stroke={color} strokeWidth="0.8"/>
          <text x={tx} y={ty-7} textAnchor="middle" fill={color} fontSize="8" fontWeight="800">{c.t}</text>
          <text x={tx} y={ty+3} textAnchor="middle" fill={color} fontSize="8" fontWeight="800">{fmtPeak(c.p[key])}</text>
        </g>})}
      </g>
    })}
    {nodes.map(n=>{ const x=X(+n.x||0); const d=(result?.displacements||[]).find(r=>String(r.label)===String(n.label)); return <g key={n.id}><circle cx={x} cy={Y0} r="6" fill={CLR.bg} stroke={CLR.text} strokeWidth="1.8"/><text x={x-16} y={Y0-13} fill={CLR.text} fontWeight="800">{n.label}</text><text x={x-28} y={Y0+54} fill={CLR.muted} fontSize="9">x={nice(+n.x||0)} {U.dist}</text>{d&&<text x={x-28} y={Y0+68} fill={CLR.orange} fontSize="9">w={fmt4(d.w/U.coordToLen)} {U.disp}</text>}</g> })}
  </svg>
}

function App(){

  const [activeLC,setActiveLC]=useState(DEFAULT_ACTIVE_LC);
  const [combos,setCombos]=useState(clone(DEFAULT_COMBOS));
  const [overlay,setOverlay]=useState("none");
  const [selectedMember,setSelectedMember]=useState("1");
  const [memberDiagram,setMemberDiagram]=useState("bmd");
  const [scale,setScale]=useState(1);
  const bundle=useMemo(()=>solveLoadCases(nodes,members,loadCases,combos,units),[nodes,members,loadCases,combos,units]);

    // Save Working File: downloads this same standalone HTML file with the live
    // input state rewritten into the DEFAULT_* constants. This intentionally
    // avoids localStorage/sessionStorage so the downloaded file opens by itself.
    const toCode = value => JSON.stringify(value, null, 2);
    const replaceConstValue = (source, name, valueCode) => {
      const token = `const ${name} =`;
      const start = source.indexOf(token);
      if (start < 0) return source;
      let valueStart = start + token.length;
      while (valueStart < source.length && /\s/.test(source[valueStart])) valueStart++;

      const first = source[valueStart];
      let valueEnd = valueStart;
      const closeFor = { "[": "]", "{": "}" };

      if (first === "[" || first === "{") {
        const close = closeFor[first];
        let depth = 0;
        let quote = null;
        let escaped = false;
        for (let i = valueStart; i < source.length; i++) {
          const ch = source[i];
          if (quote) {
            if (escaped) escaped = false;
            else if (ch === "\\") escaped = true;
            else if (ch === quote) quote = null;
            continue;
          }
          if (ch === "\"" || ch === "'" || ch === "`") { quote = ch; continue; }
          if (ch === first) depth++;
          else if (ch === close) {
            depth--;
            if (depth === 0) { valueEnd = i + 1; break; }
          }
        }
      } else {
        let quote = (first === "\"" || first === "'" || first === "`") ? first : null;
        let escaped = false;
        for (let i = valueStart + 1; i < source.length; i++) {
          const ch = source[i];
          if (quote) {
            if (escaped) escaped = false;
            else if (ch === "\\") escaped = true;
            else if (ch === quote) quote = null;
          } else if (ch === ";") { valueEnd = i; break; }
        }
      }

      while (valueEnd < source.length && /\s/.test(source[valueEnd])) valueEnd++;
      if (source[valueEnd] === ";") valueEnd++;
      return source.slice(0, start) + `const ${name} = ${valueCode};` + source.slice(valueEnd);
    };

    let source = document.documentElement.outerHTML;
    if (!/^\s*<!doctype/i.test(source)) source = "<!DOCTYPE html>\n" + source;

    source = replaceConstValue(source, "DEFAULT_NODES", toCode(nodes));

    source = replaceConstValue(source, "DEFAULT_LOAD_CASES", toCode(loadCases));
    source = replaceConstValue(source, "DEFAULT_COMBOS", toCode(combos));
    source = replaceConstValue(source, "DEFAULT_UNITS", toCode(units));
    source = replaceConstValue(source, "DEFAULT_ACTIVE_LC", toCode(activeLC));

    const blob = new Blob([source], { type:"text/html;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `BOEF_v0_3_1_working_${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);

            <p style={{fontSize:11,color:CLR.muted}}>Select a member and diagram type.</p>
          </div>
          <select style={{...S.select,width:150,marginLeft:"auto"}} value={selectedMember} onChange={e=>setSelectedMember(e.target.value)}>
            {(activeResult?.memberResults||[]).map(mr=><option key={mr.name} value={mr.name}>Member {mr.name}</option>)}
          </select>
          <select style={{...S.select,width:230}} value={memberDiagram} onChange={e=>setMemberDiagram(e.target.value)}>
            <option value="defl">Deflected Shape</option>
            <option value="bmd">Bending Moment Diagram</option>
            <option value="sfd">Shear Force Diagram</option>
            <option value="foundation">Foundation Reaction Diagram</option>
          </select>
        </div>
        <div style={{padding:"1rem"}}>
          {selectedMemberResult && (() => { const mr=selectedMemberResult; const kAvgSolver = Math.max(0, ((+mr.kwA || 0) + (+mr.kwB || 0))/2 * U.foundationToFperLen2); const EI = (+mr.E || 0) * U.EFactor * (+mr.I || 0); const betaSolver = (kAvgSolver > 0 && EI > 0) ? Math.pow(kAvgSolver/(4*EI),0.25) : 0; const betaUser = betaSolver * U.coordToLen; const betaL = betaSolver * (+mr.L || 0) * U.coordToLen; const cls = betaL < 1 ? "Short beam" : betaL <= 4 ? "Intermediate beam" : "Long beam"; const Lc = betaUser > 0 ? 1/betaUser : 0; const Ld = betaUser > 0 ? 4/betaUser : 0; const chartData = memberDiagram==="defl" ? mr.defl : memberDiagram==="bmd" ? mr.bmd : memberDiagram==="sfd" ? mr.sfd : mr.foundation; const yKey = memberDiagram==="defl" ? "w" : memberDiagram==="bmd" ? "M" : memberDiagram==="sfd" ? "V" : "r"; const label = memberDiagram==="defl" ? "Deflected Shape" : memberDiagram==="bmd" ? "Bending Moment Diagram" : memberDiagram==="sfd" ? "Shear Force Diagram" : "Foundation Reaction Diagram"; const color = memberDiagram==="defl" ? CLR.orange : memberDiagram==="bmd" ? CLR.violet : memberDiagram==="sfd" ? CLR.teal : CLR.yellow; const unit = memberDiagram==="defl" ? U.disp : memberDiagram==="bmd" ? U.moment : memberDiagram==="sfd" ? U.force : U.load; return <div>
            <p style={{fontSize:11,color:CLR.muted,marginBottom:"0.75rem"}}>Member {mr.name}: Near {mr.near} → Far {mr.far}; L = {fmt3(mr.L)} {U.dist}; kw = {fmt3(mr.kwA)} | {fmt3(mr.kwB)} {U.foundation}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"0.75rem",marginBottom:"1rem"}}>
              <div style={{padding:"0.75rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}><div style={{fontSize:10,color:CLR.muted}}>β</div><div style={{fontSize:13,color:CLR.text,fontWeight:800}}>{betaUser>0?fmt4(betaUser):"—"} 1/{U.dist}</div></div>
              <div style={{padding:"0.75rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}><div style={{fontSize:10,color:CLR.muted}}>βL</div><div style={{fontSize:13,color:CLR.text,fontWeight:800}}>{betaUser>0?fmt3(betaL):"—"} · {cls}</div></div>
              <div style={{padding:"0.75rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}><div style={{fontSize:10,color:CLR.muted}}>Lc = 1/β</div><div style={{fontSize:13,color:CLR.text,fontWeight:800}}>{betaUser>0?fmt3(Lc):"—"} {U.dist}</div></div>
              <div style={{padding:"0.75rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}><div style={{fontSize:10,color:CLR.muted}}>Ld = 4/β</div><div style={{fontSize:13,color:CLR.text,fontWeight:800}}>{betaUser>0?fmt3(Ld):"—"} {U.dist}</div></div>
            </div>
            <Chart data={chartData} yKey={yKey} label={label} color={color} unit={unit}/>
          </div>; })()}
        </div>
      </div>
    </>}
  </div>;

  const Theory = <div>
    <div style={{...S.card, borderColor:CLR.accent+"66"}}>
      <div style={S.h2}>Theory — Beams on Elastic Foundations</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        This app follows the same idea as your class notes: a beam carries bending through <strong style={{color:CLR.text}}>EI</strong>, while the soil or ballast is idealized as a continuous bed of independent vertical springs. The spring pressure is proportional to the local beam deflection, so the foundation reaction is not a single point reaction; it is distributed along the length of the beam.
      </p>
      <div style={{marginTop:"1rem",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.yellow,fontWeight:800,fontSize:12,marginBottom:8}}>Winkler foundation assumption</div>
          <div style={{fontSize:13,lineHeight:1.8}}>
            <span style={{color:CLR.text}}>foundation reaction</span> = <span style={{color:CLR.accent}}>k v(x)</span><br/>
            <span style={{color:CLR.muted}}>where k is the foundation modulus / line spring stiffness.</span>
          </div>
        </div>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.yellow,fontWeight:800,fontSize:12,marginBottom:8}}>Governing differential equation</div>
          <div style={{fontSize:13,lineHeight:1.8}}>
            EI v''''(x) + k v(x) = p(x)
            <br/><span style={{color:CLR.muted}}>This is the beam equation modified by the elastic foundation reaction.</span>
          </div>
        </div>
      </div>
    </div>

    <div style={S.card}>
      <div style={S.h2}>1. Why β shows up everywhere</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        In the notes, the key stiffness parameter is β. It combines beam stiffness and foundation stiffness into one length-based parameter. A larger foundation stiffness <strong style={{color:CLR.text}}>k</strong> or smaller beam stiffness <strong style={{color:CLR.text}}>EI</strong> makes β larger, meaning load effects die out faster along the beam.
      </p>
      <div style={{marginTop:"1rem",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1rem"}}>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.accent,fontWeight:800,fontSize:12}}>Class parameter</div>
          <div style={{fontSize:15,marginTop:8}}>β = ⁴√( k / 4EI )</div>
        </div>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.accent,fontWeight:800,fontSize:12}}>Characteristic length</div>
          <div style={{fontSize:15,marginTop:8}}>L<sub>c</sub> = 1 / β</div>
        </div>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.accent,fontWeight:800,fontSize:12}}>Decay length</div>
          <div style={{fontSize:15,marginTop:8}}>L<sub>d</sub> = 4 / β</div>
        </div>
      </div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted,marginTop:"1rem"}}>
        Your notes use the practical rule that once you are about <strong style={{color:CLR.yellow}}>4/β</strong> away from a load, its effect is small enough that the beam can often be treated as “infinite” past that point.
      </p>
    </div>

    <div style={S.card}>
      <div style={S.h2}>2. How the beam length changes the problem</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        Your finite-length notes classify problems using <strong style={{color:CLR.text}}>βL</strong>. This is a very useful check because it tells you whether the end boundary conditions matter.
      </p>
      <div style={{overflowX:"auto",marginTop:"1rem"}}>
        <table style={S.table}>
          <thead><tr>{["Range","Class behavior","Engineering interpretation"].map(h=><th style={S.th} key={h}>{h}</th>)}</tr></thead>
          <tbody>
            <tr><td style={S.td}>βL &lt; 1</td><td style={S.td}>Short beam</td><td style={S.td}>Acts closer to a rigid beam; bending deformation is relatively less important.</td></tr>
            <tr><td style={S.td}>1 &lt; βL &lt; 4</td><td style={S.td}>Intermediate beam</td><td style={S.td}>Needs finite-beam analysis; end conditions still matter.</td></tr>
            <tr><td style={S.td}>βL &gt; 4</td><td style={S.td}>Long beam</td><td style={S.td}>Can often be treated using infinite-beam solutions away from boundaries.</td></tr>
          </tbody>
        </table>
      </div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted,marginTop:"1rem"}}>
        This app is specifically meant for finite-length BOEF problems. The default example makes the beam deliberately long so it behaves approximately like the infinite-beam class example near the load. Conventional fixed/pinned/roller supports are not used; the finite beam is restrained only through continuous foundation springs .
      </p>
    </div>

    <div style={S.card}>
      <div style={S.h2}>3. Infinite-beam influence functions from the notes</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        For very long beams, your notes use tabulated influence functions A(βx), B(βx), C(βx), and D(βx). These functions decay and oscillate, which is why load effects can change sign and eventually become negligible.
      </p>
      <div style={{marginTop:"1rem",display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"1rem"}}>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.yellow,fontWeight:800,fontSize:12,marginBottom:8}}>Point load P on an infinite beam</div>
          <div style={{fontSize:13,lineHeight:1.8}}>
            v = Pβ / (2k) · A(βx)<br/>
            θ = −Pβ² / k · B(βx)<br/>
            M = P / (4β) · C(βx)<br/>
            V = −P / 2 · D(βx)
          </div>
        </div>
        <div style={{padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117"}}>
          <div style={{color:CLR.yellow,fontWeight:800,fontSize:12,marginBottom:8}}>Why superposition works well</div>
          <div style={{fontSize:13,lineHeight:1.8,color:CLR.muted}}>
            For long beams, effects from separate point loads can be added together. Your class example does this by adding the central load moment and the adjacent-column contributions.
          </div>
        </div>
      </div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted,marginTop:"1rem"}}>
        This app does not require the A/B/C/D tables because it solves the beam numerically. But the results should show the same physical behavior: deflection and moment decay away from local loads, and the foundation reaction follows the deflected shape.
      </p>
    </div>

    <div style={S.card}>
      <div style={S.h2}>4. Discrete springs versus continuous foundation</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        Your notes show that closely spaced discrete springs can be replaced by an equivalent continuous foundation. If each support has spring stiffness <strong style={{color:CLR.text}}>K</strong> and spacing <strong style={{color:CLR.text}}>d</strong>, use:
      </p>
      <div style={{marginTop:"1rem",padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117",fontSize:15}}>
        k = K / d
      </div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted,marginTop:"1rem"}}>
        A good approximation requires spring spacing to be small compared with the characteristic length. Your notes give the practical “very good” check:
        <strong style={{color:CLR.yellow}}> d ≤ 1 / (2β)</strong>.
      </p>
    </div>

    <div style={S.card}>
      <div style={S.h2}>5. How this app computes the diagrams</div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted}}>
        Instead of solving closed-form constants for every load and boundary condition, the app numerically models the finite beam. It assembles the beam bending stiffness and continuous foundation stiffness, solves for nodal deflections/rotations, then uses numerical post-processing to generate station-by-station diagrams.
      </p>
      <div style={{marginTop:"1rem",padding:"1rem",border:`1px solid ${CLR.border}`,borderRadius:8,background:"#0d1117",fontSize:13,lineHeight:1.85}}>
        State vector for the RK4 pass: [v, θ, M, V]<br/>
        v′ = θ<br/>
        θ′ = M / EI<br/>
        M′ = V<br/>
        V′ = p(x) − k(x)v
      </div>
      <p style={{fontSize:12,lineHeight:1.75,color:CLR.muted,marginTop:"1rem"}}>
        The sign convention is kept consistent internally for plotting. The main engineering takeaway is the same as the notes: the soil reaction is proportional to deflection, and β controls how quickly the beam “forgets” a local load.
      </p>
    </div>
  </div>

  return <div style={S.app}>
    <div style={S.header}><div style={{fontWeight:800,color:CLR.text}}>BOEF v0.3.1</div><div style={{fontSize:11,color:CLR.muted}}>Finite-length BOEF</div><div style={S.nav}>{["inputs","results","theory"].map(t=><button key={t} style={S.navBtn(tab===t)} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}</div></div>
    <main style={S.main}>{tab==="inputs"?Inputs:tab==="results"?Results:Theory}</main>
    <div className="print-report">
      <div className="print-page-break">
        <div className="print-report-header">
          <h1>BOEF v0.3.1 — Diagrams Report</h1>
          <div className="meta">Result Set: {activeReportName} &nbsp; | &nbsp; Units: {units}</div>
        </div>
        <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0 }}>
          <div style={S.h2}>Figure 1: Beam Preview — Active Load Case</div>
          <BeamDiagram nodes={nodes} members={members} result={activeResult} units={units} overlay="none" scale={1}/>
        </div>
      </div>

      {(activeResult?.memberResults||[]).map((mr,idx)=><div className="print-page-break" key={mr.name}>
        <div className="print-report-header">
          <h1>Member Force / Response Diagrams</h1>
          <div className="meta" style={{ marginTop:4, fontWeight:700 }}>Member {mr.name}</div>
          <div className="meta">
            Near → Far: {mr.near} → {mr.far} &nbsp; | &nbsp; Length: {fmt3(mr.L)} {U.dist} &nbsp; | &nbsp; kw: {fmt3(mr.kwA)} | {fmt3(mr.kwB)} {U.foundation}
          </div>
        </div>
        <div style={{ display:"grid", gap:"1.5rem", marginBottom:"1.5rem" }}>
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>Deflection Diagram ({U.disp})</div>
            <Chart data={mr.defl} yKey="w" label="w" color={CLR.orange} unit={U.disp} report />
          </div>
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>Bending Moment Diagram ({U.moment})</div>
            <Chart data={mr.bmd} yKey="M" label="M" color={CLR.violet} unit={U.moment} report />
          </div>
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>Shear Force Diagram ({U.force})</div>
            <Chart data={mr.sfd} yKey="V" label="V" color={CLR.teal} unit={U.force} report />
          </div>
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>Foundation Reaction Diagram ({U.load})</div>
            <Chart data={mr.foundation} yKey="r" label="r" color={CLR.yellow} unit={U.load} report />
          </div>
        </div>
      </div>)}
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
