<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    // ── COLORS ─────────────────────────────────────────────────────────────────
    const CLR = {
      bg: "#0d1117", surface: "#161b22", card: "#1c2333", border: "#30363d",
      accent: "#58a6ff", green: "#3fb950", red: "#f85149", yellow: "#d29922",
      text: "#e6edf3", muted: "#8b949e", teal: "#39d353", violet: "#bc8cff",
      orange: "#f0883e",
    };

    // ── STYLES ─────────────────────────────────────────────────────────────────
    const S = {
      app: { minHeight:"100vh", background:CLR.bg, color:CLR.text, display:"flex", flexDirection:"column" },
      header: { background:CLR.surface, borderBottom:`1px solid ${CLR.border}`, padding:"0 2rem", display:"flex", alignItems:"center", gap:"2rem", minHeight:60 },
      nav: { display:"flex", gap:0, marginLeft:"auto" },
      navBtn: active => ({ background:"none", border:"none", borderBottom: active ? `2px solid ${CLR.accent}` : "2px solid transparent", color: active ? CLR.accent : CLR.muted, padding:"18px 20px", cursor:"pointer", fontSize:13, fontFamily:"inherit", fontWeight: active ? 700 : 400, transition:"color 0.15s,border-color 0.15s" }),
      main: { flex:1, padding:"2rem", maxWidth:1400, margin:"0 auto", width:"100%" },
      card: { background:CLR.card, border:`1px solid ${CLR.border}`, borderRadius:8, padding:"1.5rem", marginBottom:"1.5rem" },
      h2: { fontSize:14, fontWeight:700, color:CLR.accent, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"1rem" },
      table: { width:"100%", borderCollapse:"collapse", fontSize:12 },
      th: { background:"#21262d", color:CLR.muted, padding:"7px 10px", textAlign:"center", fontWeight:600, fontSize:11, textTransform:"uppercase", borderBottom:`1px solid ${CLR.border}` },
      td: { padding:"6px 10px", textAlign:"center", borderBottom:"1px solid #21262d", color:CLR.text },
      input: { background:"#0d1117", border:`1px solid ${CLR.border}`, borderRadius:4, color:CLR.text, fontFamily:"inherit", fontSize:12, padding:"4px 7px", width:"100%", textAlign:"center", outline:"none" },
      btn: (v="primary") => ({ background: v==="primary"?CLR.accent : v==="danger"?"#3d1f1f":"#21262d", color: v==="danger"?CLR.red : v==="primary"?"#000":CLR.text, border:`1px solid ${v==="danger"?CLR.red : v==="primary"?CLR.accent:CLR.border}`, borderRadius:6, padding:"8px 18px", cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:700 }),
      badge: color => ({ display:"inline-block", background:color+"22", color, border:`1px solid ${color}55`, borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:700 }),
    };

    // ── DEFAULT DATA ───────────────────────────────────────────────────────────
    const DEFAULT_PROPS = {
      fc: 30, fy: 400, b: 4800, h: 180, d: 144, // Using d=144 to perfectly align with user's specific spreadsheet results
      SDL: 1.44, LL: 3.60,
      Atop: 0, Abot: 0
    };

    const DEFAULT_FRAME_ELEMENTS = [
      { id:1, name:"CC-300x600", B:300, H:600, psi:0.3 },
      { id:2, name:"CC-600x300", B:600, H:300, psi:0.3 }
    ];

    const DEFAULT_NODES = [
      { id:1, label:"A", x:0,     Lt:3000, topSection:"CC-600x300", Lb:3000, botSection:"CC-600x300" },
      { id:2, label:"B", x:5000,  Lt:3000, topSection:"CC-300x600", Lb:3000, botSection:"CC-300x600" },
      { id:3, label:"C", x:11000, Lt:3000, topSection:"CC-300x600", Lb:3000, botSection:"CC-300x600" },
      { id:4, label:"D", x:16000, Lt:3000, topSection:"CC-600x300", Lb:3000, botSection:"CC-600x300" }
    ];

    const DEFAULT_SPANS = [
      { id:1, near:"A", far:"B", L:5000, wDL:20.304, wSDL:6.912, wLL:17.28 },
      { id:2, near:"B", far:"C", L:6000, wDL:20.304, wSDL:6.912, wLL:17.28 },
      { id:3, near:"C", far:"D", L:5000, wDL:20.304, wSDL:6.912, wLL:17.28 }
    ];

    const DEFAULT_GEOMETRY_INPUT_MODE = "global";
    const DEFAULT_RESULT_UNITS = "engineering";

    // ── MATH HELPERS ──────────────────────────────────────────────────────────
    function gaussianElim(A, b) {
      const n = b.length;
      const M = A.map((r, i) => [...r, b[i]]);
      for (let col = 0; col < n; col++) {
        let maxRow = col;
        for (let row = col+1; row < n; row++)
          if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
        [M[col], M[maxRow]] = [M[maxRow], M[col]];
        if (Math.abs(M[col][col]) < 1e-14) return null;
        for (let row = col+1; row < n; row++) {
          const f = M[row][col] / M[col][col];
          for (let k = col; k <= n; k++) M[row][k] -= f * M[col][k];
        }
      }
      const x = new Array(n).fill(0);
      for (let i = n-1; i >= 0; i--) {
        x[i] = M[i][n];
        for (let j = i+1; j < n; j++) x[i] -= M[i][j] * x[j];
        x[i] /= M[i][i];
      }
      return x;
    }

    const fmt0 = v => typeof v === "number" ? v.toFixed(0) : v;
    const fmt1 = v => typeof v === "number" ? v.toFixed(1) : v;
    const fmt2 = v => typeof v === "number" ? v.toFixed(2) : v;

    // ── RESULTS DISPLAY UNIT HELPERS ─────────────────────────────────────────
    const isEngUnits = units => units === "engineering";
    const shearScale = units => isEngUnits(units) ? 1 / 1000 : 1;       // N -> kN
    const momentScale = units => isEngUnits(units) ? 1 / 1000000 : 1;  // N·mm -> kN·m
    const shearUnit = units => isEngUnits(units) ? "kN" : "N";
    const momentUnit = units => isEngUnits(units) ? "kN·m" : "N·mm";
    const fmtShear = (v, units) => isEngUnits(units) ? fmt2(v * shearScale(units)) : fmt1(v);
    const fmtMoment = (v, units) => isEngUnits(units) ? fmt2(v * momentScale(units)) : fmt0(v);

    // ── LOAD HELPERS ─────────────────────────────────────────────────────────
    const CONCRETE_UNIT_WEIGHT = 23.5; // kN/m³
    const areaLoadToLineLoad = (qKPa, stripWidthMm) => (+qKPa || 0) * ((+stripWidthMm || 0) / 1000); // kPa * m = kN/m = N/mm
    const slabSelfWeightPressure = props => CONCRETE_UNIT_WEIGHT * ((+props.h || 0) / 1000); // h(m) * 23.5 kN/m³ = kPa
    const slabSelfWeightLineLoad = props => slabSelfWeightPressure(props) * ((+props.b || 0) / 1000); // kPa * strip width(m) = kN/m = N/mm
    const calcSpanLoadsFromProps = props => ({
      wDL: slabSelfWeightLineLoad(props),
      wSDL: areaLoadToLineLoad(props.SDL, props.b),
      wLL: areaLoadToLineLoad(props.LL, props.b)
    });

    // ── FRAME ELEMENT HELPERS ────────────────────────────────────────────────
    function getFrameElement(frameElements, name) {
      return frameElements.find(fe => fe.name === name) || frameElements[0] || { name:"", B:300, H:300, psi:1 };
    }

    function rectFrameI(fe) {
      const B = +fe.B || 0;
      const H = +fe.H || 0;
      const psi = +fe.psi || 0;
      return psi * B * Math.pow(H, 3) / 12;
    }

    function enrichNodesWithFrameElements(nodes, frameElements) {
      return nodes.map(nd => {
        const top = getFrameElement(frameElements, nd.topSection);
        const bot = getFrameElement(frameElements, nd.botSection);
        const ref = bot || top;
        return {
          ...nd,
          // For the equivalent frame in the active design-strip direction, H is the column
          // dimension parallel to the span (c1) and B is the transverse column dimension (c2).
          // This keeps the clear-span calculation consistent with Example 12.1 Step 7
          // (e.g. 6.0 m span with 600 mm interior columns gives ln = 5.4 m).
          b1: +ref.H || 0,
          b2: +ref.B || 0,
          It: rectFrameI(top),
          Ib: rectFrameI(bot),
          topElement: top,
          botElement: bot
        };
      });
    }

    function getSpanLengthFromCoordinates(sp, nodes) {
      const near = nodes.find(n => n.label === sp.near);
      const far = nodes.find(n => n.label === sp.far);
      if (!near || !far) return +sp.L || 0;
      const L = Math.abs((+far.x || 0) - (+near.x || 0));
      return L || (+sp.L || 0);
    }

    function deriveNodesFromSpanLengths(nodes, spans) {
      const derived = nodes.map(n => ({ ...n }));
      const byLabel = {};
      derived.forEach(n => { byLabel[n.label] = n; });
      if (!spans.length) return derived;

      const firstNear = spans[0].near;
      if (byLabel[firstNear]) byLabel[firstNear].x = 0;

      spans.forEach((sp, i) => {
        const near = byLabel[sp.near];
        const far = byLabel[sp.far];
        if (!near || !far) return;
        if (i === 0 && !isFinite(+near.x)) near.x = 0;
        const nearX = isFinite(+near.x) ? (+near.x || 0) : 0;
        const L = +sp.L || getSpanLengthFromCoordinates(sp, nodes) || 0;
        far.x = nearX + L;
      });

      return derived;
    }

    // ── SOLVER ────────────────────────────────────────────────────────────────
    function solveEFM(nodes, spans, props, frameElements) {
      try {
        const sortedNodes = enrichNodesWithFrameElements(nodes, frameElements).sort((a,b) => a.x - b.x);
        const n = sortedNodes.length;
        const nodeIdx = {}; sortedNodes.forEach((nd, i) => { nodeIdx[nd.label] = i; });

        const Ec = 4500 * Math.sqrt(props.fc);
        const Is = props.b * Math.pow(props.h, 3) / 12;

        const K = Array.from({ length: n }, () => new Array(n).fill(0));
        const F = new Array(n).fill(0);

        sortedNodes.forEach((nd, i) => {
          const kt = nd.Lt > 0 ? (4 * Ec * nd.It / nd.Lt) : 0;
          const kb = nd.Lb > 0 ? (4 * Ec * nd.Ib / nd.Lb) : 0;
          K[i][i] += (kt + kb);
        });

        const activeSpans = [];

        spans.forEach(sp => {
          const i = nodeIdx[sp.near], j = nodeIdx[sp.far];
          if (i === undefined || j === undefined) return;
          const ndI = sortedNodes[i], ndJ = sortedNodes[j];
          const L = Math.abs(ndJ.x - ndI.x);
          if (L <= 0) return;

          const kSlab = 4 * Ec * Is / L;
          const kCross = 2 * Ec * Is / L;

          K[i][i] += kSlab;
          K[j][j] += kSlab;
          K[i][j] += kCross;
          K[j][i] += kCross;

          const wf = 1.25 * (sp.wDL + sp.wSDL) + 1.5 * sp.wLL;
          const fem = wf * L * L / 12;

          F[i] += -fem; 
          F[j] += fem;

          activeSpans.push({ sp, i, j, L, wf, ndI, ndJ });
        });

        const D = gaussianElim(K, F);
        if (!D) return { error: "Solver failed. Check geometry." };

        const spanResults = activeSpans.map(s => {
          const { sp, i, j, L, wf, ndI, ndJ } = s;
          const thI = D[i], thJ = D[j];

          const Mab = (wf * L * L / 12) + (4 * Ec * Is / L) * thI + (2 * Ec * Is / L) * thJ;
          const Mba = (-wf * L * L / 12) + (2 * Ec * Is / L) * thI + (4 * Ec * Is / L) * thJ;

          const Va = wf * L / 2 + (Mab + Mba) / L;
          const Vb = wf * L - Va;

          const M_x = x => -Mab + Va * x - wf * x * x / 2;
          const V_x = x => Va - wf * x;

          const faceL = ndI.b1 / 2;
          const faceR = L - ndJ.b1 / 2;
          const dv = Math.max(0.9 * props.d, 0.72 * props.h);
          
          const locV_L = faceL + dv;
          const locV_R = faceR - dv;
          
          const V_L = V_x(locV_L);
          const V_R = V_x(locV_R);
          
          const M_faceL = M_x(faceL);
          const M_faceR = M_x(faceR);
          
          let xMax = Va / wf;
          if (xMax < 0) xMax = 0; if (xMax > L) xMax = L;
          const M_maxBot = M_x(xMax);

          return {
            label: `${sp.near}${sp.far}`,
            L, wf, Mab, Mba, Va, Vb,
            faceL, faceR, dv,
            locV_L, locV_R, V_L, V_R,
            M_faceL, M_faceR, xMax, M_maxBot,
            xStart: ndI.x,
            M_x, V_x
          };
        });

        const alpha1 = 0.85 - 0.0015 * props.fc;
        const beta1 = 0.97 - 0.0025 * props.fc;
        const phic = 0.65, phis = 0.85;

        const calcCapacity = (As) => {
          const a = (phis * As * props.fy) / (alpha1 * phic * props.fc * props.b);
          return phis * As * props.fy * (props.d - a / 2);
        };
        const Mr_top = calcCapacity(props.Atop);
        const Mr_bot = calcCapacity(props.Abot);

        const calcAreq = (Mf, isTop) => {
          const Mf_abs = Math.abs(Mf);
          const Mr_typ = isTop ? Mr_top : Mr_bot;
          if (Mf_abs <= Mr_typ) return 0;
          
          const A = (Math.pow(phis * props.fy, 2)) / (2 * alpha1 * phic * props.fc * props.b);
          const B = phis * props.fy * props.d;
          const C = Mf_abs;
          const desc = B*B - 4*A*C;
          if (desc < 0) return NaN; 
          const As_total = (B - Math.sqrt(desc)) / (2 * A);
          return Math.max(0, As_total - (isTop ? props.Atop : props.Abot));
        };

        const calcBars = (req) => {
          if (isNaN(req)) return { b15:"FAIL", b20:"FAIL", b25:"FAIL" };
          if (req <= 0) return { b15:0, b20:0, b25:0 };
          return {
            b15: Math.ceil(req / 200),
            b20: Math.ceil(req / 300),
            b25: Math.ceil(req / 500)
          };
        };

        const betaV = 230 / (1000 + (Math.max(0.9 * props.d, 0.72 * props.h)));
        const Vc = phic * betaV * Math.sqrt(props.fc) * props.b * (Math.max(0.9 * props.d, 0.72 * props.h));

        // Two Way Shear Calculation replicating VBA macro exactly
        const twoWayShear = sortedNodes.map((nd, i) => {
          let trib_L = 0;
          let sum_wf = 0;
          let count_spans = 0;
          
          let L_left = 0, w_full_L = 0, w_dead_L = 0;
          let L_right = 0, w_full_R = 0, w_dead_R = 0;
          
          const leftSpan = activeSpans.find(s => s.ndJ.id === nd.id);
          if (leftSpan) {
            L_left = leftSpan.L - (leftSpan.ndI.b1 / 2) - (nd.b1 / 2);
            w_full_L = 1.25 * leftSpan.sp.wDL + 1.25 * leftSpan.sp.wSDL + 0.75 * leftSpan.sp.wLL;
            w_dead_L = 1.25 * leftSpan.sp.wDL + 1.25 * leftSpan.sp.wSDL;
            
            trib_L += leftSpan.L / 2;
            sum_wf += leftSpan.wf;
            count_spans++;
          }
          
          const rightSpan = activeSpans.find(s => s.ndI.id === nd.id);
          if (rightSpan) {
            L_right = rightSpan.L - (nd.b1 / 2) - (rightSpan.ndJ.b1 / 2);
            w_full_R = 1.25 * rightSpan.sp.wDL + 1.25 * rightSpan.sp.wSDL + 0.75 * rightSpan.sp.wLL;
            w_dead_R = 1.25 * rightSpan.sp.wDL + 1.25 * rightSpan.sp.wSDL;
            
            trib_L += rightSpan.L / 2;
            sum_wf += rightSpan.wf;
            count_spans++;
          }
          
          // Unbalanced column moment M_PS follows the v0.8.7 calculation pattern.
          // Missing adjacent spans are intentionally left as zero, so end columns are handled
          // by the same expression instead of being replaced with fixed-end moments.
          // Pattern live load uses 0.5 of the factored live component: 0.5 * 1.5w_LL = 0.75w_LL.
          const diff1 = (w_full_R * Math.pow(L_right, 2)) - (w_dead_L * Math.pow(L_left, 2));
          const diff2 = (w_full_L * Math.pow(L_left, 2)) - (w_dead_R * Math.pow(L_right, 2));
          const maxUnbalancedM = 0.07 * Math.max(diff1, diff2, 0);
          
          const kt = nd.Lt > 0 ? (4 * Ec * nd.It / nd.Lt) : 0;
          const kb = nd.Lb > 0 ? (4 * Ec * nd.Ib / nd.Lb) : 0;
          const k_total = kt + kb;
          
          let m_top = 0, m_bot = 0;
          if (k_total > 0) {
              m_top = (kt / k_total) * maxUnbalancedM;
              m_bot = (kb / k_total) * maxUnbalancedM;
          } else {
              m_top = maxUnbalancedM / 2;
              m_bot = maxUnbalancedM / 2;
          }
          
          const d_ps = props.d;
          const b_1 = nd.b1 + d_ps;
          const b_2 = nd.b2 + d_ps;
          
          let gamma_v = 0;
          if (b_2 > 0) {
              gamma_v = 1 - 1 / (1 + (2/3) * Math.sqrt(b_1 / b_2));
          }
          
          const m_PS = m_top + m_bot;
          
          // --- NEW TWO WAY SHEAR V_f CALCULATION ---
          const trib_area = props.b * trib_L; 
          const avg_wf = count_spans > 0 ? (sum_wf / count_spans) : 0;
          const q_f = avg_wf / props.b; // Factored area load (N/mm^2)
          const crit_area = b_1 * b_2; // Rectangle offset d/2 from faces
          
          const v_f = Math.max(0, (trib_area * q_f) - (crit_area * q_f));
          
          return {
              label: nd.label,
              twoWayShear: v_f,
              m_PS: m_PS,
              m_top: m_top,
              m_bot: m_bot
          };
        });

        return { D, spanResults, K, F, calcAreq, calcBars, Vc, sortedNodes, twoWayShear };
      } catch (err) {
        return { error: err.message };
      }
    }

    
    // ── BEAM DIAGRAM SVG ──────────────────────────────────────────────────────
    function BeamDiagram({ sortedNodes, spans }) {
      if (!sortedNodes || sortedNodes.length < 2) return null;

      const xs = sortedNodes.map(n => +n.x || 0);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const W = 680, H = 150, PAD = 56;
      const rangeX = maxX - minX || 1;
      const scX = (W - 2*PAD) / rangeX;
      const beamY = 70;

      const fmtCoordM = x => ((+x || 0) / 1000).toFixed(2);
      // The slab preview is displayed in engineering units: coordinates in m and UDL in kN/m.
      // Since 1 N/mm = 1 kN/m, the factored line load numeric value is unchanged.

      const toSvgX = x => PAD + (x - minX) * scX;
      const nodeMap = {};
      sortedNodes.forEach(n => { nodeMap[n.label] = +n.x || 0; });

      const SupportSymbol = ({ sx, colWidth }) => {
        const cw = Math.max(4, (colWidth || 300) * scX);
        return (
          <g>
            <rect x={sx - cw/2} y={beamY+4} width={cw} height={20} fill={CLR.green} />
            <line x1={sx-cw/2} y1={beamY+24} x2={sx+cw/2} y2={beamY+24} stroke={CLR.green} strokeWidth={1} />
          </g>
        );
      };

      return (
        <svg width={W} height={H} style={{ display:"block", margin:"0 auto", background:"transparent" }}>
          {spans.map((sp, i) => {
            if (nodeMap[sp.near] === undefined || nodeMap[sp.far] === undefined) return null;
            const x1 = toSvgX(nodeMap[sp.near]);
            const x2 = toSvgX(nodeMap[sp.far]);
            const hasUDL = (sp.wDL || 0) + (sp.wSDL || 0) + (sp.wLL || 0) > 0;
            const midX = (x1 + x2) / 2;
            const spanWidth = Math.abs(x2 - x1);
            
            return (
              <g key={i}>
                <line x1={x1} y1={beamY} x2={x2} y2={beamY} stroke={CLR.accent} strokeWidth={5} strokeLinecap="butt" />
                <text x={midX} y={beamY + 20} textAnchor="middle" fontSize={10} fill={CLR.muted} fontFamily="monospace">
                  {sp.near}{sp.far}
                </text>
                {hasUDL && Array.from({ length: Math.max(3, Math.round(spanWidth / 22)) }).map((_, j, arr) => {
                  const frac = (j + 0.5) / arr.length;
                  const ax = x1 + frac * (x2 - x1);
                  return (
                    <g key={j}>
                      <line x1={ax} y1={beamY - 8} x2={ax} y2={beamY - 18} stroke={CLR.yellow} strokeWidth={1.2} />
                      <polygon points={`${ax},${beamY-8} ${ax-3},${beamY-14} ${ax+3},${beamY-14}`} fill={CLR.yellow} />
                    </g>
                  );
                })}
                {hasUDL && (
                  <g>
                    <line x1={x1} y1={beamY-18} x2={x2} y2={beamY-18} stroke={CLR.yellow} strokeWidth={1.2} />
                    <text x={midX} y={beamY-24} textAnchor="middle" fontSize={9} fill={CLR.yellow} fontWeight="bold">
                      {(1.25 * (sp.wDL||0) + 1.25 * (sp.wSDL||0) + 1.5 * (sp.wLL||0)).toFixed(2)} kN/m
                    </text>
                  </g>
                )}
              </g>
            );
          })}
          {sortedNodes.map((n, i) => {
            const sx = toSvgX(+n.x || 0);
            return (
              <g key={i}>
                <SupportSymbol sx={sx} colWidth={n.b1} />
                <circle cx={sx} cy={beamY} r={5} fill={CLR.green} stroke={CLR.bg} strokeWidth={1.5} />
                <text x={sx} y={beamY - 10} textAnchor="middle" fontSize={11} fill={CLR.text} fontFamily="monospace" fontWeight="700">{n.label}</text>
                <text x={sx} y={beamY + 38} textAnchor="middle" fontSize={9} fill={CLR.muted}>{fmtCoordM(n.x)} m</text>
              </g>
            );
          })}
          <g transform="translate(8,8)">
            <line x1={0} y1={4} x2={16} y2={4} stroke={CLR.yellow} strokeWidth={1.5} />
            <polygon points="8,8 5,2 11,2" fill={CLR.yellow} />
            <text x={20} y={8} fontSize={9} fill={CLR.yellow}>UDL (kN/m)</text>
          </g>
          <text x={W-PAD} y={H-8} textAnchor="end" fontSize={9} fill={CLR.muted}></text>
        </svg>
      );
    }

    // ── DIAGRAM CHART ─────────────────────────────────────────────────────────
    function DiagramChart({ data, yKey, color, label, unit }) {
      if (!data || data.length === 0) return null;
      const W = 900, H = 240, PADX = 56, PADY = 24;
      const xs = data.map(d => d.x);
      const ys = data.map(d => d[yKey]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const rangeX = maxX - minX || 1;
      const rangeY = Math.max(Math.abs(minY), Math.abs(maxY)) * 2 || 1;

      const scX = (W - 2*PADX) / rangeX;
      const scY = (H - 2*PADY) / (Math.max(Math.abs(minY), Math.abs(maxY)) * 2.2 || 1);

      const toSvg = (x, y) => ({
        sx: PADX + (x - minX) * scX,
        sy: yKey === "M" ? (H / 2 + y * scY) : (H / 2 - y * scY)
      });

      const pts = data.map(d => {
        const { sx, sy } = toSvg(d.x, d[yKey]);
        return `${sx},${sy}`;
      }).join(" ");

      const zeroY = H / 2;

      const areaPath = data.map((d, i) => {
        const { sx, sy } = toSvg(d.x, d[yKey]);
        return (i === 0 ? `M ${sx},${zeroY} L ${sx},${sy}` : `L ${sx},${sy}`);
      }).join(" ") + ` L ${toSvg(data[data.length-1].x, 0).sx},${zeroY} Z`;

      const maxAbs = Math.max(Math.abs(minY), Math.abs(maxY));
      const tickVals = [maxAbs/2, maxAbs, -maxAbs/2, -maxAbs].filter(v => Math.abs(v) > 1e-9);
      
      const fmt3 = v => typeof v === "number" ? v.toFixed(0) : v;

      return (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", margin:"0 auto", background:"transparent", overflow:"visible" }}>
          <line x1={PADX} y1={zeroY} x2={W-PADX} y2={zeroY} stroke={CLR.border} strokeWidth={1} />
          {tickVals.map((v, i) => {
            const y = yKey === "M" ? (H/2 + v * scY) : (H/2 - v * scY);
            if (y < 4 || y > H-4) return null;
            return (
              <g key={i}>
                <line x1={PADX-3} y1={y} x2={W-PADX} y2={y} stroke={CLR.border} strokeWidth={0.5} strokeDasharray="3,3" />
                <text x={PADX-5} y={y+4} textAnchor="end" fontSize={9} fill={CLR.muted}>{fmt3(v)}</text>
              </g>
            );
          })}
          <path d={areaPath} fill={color+"33"} />
          <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
          {(() => {
            const step = Math.max(1, Math.round(data.length / 8));
            return data.filter((_, i) => i % step === 0 || i === data.length - 1).map((d, i) => {
              const { sx } = toSvg(d.x, 0);
              return <text key={i} x={sx} y={H-4} textAnchor="middle" fontSize={9} fill={CLR.muted}>{fmt3(d.x)}</text>;
            });
          })()}
          <text x={PADX} y={12} fontSize={10} fill={color} fontWeight="700">{label} [{unit}]</text>
          <text x={W-PADX} y={H-4} textAnchor="end" fontSize={9} fill={CLR.muted}>Global x</text>
          <line x1={PADX} y1={PADY} x2={PADX} y2={H-PADY} stroke={CLR.border} strokeWidth={1} />
        </svg>
      );
    }

    function Diagram({ spanResults, sortedNodes, spans, resultUnits = "base" }) {
      if (!spanResults || spanResults.length === 0) return null;

      const sfdData = [];
      const bmdData = [];
      spanResults.forEach(sr => {
        const pts = 50;
        const dx = sr.L / pts;
        for (let i = 0; i <= pts; i++) {
          const x = i * dx;
          const gx = sr.xStart + x;
          const v = sr.V_x(x) * shearScale(resultUnits);
          const m = sr.M_x(x) * momentScale(resultUnits);
          sfdData.push({ x: gx, V: v });
          bmdData.push({ x: gx, M: m });
        }
      });

      return (
        <div style={{ display:"grid", gap:"1.5rem", marginBottom:"1.5rem" }}>
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0 }}>
            <div style={S.h2}>Figure 1: Slab Preview</div>
            <BeamDiagram sortedNodes={sortedNodes} spans={spans} />
          </div>
          
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>{`Shear Force Diagram (${shearUnit(resultUnits)})`}</div>
            <DiagramChart data={sfdData} yKey="V" color={CLR.teal} label="V" unit={shearUnit(resultUnits)} />
          </div>
          
          <div className="print-avoid print-diagram-section" style={{ ...S.card, marginBottom:0, padding:"1rem" }}>
            <div style={{ fontSize:11, color:CLR.muted, marginBottom:8, textTransform:"uppercase", fontWeight:700 }}>{`Bending Moment Diagram (${momentUnit(resultUnits)})`}</div>
            <DiagramChart data={bmdData} yKey="M" color={CLR.orange} label="M" unit={momentUnit(resultUnits)} />
          </div>
        </div>
      );
    }

    // ── THEORY VIEW ───────────────────────────────────────────────────────────
    function TheoryView() {
      const CodeBox = ({ children }) => (
        <div style={{ background:"#0d1117", border:`1px solid ${CLR.border}`, padding:"1rem", borderRadius:6, fontFamily:"monospace", fontSize:12, lineHeight:1.6, color:CLR.teal, marginBottom:"1rem", overflowX:"auto" }}>
          {children}
        </div>
      );
      
      const H3 = ({ children }) => <div style={{ fontSize:15, fontWeight:800, color:CLR.accent, marginTop:"1.5rem", marginBottom:"0.5rem" }}>{children}</div>;
      const H4 = ({ children }) => <div style={{ fontSize:13, fontWeight:700, color:CLR.text, marginTop:"1rem", marginBottom:"0.5rem" }}>{children}</div>;

      return (
        <div>
          <div style={{ ...S.card }}>
            <div style={{ fontSize:18, fontWeight:800, color:CLR.accent, marginBottom:"1rem" }}>Chapter 1: Analysis and Design of Two-Way Slab Systems</div>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"1rem" }}>
              This application utilizes a rigorous analytical engine to evaluate continuous two-way slab systems. The methodology synthesizes the <strong>Direct Stiffness Method</strong> for structural analysis (as detailed in <em>Structural Analysis</em> by A. Kassimali) with the design provisions of <strong>CSA A23.3</strong> for reinforced concrete, adopting practical approaches for flexure and shear (as found in <em>Reinforced Concrete Design</em> by S. Brzev and J. Pao).
            </p>
            
            <H3>1. Structural Kinematics and the Direct Stiffness Method</H3>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              The internal member forces are determined using the matrix-based Direct Stiffness Method. By neglecting axial deformations (which are negligible in continuous floor systems), the structural kinematics are defined entirely by flexural behavior. At each support node, the vertical translation is constrained ($v = 0$), leaving joint rotation (θ) as the primary independent degree of freedom (DOF).
            </p>

            <H4>1.1 Local Element Stiffness and Global Assembly</H4>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              For each slab span, the standard flexural stiffness coefficients are derived from the slope-deflection equations. The global stiffness matrix, [S], is assembled by superimposing the rotational stiffness contributions of the adjoining slab elements and the supporting columns at each continuous node.
            </p>
            <CodeBox>
              Rectangular Frame Element: I_eff = ψ * B * H³ / 12<br/>
              Column Rotational Stiffness: K_col = (4 * E_c * I_eff,top) / L_top + (4 * E_c * I_eff,bot) / L_bot<br/>
              Slab Diagonal Stiffness: K_ii = (4 * E_c * I_s) / L<br/>
              Slab Off-Diagonal Stiffness: K_ij = (2 * E_c * I_s) / L<br/>
              <br/>
              Assembly: S[i,i] = Σ K_col + Σ K_ii<br/>
              Assembly: S[i,j] = K_ij
            </CodeBox>

            <H4>1.2 Equivalent Nodal Forces and Solution</H4>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              External uniformly distributed loads (w_f) are converted into equivalent fixed-end moments (FEM) acting at the joints. The global equilibrium equation is then established and solved for the unknown nodal rotations, {"{D}"}.
            </p>
            <CodeBox>
              w_DL = 24 kN/m³ * h * b<br/>
              w_SDL = SDL * b,  w_LL = LL * b<br/>
              w_f = 1.25(w_DL + w_SDL) + 1.5(w_LL)<br/>
              FEM = (w_f * L²) / 12<br/>
              Load Vector: {"{P_f}"}<br/>
              Equilibrium: [S] {"{D}"} = -{"{P_f}"}
            </CodeBox>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              Once rotations are computed, they are substituted back into the element slope-deflection equations to recover the final end moments and shears across the continuous spans.
            </p>

            <H3>2. Flexural Reinforcement Design</H3>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              With the bending moment envelope established, the required longitudinal reinforcement is proportioned using the equivalent rectangular stress block theory. The depth of the compression block, a = β₁c, is utilized to derive a quadratic expression for the required area of steel (A_s).
            </p>
            <CodeBox>
              Stress Block Factors: α₁ = 0.85 - 0.0015f'_c,  β₁ = 0.97 - 0.0025f'_c<br/>
              <br/>
              Let A = (φ_s * f_y)² / (2 * α₁ * φ_c * f'_c * b)<br/>
              Let B = φ_s * f_y * d<br/>
              Let C = M_f (Factored Moment)<br/>
              <br/>
              A_s,req = (B - √(B² - 4*A*C)) / (2*A)
            </CodeBox>

            <H3>3. Two-Way (Punching) Shear & Unbalanced Moment Transfer</H3>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              A critical aspect of flat plate design is the slab-column connection, which must safely transfer vertical shear forces and unbalanced bending moments to prevent punching failures.
            </p>

            <H4>3.1 Two-Way Shear Demand (V_f)</H4>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              The program calculates the gross factored shear demand on the connection by computing the tributary area of the slab supported by the column. To isolate the critical punching perimeter, the load acting directly within the area bounded by the critical section (offset d/2 from the column faces) is conservatively subtracted.
            </p>
            <CodeBox>
              q_f = w_f / b  (Factored area load)<br/>
              V_f = (Tributary Area * q_f) - (Critical Area * q_f)<br/>
              where Critical Area = (c₁ + d) * (c₂ + d)
            </CodeBox>

            <H4>3.2 Unbalanced Moment Transfer (M_u)</H4>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              When spans are unequal or subjected to pattern loading, an unbalanced moment develops at the joint. The program evaluates differential span loading to establish a conservative unbalanced moment demand. This moment is distributed to the top and bottom columns based on their relative flexural stiffness.
            </p>
            <CodeBox>
              M_u = 0.07 * max( w_long * L_long² - w_dead,short * L_short² , ... )<br/>
              M_top = M_u * [ K_top / (K_top + K_bot) ]<br/>
              M_bot = M_u * [ K_bot / (K_top + K_bot) ]
            </CodeBox>
            <p style={{ fontSize:13, color:CLR.muted, lineHeight:1.7, marginBottom:"0.5rem" }}>
              A portion of this moment, γ_v * M_u, is transferred by eccentricity of shear about the centroid of the critical section. The remaining fraction is transferred by flexure. The program calculates γ_v based on the rectangular column dimensions.
            </p>
            <CodeBox>
              c₁ = column dimension parallel to span<br/>
              c₂ = column dimension perpendicular to span<br/>
              M_PS = M_uf from the unbalanced moment calculation<br/>
              For equal top/bottom column stiffness: M_top = M_bot = M_PS / 2
            </CodeBox>
          </div>
        </div>
      );
    }

// ── APP ────────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("inputs");
      const tabs = [{id:"inputs", label:"Inputs"}, {id:"results", label:"Results"}, {id:"theory", label:"Theory"}];
      const [frameElements, setFrameElements] = useState(() => DEFAULT_FRAME_ELEMENTS.map(fe => ({ ...fe })));
      const [nodes, setNodes] = useState(() => DEFAULT_NODES.map(n => ({ ...n })));
      const [spans, setSpans] = useState(() => DEFAULT_SPANS.map(sp => ({ ...sp })));
      const [props, setProps] = useState(() => ({ ...DEFAULT_PROPS }));
      const [geometryInputMode, setGeometryInputMode] = useState(DEFAULT_GEOMETRY_INPUT_MODE);
      const [resultUnits, setResultUnits] = useState(DEFAULT_RESULT_UNITS);
      const [result, setResult] = useState(null);

      const nextFrameElementId = useRef(Math.max(0, ...DEFAULT_FRAME_ELEMENTS.map(fe => +fe.id || 0)) + 1);
      const nextNodeId = useRef(Math.max(0, ...DEFAULT_NODES.map(n => +n.id || 0)) + 1);
      const nextSpanId = useRef(Math.max(0, ...DEFAULT_SPANS.map(sp => +sp.id || 0)) + 1);

      const updateFrameElement = (id, f, v) => setFrameElements(p => p.map(fe => fe.id===id ? {...fe,[f]:v} : fe));
      const addFrameElement = () => { nextFrameElementId.current++; setFrameElements(p => [...p, {id:nextFrameElementId.current, name:`CC-300x300-${nextFrameElementId.current}`, B:300, H:300, psi:1.00}]); };
      const delFrameElement = id => setFrameElements(p => p.length <= 1 ? p : p.filter(fe => fe.id!==id));

      const frameIxKey = fe => {
        const ix = rectFrameI(fe);
        if (!isFinite(ix)) return "0";
        return String(Math.round(ix));
      };

      const makeUniqueFrameElementName = (baseName, usedNames) => {
        let name = baseName;
        let suffix = 2;
        while (usedNames.has(name)) {
          name = `${baseName}-${suffix}`;
          suffix++;
        }
        usedNames.add(name);
        return name;
      };

      const cleanDuplicateFrameElementsByIxAndName = (elements) => {
        const keptByIx = new Map();
        const keptByName = new Map();
        const nameMap = {};
        const unique = [];

        elements.forEach(fe => {
          const ixKey = frameIxKey(fe);
          const nameKey = String(fe.name || "").trim();
          const duplicateIx = keptByIx.has(ixKey);
          const duplicateName = keptByName.has(nameKey);

          if (!duplicateIx && !duplicateName) {
            keptByIx.set(ixKey, fe.name);
            keptByName.set(nameKey, fe.name);
            unique.push(fe);
            return;
          }

          // If either Ix or the frame-property name is already present, delete this
          // property and remap node references to the first compatible kept property.
          // Priority is same Ix, then same name.
          const replacementName = duplicateIx ? keptByIx.get(ixKey) : keptByName.get(nameKey);
          nameMap[fe.name] = replacementName;
        });

        return { unique, nameMap };
      };

      const remapNodeFrameSections = (sectionNameMap) => {
        if (!sectionNameMap || Object.keys(sectionNameMap).length === 0) return;
        setNodes(p => p.map(n => ({
          ...n,
          topSection: sectionNameMap[n.topSection] || n.topSection,
          botSection: sectionNameMap[n.botSection] || n.botSection
        })));
      };

      const duplicateSwappedFrameElements = () => {
        setFrameElements(p => {
          const usedNames = new Set(p.map(fe => fe.name));
          const swappedCopies = p.map(fe => {
            nextFrameElementId.current++;
            const B = +fe.B || 0;
            const H = +fe.H || 0;
            const psi = +fe.psi || 0;
            return {
              id: nextFrameElementId.current,
              name: makeUniqueFrameElementName(`CC-${H}x${B}`, usedNames),
              B: H,
              H: B,
              psi
            };
          });
          const { unique, nameMap } = cleanDuplicateFrameElementsByIxAndName([...p, ...swappedCopies]);
          remapNodeFrameSections(nameMap);
          return unique;
        });
      };

      const removeDuplicateFrameElementsByIxAndName = () => {
        setFrameElements(p => {
          const { unique, nameMap } = cleanDuplicateFrameElementsByIxAndName(p);
          remapNodeFrameSections(nameMap);
          return unique;
        });
      };

      const updateNode = (id, f, v) => setNodes(p => p.map(n => n.id===id ? {...n,[f]:v} : n));
      const addNode = () => { nextNodeId.current++; const defaultSection = frameElements[0]?.name || ""; setNodes(p => [...p, {id:nextNodeId.current, label:"", x:"", Lt:3000, topSection:defaultSection, Lb:3000, botSection:defaultSection}]); };
      const delNode = id => setNodes(p => p.filter(n => n.id!==id));
      const applyFirstNodeColumnLengths = () => {
        setNodes(p => {
          if (!p.length) return p;
          const firstLt = +p[0].Lt || 0;
          const firstLb = +p[0].Lb || 0;
          return p.map(n => ({ ...n, Lt:firstLt, Lb:firstLb }));
        });
      };

      const applyFirstNodeColumnProperties = () => {
        setNodes(p => {
          if (!p.length) return p;
          const firstTopSection = p[0].topSection || frameElements[0]?.name || "";
          const firstBotSection = p[0].botSection || frameElements[0]?.name || "";
          return p.map(n => ({ ...n, topSection:firstTopSection, botSection:firstBotSection }));
        });
      };

      const updateSpan = (id, f, v) => setSpans(p => p.map(s => s.id===id ? {...s,[f]:v} : s));
      const addSpan = () => { nextSpanId.current++; setSpans(p => [...p, {id:nextSpanId.current, near:"", far:"", L:5000, wDL:20.304, wSDL:6.912, wLL:17.28}]); };
      const delSpan = id => setSpans(p => p.filter(s => s.id!==id));

      const syncSpanLengthsFromGlobalCoordinates = () => {
        setSpans(p => p.map(sp => ({ ...sp, L:getSpanLengthFromCoordinates(sp, nodes) })));
      };

      const getGeometryNodes = () => geometryInputMode === "spanLengths" ? deriveNodesFromSpanLengths(nodes, spans) : nodes;

      const updateProp = (f, v) => setProps(p => ({...p, [f]:+v}));

      const calculateAllSlabSpanLoads = () => {
        const loads = calcSpanLoadsFromProps(props);
        setSpans(p => p.map(sp => ({ ...sp, ...loads })));
      };

      const analyze = () => {
        const modelNodes = getGeometryNodes();
        const res = solveEFM(modelNodes, spans, props, frameElements);
        setResult(res);
        setTab("results");
      };

      const printReport = () => {
        if (!result || result.error) return;
        window.print();
      };

      const saveWorkingFile = () => {
        // Generate a standalone HTML copy with the exact same app code, but with
        // the current model inputs rewritten into the DEFAULT_* constants.
        const safeJson = value => JSON.stringify(value, null, 2).replace(/</g, "\\u003c");
        const replaceDefault = (source, name, value) => {
          const serialized = typeof value === "string" ? JSON.stringify(value) : safeJson(value);
          const pattern = new RegExp(`const\\s+${name}\\s*=\\s*[\\s\\S]*?;`);
          return source.replace(pattern, `const ${name} = ${serialized};`);
        };

        const doc = document.cloneNode(true);
        const root = doc.getElementById("root");
        if (root) root.innerHTML = "";

        let html = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
        html = replaceDefault(html, "DEFAULT_PROPS", props);
        html = replaceDefault(html, "DEFAULT_FRAME_ELEMENTS", frameElements);
        html = replaceDefault(html, "DEFAULT_NODES", nodes);
        html = replaceDefault(html, "DEFAULT_SPANS", spans);
        html = replaceDefault(html, "DEFAULT_GEOMETRY_INPUT_MODE", geometryInputMode);
        html = replaceDefault(html, "DEFAULT_RESULT_UNITS", resultUnits);

        const blob = new Blob([html], { type:"text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
        a.href = url;
        a.download = `Two_Way_Slabs_v0_8_9_working_${stamp}.html`;

                        <tr><td style={{...S.td, textAlign:"left", color:CLR.muted}}>Calculated W_DL / W_SDL / W_LL (N/mm)</td><td style={{...S.td, color:CLR.muted}}>{fmt2(slabSelfWeightLineLoad(props))} / {fmt2(areaLoadToLineLoad(props.SDL, props.b))} / {fmt2(areaLoadToLineLoad(props.LL, props.b))}</td></tr>
                      </tbody>

                  </div>
                  <div style={{ ...S.card, padding:0, overflow:"hidden" }}>

                      <div style={S.h2}>Slab Spans</div>

                  <div style={{ overflowX:"auto" }}>
                    <table style={S.table}>
                      <thead><tr>
                        <th style={S.th}>Near Node</th><th style={S.th}>Far Node</th>{geometryInputMode === "spanLengths" && <th style={S.th}>Span Length L (mm)</th>}
                        <th style={S.th}>w_DL (N/mm)</th><th style={S.th}>w_SDL (N/mm)</th><th style={S.th}>w_LL (N/mm)</th><th style={S.th}>—</th>

                  <div className="screen-only" style={{ display:"flex", alignItems:"center", gap:"1rem", marginBottom:"1.25rem" }}>
                    <div>
                      <div style={{ fontSize:20, fontWeight:800 }}>Analysis & Design Results</div>
                      <div style={{ fontSize:11, color:CLR.muted }}>Use the report button to print or save this results package as a PDF.</div>

                        </tr></thead>
                        <tbody>
                          {result.spanResults.map((sr, i) => {
                            const globalFaceL = sr.xStart + sr.faceL;
                            const globalXMax = sr.xStart + sr.xMax;
                            const globalFaceR = sr.xStart + sr.faceR;

                              <td style={S.td}>{fmtMoment(tws.m_PS, resultUnits)}</td>
                              <td style={S.td}>{fmtMoment(tws.m_top, resultUnits)}</td>
                              <td style={S.td}>{fmtMoment(tws.m_bot, resultUnits)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              )
            )}
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
